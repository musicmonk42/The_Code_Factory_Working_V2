apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: codefactory-staging

bases:
  - ../../base

resources:
  - namespace.yaml

patches:
  # Medium replicas for staging
  - target:
      kind: Deployment
      name: codefactory-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  
  # Medium resource limits for staging
  - target:
      kind: Deployment
      name: codefactory-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 3Gi
  
  # Staging environment
  - target:
      kind: ConfigMap
      name: codefactory-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: staging

commonLabels:
  environment: staging

images:
  - name: ghcr.io/musicmonk42/codefactory
    newTag: staging
