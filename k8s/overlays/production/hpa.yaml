apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codefactory-api
  namespace: codefactory-production
  labels:
    app: codefactory-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codefactory-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
