apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codefactory-api
  namespace: codefactory-production
  labels:
    app: codefactory-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codefactory-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      # Multi-pass ensemble generation can run for up to 3 × LLM_TIMEOUT seconds
      # (~15 min at the default 300 s/call).  The stabilisation window must be at
      # least as long as the worst-case job duration to prevent pods from being
      # terminated while they are still processing a multi-pass generation.
      stabilizationWindowSeconds: 900
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      # Scale up immediately when load increases (no stabilisation delay).
      # NOTE: LLM-bound workloads are I/O-not CPU-intensive; CPU/memory metrics
      # alone will not trigger scale-up during generation.  For accurate autoscaling
      # of multi-pass jobs consider adding a custom KEDA ScaledObject based on
      # queue depth or pending-job count alongside this HPA.
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
