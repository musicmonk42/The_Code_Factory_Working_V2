apiVersion: v1
kind: ConfigMap
metadata:
  name: codefactory-config
  namespace: codefactory
data:
  # Production mode
  PRODUCTION_MODE: "1"
  APP_ENV: "production"
  
  # Performance optimizations
  PARALLEL_AGENT_LOADING: "1"
  LAZY_LOAD_ML: "1"
  STARTUP_TIMEOUT: "90"
  
  # Feature flags
  ENABLE_DATABASE: "1"
  ENABLE_REDIS: "1"
  ENABLE_PROMETHEUS: "1"
  ENABLE_AUDIT_LOGGING: "1"
  ENABLE_HSM: "0"
  ENABLE_FEATURE_STORE: "0"
  ENABLE_LIBVIRT: "0"
  
  # Logging
  LOG_LEVEL: "INFO"
  ENABLE_STRUCTURED_LOGGING: "1"
  
  # Monitoring
  PROMETHEUS_PORT: "9090"
  
  # Worker configuration
  WORKER_COUNT: "4"
  
  # Redis configuration
  REDIS_HOST: "codefactory-redis"
  REDIS_PORT: "6379"
