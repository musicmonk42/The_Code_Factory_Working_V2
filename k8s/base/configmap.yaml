apiVersion: v1
kind: ConfigMap
metadata:
  name: codefactory-config
  namespace: codefactory
data:
  # ============================================
  # Application Environment
  # ============================================
  APP_ENV: "production"
  PRODUCTION_MODE: "1"
  DEV_MODE: "0"
  # Deterministic build mode — forces sorted ZIP entries, fixed timestamps,
  # temperature=0 LLM calls, and build_plan.json enforcement.
  # Override to "1" via a kustomize patch or --set for CI reproducibility pipelines.
  DETERMINISTIC: "0"

  # ============================================
  # Startup Optimization
  # ============================================
  APP_STARTUP: "1"
  SKIP_IMPORT_TIME_VALIDATION: "1"
  SPACY_WARNING_IGNORE: "W007"
  # Ensure all sub-packages (self_fixing_engineer, test_generation, etc.) are importable
  PYTHONPATH: "/app"

  # ============================================
  # Performance Flags
  # ============================================
  PARALLEL_AGENT_LOADING: "1"
  LAZY_LOAD_ML: "1"
  STARTUP_TIMEOUT: "90"

  # ============================================
  # Database Configuration
  # ============================================
  DB_POOL_SIZE: "50"
  DB_POOL_MAX_OVERFLOW: "20"
  DB_RETRY_ATTEMPTS: "3"
  DB_RETRY_DELAY: "1.0"
  # Canonical names read by codebase_analyzer.py (SFE analysis DB retries) — Bug 7 fix.
  # Must stay in sync with DB_RETRY_ATTEMPTS / DB_RETRY_DELAY above.
  DATABASE_RETRY_ATTEMPTS: "3"
  DATABASE_RETRY_DELAY: "1.0"
  # Explicit SSL requirement for all production PostgreSQL connections.
  # postgres_client.py defaults to 'require' when APP_ENV=production, but this
  # setting makes the intent unambiguous and overrides any env-detection logic.
  PG_SSL_MODE: "require"
  # Connection timeouts for cloud deployments
  DB_CONNECT_TIMEOUT: "30"  # Connection timeout in seconds
  DB_COMMAND_TIMEOUT: "60"  # Query execution timeout in seconds

  # ============================================
  # Message Bus Configuration
  # ============================================
  MESSAGE_BUS_SHARD_COUNT: "8"
  MESSAGE_BUS_WORKERS_PER_SHARD: "4"
  ENABLE_MESSAGE_BUS_GUARDIAN: "1"
  MESSAGE_BUS_GUARDIAN_INTERVAL: "30"
  # Canonical shard count for the OmniCore message bus (Feature 5).
  # Takes precedence over MESSAGE_BUS_SHARD_COUNT when both are set.
  # See docs/SHARDING_GUIDE.md for sizing recommendations.
  MESSAGE_BUS_SHARDS: "8"

  # ============================================
  # LLM Configuration
  # ============================================
  DEFAULT_LLM_PROVIDER: "openai"
  # Per-call LLM API timeout (seconds).
  # NOTE: Multi-pass ensemble generation makes 3 sequential ensemble calls per large-spec job.
  # Each call is bounded by this timeout; the total generation budget per job is therefore
  # up to 3 × LLM_TIMEOUT seconds (e.g., 3 × 300 s = 900 s).  Jobs run as async background
  # tasks so this does not affect the HTTP worker timeout.
  LLM_TIMEOUT: "300"
  LLM_MAX_RETRIES: "3"
  LLM_TEMPERATURE: "0.7"
  TESTGEN_LLM_TIMEOUT: "300"
  # Maximum tokens for code-generation prompts. Configurable to support large READMEs
  # (e.g., 17KB spec = ~25k tokens). Increase via CODEGEN_MAX_PROMPT_TOKENS env var.
  CODEGEN_MAX_PROMPT_TOKENS: "32000"
  # Minimum character length for an optimised prompt returned by docgen_prompt.py.
  # When gpt-3.5-turbo compresses below this threshold, the system retries with
  # gpt-4o-mini before falling back to hard token-budget truncation.
  # Override: kubectl set env deployment/codefactory DOCGEN_PROMPT_MIN_LENGTH=1200 -n codefactory
  DOCGEN_PROMPT_MIN_LENGTH: "800"
  # LLM_USE_MOCK: set to "true" ONLY for non-production testing without real API keys.
  # agent_core.init_llm() raises ValueError on a missing key unless this
  # flag is "true". Never enable in staging or production deployments.
  LLM_USE_MOCK: "false"
  # Multi-pass code generation thresholds.
  # When a spec reaches either threshold, the codegen agent splits generation into
  # sequential passes (core → routes/services → infrastructure) and auto-enables
  # ensemble voting per chunk.  Raise these values to disable multi-pass for all but
  # the very largest specs; lower them to enable it more aggressively.
  CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD: "10"
  CODEGEN_MULTIPASS_FILE_THRESHOLD: "20"
  # Trigger multi-pass generation when the raw spec content exceeds this many characters.
  # A ~30 000-char spec produces an ~87 000-char prompt that saturates the 16K output
  # token limit in a single pass, causing truncated responses.
  # Override: kubectl set env ... CODEGEN_MULTIPASS_MD_SIZE_THRESHOLD=40000
  CODEGEN_MULTIPASS_MD_SIZE_THRESHOLD: "30000"
  # Fraction of required spec endpoints allowed to be missing before the pipeline
  # triggers a hard spec-fidelity failure and additive retry.  Range: 0.0–1.0.
  # Lower this value to enforce stricter endpoint coverage; raise it to be more
  # permissive during development.
  # Override: kubectl set env ... SPEC_FIDELITY_MISSING_ENDPOINT_THRESHOLD=0.30
  SPEC_FIDELITY_MISSING_ENDPOINT_THRESHOLD: "0.50"
  # Pipeline codegen outer budget: maximum wall-clock seconds for one full multi-pass
  # code-generation job (3 sequential ensemble passes).  900 s = 15 minutes.
  # Override per-environment: kubectl set env ... PIPELINE_CODEGEN_TIMEOUT_SECONDS=1200
  PIPELINE_CODEGEN_TIMEOUT_SECONDS: "900"
  # Per-provider timeout for each individual ensemble LLM call (300 s = 5 minutes).
  ENSEMBLE_PROVIDER_TIMEOUT_SECONDS: "300"
  # Strict-mode flag for the codegen agent (generator/agents/codegen_agent/__init__.py).
  # When "1", the agent raises RunnerDependencyUnavailableError at startup if the runner
  # foundation (llm_client, runner_config, etc.) cannot be imported.
  # "0" (default) falls back to mock implementations with an ERROR-level log warning.
  # Set to "1" in production after confirming all runner dependencies are available.
  CODEGEN_STRICT_MODE: "0"

  # ============================================
  # XAI Test-Generation API (XAITestGenerationAPI in gen_plugins.py)
  # ============================================
  # Provider and model are independent of DEFAULT_LLM_PROVIDER so operators can
  # target a smaller/cheaper model for automated test generation without affecting
  # the main code-generation pipeline.
  # XAI_API_KEY is intentionally kept in the Secret (see secret.yaml) because it
  # is a credential; the non-sensitive knobs live here in the ConfigMap.
  XAI_API_PROVIDER: "openai"
  XAI_API_MODEL: "gpt-4o"
  XAI_RETRY_ATTEMPTS: "3"
  XAI_CALL_TIMEOUT: "60"

  # ============================================
  # Feature Flags
  # ============================================
  ENABLE_DATABASE: "1"
  ENABLE_REDIS: "1"
  ENABLE_PROMETHEUS: "1"
  ENABLE_AUDIT_LOGGING: "1"
  ENABLE_HSM: "0"
  ENABLE_FEATURE_STORE: "0"
  ENABLE_LIBVIRT: "0"
  
  # Kafka Configuration: Multiple variables for component compatibility
  # Different components check different variable names due to evolution of codebase:
  # - KAFKA_ENABLED: Primary flag checked by ArbiterConfig (via Pydantic validation_alias)
  #                  Used by: self_fixing_engineer/arbiter/config.py, database layer, policy engine
  # - ENABLE_KAFKA: Legacy flag checked by older components and server/config_utils.py
  #                 Used by: Some initialization code, compatibility layer
  # - USE_KAFKA_INGESTION: Controls Kafka for event ingestion in ShardedMessageBus
  #                        Used by: omnicore_engine/message_bus for job routing
  # - USE_KAFKA_AUDIT: Controls Kafka for audit event streaming
  #                    Used by: Audit logging system for distributed event collection
  # IMPORTANT: All four must match. Set to "true" only when KAFKA_BOOTSTRAP_SERVERS
  # is provided via a Kubernetes Secret. Defaults to "false" (safe no-broker default).
  ENABLE_KAFKA: "false"
  KAFKA_ENABLED: "false"
  USE_KAFKA_INGESTION: "false"
  USE_KAFKA_AUDIT: "false"
  
  ENABLE_CITUS: "1"  # Distributed PostgreSQL sharding via Citus

  # ============================================
  # Blockchain/DLT Configuration
  # ============================================
  # DLT backend type used by audit_log.py and (via initialize_dlt_backend) dlt_backend.py.
  # Options: simple (dev/in-memory only), fabric (Hyperledger), evm or ethereum (EVM chains).
  # RB-5: "evm"/"ethereum" are fully supported — override via kustomize overlays when needed.
  # DLT_HMAC_KEY must be provided via codefactory-secrets Secret in production.
  DLT_TYPE: "fabric"

  # S3 off-chain blob storage (used by S3OffChainClient when DLT_TYPE=fabric)
  # Bucket must exist and the pod's IAM role (or AWS_ACCESS_KEY_ID secret) must have
  # s3:GetObject / s3:PutObject / s3:HeadBucket permissions.
  S3_BUCKET_NAME: "codefactory-dlt-offchain"
  S3_REGION: "us-east-1"
  # Enable AES-256-GCM client-side encryption of blobs before upload.
  # Requires DLT_ENCRYPTION_KEY in codefactory-secrets (64-char hex / 32 bytes).
  DLT_ENCRYPT_AT_REST: "true"

  # Hyperledger Fabric DLT client (used by FabricClientWrapper when DLT_TYPE=fabric)
  # Override per environment via kustomize patches or helm --set.
  FABRIC_CHANNEL: "codefactory-channel"
  FABRIC_CHAINCODE: "codefactory-cc"
  FABRIC_ORG: "Org1"
  FABRIC_USER: "Admin"
  # Path inside the container — mount the connection profile via a Secret volume or
  # bake it into a custom image layer for air-gapped deployments.
  FABRIC_NETWORK_PROFILE: "/app/data/fabric/connection-profile.json"

  # ============================================
  # ML/NLP Data Paths
  # ============================================
  # NLTK data directory (accessible by appuser in Docker runtime)
  # Pre-downloaded during Docker build to avoid runtime downloads
  NLTK_DATA: "/opt/nltk_data"
  # HuggingFace model cache directory
  # Pre-downloaded models to prevent runtime downloads and ensure air-gapped compatibility
  HF_HOME: "/opt/huggingface_cache"
  TRANSFORMERS_CACHE: "/opt/huggingface_cache"

  # ============================================
  # Audit Crypto Configuration
  # ============================================
  AUDIT_CRYPTO_MODE: "software"
  # CRITICAL: "0" = fail fast if crypto cannot initialize (correct for production).
  # Set to "1" only in development/testing when audit crypto is intentionally off.
  AUDIT_CRYPTO_ALLOW_INIT_FAILURE: "0"
  # Audit log compression algorithm (gzip, zstd, or none)
  COMPRESSION_ALGO: "gzip"

  # Kubernetes/Cloud Native secret management
  # For Kubernetes: Set USE_ENV_SECRETS=true (plaintext secrets, K8s encrypts via etcd)
  # For AWS: Set USE_ENV_SECRETS=false and configure KMS (see AWS_KMS_TROUBLESHOOTING.md)
  # Railway: Set USE_ENV_SECRETS=true (Railway encrypts at platform level)
  USE_ENV_SECRETS: "true"
  AUDIT_CRYPTO_USE_KMS: "false"  # KMS not used in Kubernetes - secrets managed by K8s

  # Docker validation: skip when Docker socket is not available (e.g., Railway, K8s)
  SKIP_DOCKER_VALIDATION: "true"

  # ============================================
  # Logging
  # ============================================
  LOG_LEVEL: "INFO"
  ENABLE_STRUCTURED_LOGGING: "1"

  # ============================================
  # Monitoring
  # ============================================
  PROMETHEUS_PORT: "9090"
  # OpenTelemetry OTLP export endpoint (Bug 6 fix).
  # When set, the dlt-client-plugin routes spans to an OTLP collector instead of stdout,
  # preventing Railway's 500 logs/sec rate-limit hits during burst lint operations.
  # Override via kustomize patch or kubectl set env for environments with a collector:
  #   kubectl set env deployment/codefactory-api OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317 -n codefactory
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  # OpenTelemetry Batch Span Processor tuning — keeps export bursts well under
  # Railway's 500 logs/sec rate limit.  Defaults are more conservative than the
  # OTel SDK defaults (512 batch / 5 s delay) to avoid log-rate spikes.
  # Override via kustomize patch:
  #   kubectl set env deployment/codefactory-api OTEL_BSP_MAX_EXPORT_BATCH_SIZE=200 -n codefactory
  OTEL_BSP_MAX_EXPORT_BATCH_SIZE: "100"
  OTEL_BSP_SCHEDULE_DELAY: "5000"
  OTEL_BSP_MAX_QUEUE_SIZE: "2048"

  # ============================================
  # Application Paths
  # ============================================
  CREW_CONFIG_PATH: "/app/self_fixing_engineer/crew_config.yaml"
  AUDIT_LOG_PATH: "/app/logs/audit_trail.log"
  # Path to the Refactor Agent crew YAML configuration.
  # Defaults to the bundled refactor_agent.yaml inside the container image.
  # Override (e.g. via kustomize overlay) if you mount a custom config on a ConfigMap.
  REFACTOR_AGENT_CONFIG: "/app/self_fixing_engineer/refactor_agent/refactor_agent.yaml"

  # ============================================
  # SFE Arbiter Analysis Configuration
  # ============================================
  # Wall-clock budget for a single full codebase scan (default 300 s = 5 min).
  # Raise for repositories with 100+ Python files where linting takes longer.
  # Override: kubectl set env deployment/codefactory SFE_ANALYSIS_TIMEOUT_SECONDS=600 -n codefactory
  SFE_ANALYSIS_TIMEOUT_SECONDS: "300"
  # Skip individual linters to speed up analysis in resource-constrained pods.
  SFE_SKIP_MYPY: "false"
  SFE_SKIP_PYLINT: "false"
  # Fast-mode skips both Pylint and Mypy, running only Bandit (security) and Radon (complexity).
  SFE_FAST_MODE: "false"

  # ============================================
  # Self-Healing Import Fixer (SHIF) Settings
  # ============================================
  # Enable per-operation metrics in the import healer (fixer_dep.py).
  # Set to "true" to expose files_scanned, fixes_applied, and error counters
  # via the SHIF metrics map. Defaults to "false" (off) to avoid overhead in
  # high-frequency healing runs. Expose via Prometheus when enabled.
  HEAL_METRICS: "false"

  # ============================================
  # Refactor Agent / ConfigDB Settings
  # ============================================
  # Optional HTTPS endpoint for remote agent role/skill resolution by ConfigDBResolver.
  # Leave empty (default) to use the bundled local YAML (configdb_defaults.yaml).
  # When set, the host MUST also appear in CONFIGDB_ALLOWED_HOSTS (SSRF protection).
  # Example: CONFIGDB_REMOTE_ENDPOINT: "https://config.internal.example.com/configdb"
  CONFIGDB_REMOTE_ENDPOINT: ""
  # Comma-separated list of hostnames permitted for remote ConfigDB resolution.
  # Required when CONFIGDB_REMOTE_ENDPOINT is set; requests to unlisted hosts are blocked.
  # Example: CONFIGDB_ALLOWED_HOSTS: "config.internal.example.com"
  CONFIGDB_ALLOWED_HOSTS: ""

  # MetaLearning state file path — must be on the data PVC so state survives pod restarts.
  META_LEARNING_STATE_PATH: "/app/data/meta_learning_state.json"

  # ============================================
  # Arbiter Configuration
  # ============================================
  # Arbiter world-size: number of virtual agent slots managed by the primary Arbiter.
  # Increase for larger multi-agent deployments.
  ARBITER_WORLD_SIZE: "10"
  # Arbiter role: "admin" grants the primary arbiter full policy and governance access.
  ARBITER_ROLE: "admin"
  # Absolute path for the encrypted PolicyManager policy file.
  # MUST resolve to a path on the data PersistentVolumeClaim so policies survive
  # pod restarts and rolling upgrades. Override via kustomize overlays when needed.
  POLICY_CONFIG_FILE_PATH: "/app/data/policies.json"
  # File provenance registry path — records which files were produced by the Generator
  # pipeline so the SFE can prioritise generated artefacts for quality checks.
  # MUST be on the data PVC so the registry survives pod restarts; otherwise the
  # Arbiter loses track of generator-produced files on every restart.
  ARBITER_PROVENANCE_PATH: "/app/data/provenance.json"
  # Reports directory — used by the Genetic Evolution Engine to persist the GA
  # population (evolution_population.json) across pod restarts. Genomes now include
  # evolved prompt templates, making population persistence more valuable.
  # MUST be on the data PVC.
  REPORTS_DIRECTORY: "/app/data/reports"

  # SFE Checkpoint Manager uses container-friendly defaults:
  # - CHECKPOINT_AUDIT_LOG_PATH defaults to ./logs/checkpoint/audit.log
  # - CHECKPOINT_DLQ_PATH defaults to ./logs/checkpoint/dlq.jsonl
  # Both resolve to /app/logs/checkpoint/ in the container.
  # Override only if custom paths are required.

  # ============================================
  # Runner Configuration Path
  # ============================================
  # Optional: Set custom path to runner configuration file
  # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
  # For production deployments, recommend explicit path
  # Default search order:
  #   1. RUNNER_CONFIG_PATH (if set)
  #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
  # Uncomment and set if needed:
  # RUNNER_CONFIG_PATH: "/app/generator/config.yaml"

  # ============================================
  # Worker Configuration
  # ============================================
  # Number of uvicorn workers per pod (single worker mode)
  # FastAPI is fully async and doesn't benefit from multiple workers.
  # Multiple workers cause job synchronization issues (each has its own memory cache).
  # Set to 1 for consistent job state across requests.
  WORKER_COUNT: "1"

  # ============================================
  # Redis Configuration
  # ============================================
  REDIS_HOST: "codefactory-redis"
  REDIS_PORT: "6379"

  # ============================================
  # Tier-1 AI Capabilities (Feature Flags)
  # ============================================
  # Feature 1: Quantum / Neuromorphic Array Backend
  # These flags activate the respective numerical-computing backends inside
  # omnicore_engine.array_backend.ArrayBackend (the mathematical abstraction that
  # wraps NumPy/CuPy/Dask/PyTorch/Qiskit/Nengo).
  # NOTE: This is distinct from the Arbiter persistence layer, which was renamed
  # from ArrayBackend → PersistentArrayStore in self_fixing_engineer.arbiter.persistent_array_store.
  # Both fall back to NumPy when the optional libraries (qiskit, nengo) are not installed.
  ARRAY_BACKEND_QUANTUM: "false"        # Set to "true" + install qiskit to enable
  ARRAY_BACKEND_NEUROMORPHIC: "false"   # Set to "true" + install nengo  to enable

  # Feature 6: RL Code Health Optimizer — Prometheus scrape URL
  # Used by PlatformMetricsCollector to query latency metrics from Prometheus.
  # Leave empty to skip Prometheus-based latency collection.
  # Example (in-cluster): "http://prometheus-operated.monitoring.svc.cluster.local:9090"
  PROMETHEUS_URL: ""

  # Feature 5: Genetic Evolution Engine
  # Number of genomes in the evolutionary population. Higher = more exploration, slower cycles.
  EVOLUTION_POPULATION_SIZE: "10"
  # Number of GA generations per run (IB-2: new kwarg — arbiter.py reads this via env).
  # Default 5 keeps runs fast; increase for production tuning.
  EVOLUTION_GENERATIONS: "5"
  # GA backend selector for Arbiter.evolve(): auto | deap | custom
  # "auto" (default) uses DEAP when available and falls back to the custom GA.
  # Set to "deap" or "custom" to pin the backend.
  EVOLUTION_BACKEND: "auto"
  # ArbiterGrowthManager evolutionary experiment parameters (arbiter_growth_manager.py).
  # These govern the ArbiterExplorer.run_evolutionary_experiment() call, which is
  # separate from the DEAP evolve_configs() call controlled by EVOLUTION_GENERATIONS above.
  EXPLORER_EVOLUTION_GENERATIONS: "5"
  EXPLORER_EVOLUTION_POPULATION_SIZE: "10"
  # Minimum number of RL action-outcome samples required before learn_from_data()
  # will train the supervised policy model.  Raise to require more real RL data.
  MIN_SUPERVISED_TRAINING_SAMPLES: "50"

  # Guard for the experimental SelfEvolutionEngine.
  # Set to "true" ONLY after the evolution subsystem has passed full QA sign-off
  # and when PRODUCTION_MODE=1.  "false" is the safe default for all environments.
  # Override per-cluster: kubectl set env deployment/codefactory ENABLE_EXPERIMENTAL_EVOLUTION=true
  ENABLE_EXPERIMENTAL_EVOLUTION: "false"

  # Feature 2: LLM Feature Suggestion Cache TTL (seconds, default = 3600)
  FEATURE_SUGGESTION_CACHE_TTL: "3600"

  # ============================================
  # Clarifier WebSocket Configuration
  # ============================================
  # Session timeout for real-time clarifier Q&A WebSocket connections (seconds).
  # Must match SESSION_TIMEOUT_SECONDS in server/routers/clarifier_ws.py.
  CLARIFIER_WS_TIMEOUT: "300"

  # ============================================
  # Tier-2 Feature Configuration
  # ============================================

  # Job-Status WebSocket heartbeat / idle-connection timeout (seconds).
  # Controls JOBS_WS_TIMEOUT in server/routers/jobs_ws.py.
  # Must be ≤ the load-balancer idle-timeout (typically 60–600 s).
  JOBS_WS_TIMEOUT: "30"

  # Post-Quantum Cryptography signing for audit logs.
  # Set to "true" only after installing pqcrypto>=0.1.3 or liboqs-python>=0.12.0.
  # See requirements-pqc.txt and docs/ for installation instructions.
  # Gracefully falls back to HMAC-SHA-256 if the libraries are not present.
  USE_PQC_SIGNING: "false"

  # ============================================
  # Security Posture Configuration
  # ============================================
  # Encryption backend for data at rest.
  # Options: local (software AES), aws_kms, azure_keyvault.
  # See SECURITY_CONFIGURATION.md for configuration details.
  ENCRYPTION_MODE: "local"
  # Set to "1" to suppress security-posture startup warnings in development/staging.
  # Leave as "0" in production so operators are alerted to unresolved settings.
  SUPPRESS_SECURITY_WARNINGS: "0"
  # Enable plugin integrity checks via HASH_MANIFEST.
  # Default: "false" in dev/staging, "true" in production (override in production overlay).
  PLUGIN_INTEGRITY_CHECK_ENABLED: "false"
  # Sentry environment tag — used by sentry_sdk to distinguish prod/staging/dev events.
  # Matches the SENTRY_DSN secret; set to "production" in the production overlay.
  # Must be one of: production, staging, development
  SENTRY_ENVIRONMENT: "production"

  # ============================================
  # HashiCorp Vault JWT Path (intent_capture/api.py, cli.py) - Bug 17 fix
  # ============================================
  # Vault KV v2 path for the JWT_SECRET used by both API and CLI.
  # Both modules now share this path so tokens are cross-compatible.
  # Override only if your Vault layout differs from the default.
  JWT_VAULT_PATH: "secrets/data/jwt"
