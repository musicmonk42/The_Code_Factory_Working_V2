# This is a template for creating secrets
# In production, replace placeholders with actual values or use external secrets management
apiVersion: v1
kind: Secret
metadata:
  name: codefactory-secrets
  namespace: codefactory
type: Opaque
stringData:
  # Redis password - Generate with: openssl rand -base64 32
  redis-password: "REPLACE_WITH_REDIS_PASSWORD"

  # Database URL (if using PostgreSQL)
  # Format: postgresql+asyncpg://user:password@host:5432/dbname
  database-url: "postgresql+asyncpg://codefactory:REPLACE_WITH_DB_PASSWORD@postgres:5432/codefactory"

  # OpenAI API Key (REQUIRED)
  openai-api-key: "REPLACE_WITH_OPENAI_API_KEY"

  # Anthropic API Key (optional)
  anthropic-api-key: "REPLACE_WITH_ANTHROPIC_API_KEY"

  # Google AI API Key (optional)
  google-api-key: "REPLACE_WITH_GOOGLE_API_KEY"

  # XAI/Grok API Key (optional)
  xai-api-key: "REPLACE_WITH_XAI_API_KEY"
  grok-api-key: "REPLACE_WITH_GROK_API_KEY"

  # HMAC key for audit logging - Generate with: openssl rand -hex 32
  hmac-key: "REPLACE_WITH_HMAC_KEY"

  # Encryption key - Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  encryption-key: "REPLACE_WITH_ENCRYPTION_KEY"

  # KMS Key ID (optional, for AWS KMS audit crypto)
  # Format: ARN (arn:aws:kms:us-east-1:123456789:key/xxx) or alias (alias/my-key)
  # See docs/AWS_KMS_TROUBLESHOOTING.md for setup instructions
  kms-key-id: ""

  # Audit Crypto Master Encryption Key (CRITICAL - Required for production)
  # Generate with: python -c "import base64, os; print(base64.b64encode(os.urandom(32)).decode())"
  # 
  # For Railway/non-KMS deployments:
  #   - Use the base64 key directly (no encryption needed)
  #   - Set USE_ENV_SECRETS=true in environment
  #
  # For AWS KMS deployments:
  #   1. Generate base64 key as above
  #   2. Encrypt with KMS:
  #      aws kms encrypt --key-id alias/your-key \
  #        --plaintext fileb://<(echo -n 'YOUR_KEY' | base64 -d) \
  #        --query CiphertextBlob --output text
  #   3. Use the resulting ciphertext
  #
  # WARNING: Must be encrypted with the KMS key specified in kms-key-id above
  # If you rotate KMS keys, you must re-encrypt this value with the new key
  # See docs/AWS_KMS_TROUBLESHOOTING.md and docs/RAILWAY_DEPLOYMENT.md for details
  audit-crypto-master-key: ""

  # Sentry DSN (optional, for error tracking)
  sentry-dsn: ""

  # Ollama Host (optional, for local LLM)
  ollama-host: ""

  # CORS Allowed Origins (optional, comma-separated)
  allowed-origins: ""

  # Audit log cryptographic signing keys (required for PRIVATE_KEY_B64 signer)
  # Generate private key: openssl genrsa -out private.pem 2048
  # Base64 encode: base64 -w0 private.pem
  private-key-b64: ""
  private-key-password: ""

  # CLI WebSocket collaboration JWT secret (intent_capture/cli.py)
  # Generate with: openssl rand -hex 32
  # REQUIRED in production: the CLI raises a fatal warning if the insecure default is used
  cli-jwt-secret: "REPLACE_WITH_CLI_JWT_SECRET"

  # RabbitMQ URL for task queuing (intent_capture/api.py, cli.py, autocomplete.py)
  # Only required when USE_QUEUE=true; defaults to amqp://guest:guest@localhost:5672/
  # Format: amqp://user:password@host:5672/vhost
  rabbitmq-url: ""

  # ============================================================
  # test_generation / self_fixing_engineer integration secrets
  # These are OPTIONAL — omit or leave blank to disable the
  # corresponding integration.  All integrations degrade
  # gracefully when not configured.
  # ============================================================

  # GitHub integration (PRCreator.create_pr)
  # Required fields: GITHUB_TOKEN + pr_integration.repo in config
  # Generate at: https://github.com/settings/tokens (repo + workflow scopes)
  github-token: ""

  # Jira Cloud integration (PRCreator.create_jira_ticket)
  # Set JIRA_EMAIL when targeting Jira Cloud (uses Basic base64(email:token) auth).
  # Omit JIRA_EMAIL for Jira Server / Data Center (uses Bearer PAT auth instead).
  # Generate API token at: https://id.atlassian.com/manage-profile/security/api-tokens
  jira-api-url: ""
  jira-email: ""
  jira-api-token: ""

  # Neo4j KnowledgeGraphClient backend (KnowledgeGraphClient)
  # Falls back to local JSON file (atco_artifacts/knowledge_graph.json) when not set.
  # Format: bolt://host:7687 or neo4j+s://host:7687
  neo4j-uri: ""
  neo4j-user: ""
  neo4j-password: ""
