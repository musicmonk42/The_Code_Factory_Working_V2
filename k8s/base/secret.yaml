# This is a template for creating secrets
# In production, replace placeholders with actual values or use external secrets management
apiVersion: v1
kind: Secret
metadata:
  name: codefactory-secrets
  namespace: codefactory
type: Opaque
stringData:
  # Redis password - Generate with: openssl rand -base64 32
  redis-password: "REPLACE_WITH_REDIS_PASSWORD"
  
  # Database URL (if using PostgreSQL)
  # Format: postgresql+asyncpg://user:password@host:5432/dbname
  database-url: "postgresql+asyncpg://codefactory:REPLACE_WITH_DB_PASSWORD@postgres:5432/codefactory"
  
  # OpenAI API Key (REQUIRED)
  openai-api-key: "REPLACE_WITH_OPENAI_API_KEY"
  
  # Anthropic API Key (optional)
  anthropic-api-key: "REPLACE_WITH_ANTHROPIC_API_KEY"
  
  # Google AI API Key (optional)
  google-api-key: "REPLACE_WITH_GOOGLE_API_KEY"
  
  # XAI/Grok API Key (optional)
  xai-api-key: "REPLACE_WITH_XAI_API_KEY"
  grok-api-key: "REPLACE_WITH_GROK_API_KEY"
  
  # HMAC key for audit logging - Generate with: openssl rand -hex 32
  hmac-key: "REPLACE_WITH_HMAC_KEY"
  
  # Encryption key - Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  encryption-key: "REPLACE_WITH_ENCRYPTION_KEY"
  
  # KMS Key ID (optional, for AWS KMS audit crypto)
  # Format: ARN (arn:aws:kms:us-east-1:123456789:key/xxx) or alias (alias/my-key)
  # See docs/AWS_KMS_TROUBLESHOOTING.md for setup instructions
  kms-key-id: ""
  
  # Audit Crypto Master Encryption Key (optional, base64 encoded, KMS-encrypted)
  # This should be a Fernet key encrypted with your KMS key, then base64 encoded
  # Generate with:
  # 1. Create Fernet key: python -c "from cryptography.fernet import Fernet; import base64; print(base64.b64encode(Fernet.generate_key()).decode())"
  # 2. Encrypt with KMS: aws kms encrypt --key-id alias/your-key --plaintext <base64-key> --query CiphertextBlob --output text
  # 3. Use the resulting base64 ciphertext as the value
  # WARNING: Must be encrypted with the KMS key specified in kms-key-id above
  # If you rotate KMS keys, you must re-encrypt this value with the new key
  # See docs/AWS_KMS_TROUBLESHOOTING.md for InvalidCiphertextException resolution
  audit-crypto-key: ""
  
  # Sentry DSN (optional, for error tracking)
  sentry-dsn: ""
  
  # Ollama Host (optional, for local LLM)
  ollama-host: ""
  
  # CORS Allowed Origins (optional, comma-separated)
  allowed-origins: ""
