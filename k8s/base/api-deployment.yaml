apiVersion: apps/v1
kind: Deployment
metadata:
  name: codefactory-api
  namespace: codefactory
  labels:
    app: codefactory-api
    component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: codefactory-api
  template:
    metadata:
      labels:
        app: codefactory-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: codefactory
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: codefactory-api
      initContainers:
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c']
          args:
            - |
              until nc -z codefactory-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: codefactory
          image: ghcr.io/musicmonk42/codefactory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: codefactory-config
          env:
            # Redis configuration with password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"

            # Database configuration
            - name: DB_PATH
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: database-url
                  optional: true

            # LLM API keys
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: anthropic-api-key
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: google-api-key
                  optional: true
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: xai-api-key
                  optional: true
            - name: GROK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: grok-api-key
                  optional: true
            - name: OLLAMA_HOST
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: ollama-host
                  optional: true

            # Security keys
            - name: AGENTIC_AUDIT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: hmac-key
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: encryption-key
            - name: KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: kms-key-id
                  optional: true
            - name: AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: audit-crypto-key
                  optional: true

            # Monitoring and error tracking
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: sentry-dsn
                  optional: true

            # CORS configuration
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: allowed-origins
                  optional: true
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 18  # 90 seconds max startup time
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: workspace
              mountPath: /app/workspace
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: codefactory-uploads
        - name: workspace
          persistentVolumeClaim:
            claimName: codefactory-workspace
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: codefactory-api
  namespace: codefactory
  labels:
    app: codefactory-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: codefactory-api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codefactory-uploads
  namespace: codefactory
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codefactory-workspace
  namespace: codefactory
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
