apiVersion: apps/v1
kind: Deployment
metadata:
  name: codefactory-api
  namespace: codefactory
  labels:
    app: codefactory-api
    component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: codefactory-api
  template:
    metadata:
      labels:
        app: codefactory-api
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: codefactory
      # terminationGracePeriodSeconds must exceed preStop sleep (15 s) + uvicorn graceful
      # shutdown timeout (30 s) with a safety buffer.
      # Formula: preStop(15) + gracefulShutdown(30) + buffer(15) = 60 s minimum.
      # Set to 90 s to include an additional 30 s safety margin for slow cleanup tasks.
      terminationGracePeriodSeconds: 90
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: codefactory-api
      initContainers:
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c']
          args:
            - |
              until nc -z codefactory-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: codefactory
          image: ghcr.io/musicmonk42/codefactory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: codefactory-config
          env:
            # Redis configuration with password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"

            # Database configuration
            - name: DB_PATH
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: database-url
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: database-url
                  optional: true

            # LLM API keys
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: anthropic-api-key
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: google-api-key
                  optional: true
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: xai-api-key
                  optional: true
            # XAI Test-Generation API tuning knobs (non-secret, sourced from ConfigMap)
            - name: XAI_API_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: codefactory-config
                  key: XAI_API_PROVIDER
            - name: XAI_API_MODEL
              valueFrom:
                configMapKeyRef:
                  name: codefactory-config
                  key: XAI_API_MODEL
            - name: XAI_RETRY_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: codefactory-config
                  key: XAI_RETRY_ATTEMPTS
            - name: XAI_CALL_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: codefactory-config
                  key: XAI_CALL_TIMEOUT
            - name: GROK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: grok-api-key
                  optional: true
            - name: OLLAMA_HOST
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: ollama-host
                  optional: true

            # Security keys
            - name: AGENTIC_AUDIT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: hmac-key
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: encryption-key
            - name: KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: kms-key-id
                  optional: true
            - name: AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: audit-crypto-key
                  optional: true

            # Monitoring and error tracking
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: sentry-dsn
                  optional: true
            - name: SENTRY_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: codefactory-config
                  key: SENTRY_ENVIRONMENT

            # CORS configuration
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: allowed-origins
                  optional: true

            # Audit log cryptographic signing (optional - required for software key signer)
            - name: PRIVATE_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: private-key-b64
                  optional: true
            - name: PRIVATE_KEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: private-key-password
                  optional: true

            # CLI WebSocket JWT secret (intent_capture/cli.py) - Bug 4 fix
            # REQUIRED in production; CLI raises a fatal warning if the insecure default is used
            - name: CLI_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: cli-jwt-secret
                  optional: true

            # RabbitMQ URL for task queuing (intent_capture/api.py, cli.py) - Bug 10 fix
            # Only required when USE_QUEUE=true
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: rabbitmq-url
                  optional: true
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 24  # 120 seconds max startup time (increased to accommodate 120s router loading)
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: workspace
              mountPath: /app/workspace
            - name: logs
              mountPath: /app/logs
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: codefactory-uploads
        - name: workspace
          persistentVolumeClaim:
            claimName: codefactory-workspace
        - name: logs
          emptyDir: {}
        # data is a PVC so MetaLearning state and other runtime data survive pod restarts..
        - name: data
          persistentVolumeClaim:
            claimName: codefactory-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: codefactory-api
  namespace: codefactory
  labels:
    app: codefactory-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: codefactory-api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codefactory-uploads
  namespace: codefactory
spec:
  # ReadWriteOnce works with all cloud providers out of the box.
  # Use ReadWriteMany only with NFS/EFS-backed storage and multiple replicas.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codefactory-workspace
  namespace: codefactory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codefactory-data
  namespace: codefactory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
