apiVersion: apps/v1
kind: Deployment
metadata:
  name: codefactory-redis
  namespace: codefactory
  labels:
    app: codefactory-redis
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codefactory-redis
  template:
    metadata:
      labels:
        app: codefactory-redis
        component: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999  # Redis user
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codefactory-secrets
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - --pass
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - --pass
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
              - ALL
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: codefactory-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: codefactory-redis
  namespace: codefactory
  labels:
    app: codefactory-redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: codefactory-redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codefactory-redis-data
  namespace: codefactory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
