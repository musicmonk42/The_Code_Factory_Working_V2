# Default values for Code Factory Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas (can be overridden by HPA)
replicaCount: 1

image:
  repository: ghcr.io/musicmonk42/codefactory
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Do NOT auto-mount the service account token — pods in this chart do not
  # call the Kubernetes API, so mounting the token is an unnecessary attack surface.
  # See CIS Kubernetes Benchmark 5.1.6.
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Set to true if possible, requires tmpfs mounts
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  metricsPort: 9090
  annotations: {}

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"  # 5 min: covers 180 s Arbiter analysis + network overhead + safety buffer
    # WebSocket support for /api/clarifier/ws/* endpoints
    nginx.ingress.kubernetes.io/proxy-set-header-upgrade: "$http_upgrade"
    nginx.ingress.kubernetes.io/proxy-set-header-connection: "upgrade"
    nginx.ingress.kubernetes.io/websocket-services: "codefactory-api"
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: codefactory.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: codefactory-tls
      hosts:
        - codefactory.example.com

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Startup probe - critical for agent loading
# Allows up to 120 seconds for background agent initialization (increased from 90s)
# to accommodate the 120s router loading timeout
startupProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 24  # 24 * 5s = 120s max startup time

# Liveness probe - restart if unhealthy
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Readiness probe - remove from load balancer if not ready
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

# Additional volumes and volume mounts
volumes: []
# - name: uploads
#   persistentVolumeClaim:
#     claimName: codefactory-uploads

volumeMounts: []
# - name: uploads
#   mountPath: /app/uploads

# Persistent storage
persistence:
  uploads:
    enabled: true
    storageClass: ""
    # ReadWriteOnce is supported by all cloud providers out of the box.
    # Change to ReadWriteMany only when using an NFS/EFS-backed storage class
    # AND running more than one replica, otherwise pods will fail to schedule.
    accessMode: ReadWriteOnce
    size: 10Gi
    annotations: {}
  workspace:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    annotations: {}
  # Small PVC for runtime data files (MetaLearning state, clarifier DB, etc.)
  # Survives pod restarts; backed by ReadWriteOnce since a single replica writes to it.
  data:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

# terminationGracePeriodSeconds must be greater than:
#   preStop sleep (15 s) + uvicorn timeout_graceful_shutdown (30 s) + buffer (15 s) = 60 s minimum.
# Set to 90 s to include an additional 30 s safety margin for slow cleanup tasks.
# Lowering below 60 s will cause Kubernetes to SIGKILL the pod before graceful shutdown
# completes, potentially interrupting in-flight LLM calls and losing job state.
terminationGracePeriodSeconds: 90

# Topology spread for better availability
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: codefactory

# Environment variables
env:
  # Application Environment
  PRODUCTION_MODE: "1"
  APP_ENV: "production"
  DEV_MODE: "0"

  # Startup Optimization
  APP_STARTUP: "1"
  SKIP_IMPORT_TIME_VALIDATION: "1"
  SPACY_WARNING_IGNORE: "W007"
  # Ensure all sub-packages (self_fixing_engineer, test_generation, etc.) are importable
  PYTHONPATH: "/app"

  # Performance optimizations
  PARALLEL_AGENT_LOADING: "1"
  LAZY_LOAD_ML: "1"
  STARTUP_TIMEOUT: "90"

  # Agent Loading Race Condition Prevention
  # Resilience settings for jobs submitted during agent loading phase
  # Production values: longer timeouts and more retries for stability
  AGENT_WAIT_TIMEOUT: "120"  # Max seconds to wait for agents to load
  AGENT_WAIT_INTERVAL: "2"   # Check interval in seconds
  AGENT_RETRY_ATTEMPTS: "5"  # Number of retry attempts for agent loading
  AGENT_RETRY_BASE_DELAY: "5"  # Base delay for exponential backoff (seconds)
  AGENT_RETRY_MAX_DELAY: "45"  # Maximum delay cap for backoff

  # Database Configuration
  DB_POOL_SIZE: "50"
  DB_POOL_MAX_OVERFLOW: "20"
  DB_RETRY_ATTEMPTS: "3"
  DB_RETRY_DELAY: "1.0"
  # Canonical names read by codebase_analyzer.py (SFE analysis) — Bug 7 fix.
  # Must stay in sync with DB_RETRY_ATTEMPTS / DB_RETRY_DELAY above.
  DATABASE_RETRY_ATTEMPTS: "3"
  DATABASE_RETRY_DELAY: "1.0"

  # Message Bus Configuration
  MESSAGE_BUS_SHARD_COUNT: "8"
  MESSAGE_BUS_WORKERS_PER_SHARD: "4"
  ENABLE_MESSAGE_BUS_GUARDIAN: "1"
  MESSAGE_BUS_GUARDIAN_INTERVAL: "30"
  # Canonical shard count for the OmniCore message bus (Feature 5).
  # Takes precedence over MESSAGE_BUS_SHARD_COUNT when both are set.
  # See docs/SHARDING_GUIDE.md for sizing recommendations.
  MESSAGE_BUS_SHARDS: "8"

  # LLM Configuration
  DEFAULT_LLM_PROVIDER: "openai"
  # Per-call LLM API timeout (seconds).
  # NOTE: Multi-pass ensemble generation makes 3 sequential ensemble calls per large-spec job.
  # Each call is bounded by LLM_TIMEOUT; the total budget per job is up to 3 × LLM_TIMEOUT.
  # Jobs run as async background tasks so this does not affect the HTTP worker timeout.
  LLM_TIMEOUT: "300"
  LLM_MAX_RETRIES: "3"
  LLM_TEMPERATURE: "0.7"
  TESTGEN_LLM_TIMEOUT: "300"
  # Maximum tokens for code-generation prompts. Configurable to support large READMEs
  # (e.g., 17KB spec = ~25k tokens). Override per-environment:
  #   helm upgrade --set env.CODEGEN_MAX_PROMPT_TOKENS=65000 ...
  CODEGEN_MAX_PROMPT_TOKENS: "32000"
  # LLM_USE_MOCK: set to "true" ONLY for non-production testing when no real API keys are
  # available. agent_core.init_llm() raises ValueError on a missing key unless
  # this flag is "true". Never enable in staging or production deployments.
  LLM_USE_MOCK: "false"
  # Multi-pass code generation thresholds.
  # When a spec reaches either threshold the codegen agent splits generation into
  # sequential passes (core → routes/services → infrastructure) and auto-enables
  # ensemble voting per chunk.  Override per-environment:
  #   helm upgrade --set env.CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD=20 ...
  CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD: "25"
  CODEGEN_MULTIPASS_FILE_THRESHOLD: "20"
  # Pipeline codegen outer budget: maximum wall-clock seconds for one full multi-pass
  # code-generation job (3 sequential ensemble passes).  900 s = 15 minutes.
  # Override: helm upgrade --set env.PIPELINE_CODEGEN_TIMEOUT_SECONDS=1200 ...
  PIPELINE_CODEGEN_TIMEOUT_SECONDS: "900"
  # Per-provider timeout for each individual ensemble LLM call (300 s = 5 minutes).
  # Override: helm upgrade --set env.ENSEMBLE_PROVIDER_TIMEOUT_SECONDS=360 ...
  ENSEMBLE_PROVIDER_TIMEOUT_SECONDS: "300"
  # Strict-mode flag for the codegen agent (generator/agents/codegen_agent/__init__.py).
  # When "1", the agent raises RunnerDependencyUnavailableError at startup if the runner
  # foundation (llm_client, runner_config, etc.) cannot be imported.
  # "0" (default) falls back to mock implementations with an ERROR-level log warning.
  # Enable in production after confirming all runner dependencies are available:
  #   helm upgrade --set env.CODEGEN_STRICT_MODE=1 ...
  CODEGEN_STRICT_MODE: "0"

  # XAI Test-Generation API (XAITestGenerationAPI in gen_plugins.py)
  # Non-secret tuning knobs — the XAI_API_KEY credential lives in codefactory-secrets.
  # Override per-environment: helm upgrade --set env.XAI_API_MODEL=gpt-4o-mini ...
  XAI_API_PROVIDER: "openai"
  XAI_API_MODEL: "gpt-4o"
  XAI_RETRY_ATTEMPTS: "3"
  XAI_CALL_TIMEOUT: "60"

  # Feature flags
  ENABLE_DATABASE: "1"
  ENABLE_REDIS: "1"
  ENABLE_PROMETHEUS: "1"
  ENABLE_AUDIT_LOGGING: "1"
  ENABLE_HSM: "0"
  ENABLE_FEATURE_STORE: "0"
  ENABLE_LIBVIRT: "0"

  # ---------------------------------------------------------------------------
  # Tier-1 AI Capability Feature Flags
  # ---------------------------------------------------------------------------
  # Feature 1: Quantum / Neuromorphic Array Backend
  # Controls omnicore_engine.array_backend.ArrayBackend — the numerical-computing
  # abstraction (NumPy/CuPy/Dask/PyTorch/Qiskit/Nengo backends).
  # NOTE: Unrelated to the Arbiter persistence layer, which was renamed from
  # ArrayBackend → PersistentArrayStore in self_fixing_engineer.arbiter.persistent_array_store.
  # Requires qiskit + qiskit-aer (quantum) or nengo (neuromorphic) to be installed.
  # Both fall back silently to NumPy when the optional libraries are absent.
  # Enable via: helm install --set env.ARRAY_BACKEND_QUANTUM=true ...
  ARRAY_BACKEND_QUANTUM: "false"
  ARRAY_BACKEND_NEUROMORPHIC: "false"

  # Feature 6: RL Metrics Collector — Prometheus scrape URL
  # Set to the in-cluster Prometheus endpoint to enable latency metric collection.
  # Example: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
  PROMETHEUS_URL: ""

  # Feature 5: Genetic Evolution Engine
  # Population size: genomes per generation. Increase for broader search.
  EVOLUTION_POPULATION_SIZE: "10"
  # Number of GA generations per run (IB-2: now read from env in arbiter.py).
  # Default 5 keeps cycles fast; increase for production tuning:
  #   helm upgrade --set env.EVOLUTION_GENERATIONS=10 ...
  EVOLUTION_GENERATIONS: "5"
  # GA backend selector for Arbiter.evolve(): auto | deap | custom
  # "auto" (default) prefers DEAP when available; falls back to the custom GA.
  # Override: helm upgrade --set env.EVOLUTION_BACKEND=deap ...
  EVOLUTION_BACKEND: "auto"
  # ArbiterGrowthManager evolutionary experiment parameters (arbiter_growth_manager.py).
  # Govern ArbiterExplorer.run_evolutionary_experiment(), which is separate from the
  # DEAP evolve_configs() call controlled by EVOLUTION_GENERATIONS above.
  # Override: helm upgrade --set env.EXPLORER_EVOLUTION_GENERATIONS=10 ...
  EXPLORER_EVOLUTION_GENERATIONS: "5"
  EXPLORER_EVOLUTION_POPULATION_SIZE: "10"
  # Minimum RL action-outcome samples before learn_from_data() trains the supervised model.
  # Raise to require more real RL-guided data before fitting.
  # Override: helm upgrade --set env.MIN_SUPERVISED_TRAINING_SAMPLES=100 ...
  MIN_SUPERVISED_TRAINING_SAMPLES: "50"

  # Guard for the experimental SelfEvolutionEngine.
  # When PRODUCTION_MODE=1 this flag MUST be "true" for SelfEvolutionEngine.start()
  # to proceed; any other value raises NotImplementedError (fail-closed default).
  # Set to "true" ONLY after full QA sign-off of the evolution subsystem:
  #   helm upgrade --set env.ENABLE_EXPERIMENTAL_EVOLUTION=true ...
  ENABLE_EXPERIMENTAL_EVOLUTION: "false"

  # Feature 2: LLM Feature Suggestion Cache TTL (seconds)
  FEATURE_SUGGESTION_CACHE_TTL: "3600"

  # Clarifier WebSocket Configuration
  # Session timeout for real-time clarifier Q&A WebSocket connections (seconds).
  CLARIFIER_WS_TIMEOUT: "300"

  # ---------------------------------------------------------------------------
  # Tier-2 Feature Configuration
  # ---------------------------------------------------------------------------

  # Job-Status WebSocket heartbeat / idle-connection timeout (seconds).
  # Controls JOBS_WS_TIMEOUT in server/routers/jobs_ws.py.
  # Must be ≤ the load-balancer idle-timeout (typically 60–600 s).
  JOBS_WS_TIMEOUT: "30"

  # Post-Quantum Cryptography signing for audit logs.
  # Set to "true" only after installing pqcrypto>=0.1.3 or liboqs-python>=0.12.0.
  # See requirements-pqc.txt for installation instructions.
  # Falls back gracefully to HMAC-SHA-256 when libraries are absent.
  USE_PQC_SIGNING: "false"

  # ============================================
  # Security Posture Configuration
  # ============================================
  # Encryption backend for data at rest.
  # Options: local (software AES), aws_kms, azure_keyvault.
  # See SECURITY_CONFIGURATION.md for full details.
  # Override: helm upgrade --set env.ENCRYPTION_MODE=aws_kms ...
  ENCRYPTION_MODE: "local"
  # Set to "1" to suppress security-posture startup warnings in development/staging.
  # Must be "0" in production so operators are alerted to unresolved settings.
  SUPPRESS_SECURITY_WARNINGS: "0"
  # Enable plugin integrity checks via HASH_MANIFEST.
  # Default "false"; set to "true" in production overlays together with HASH_MANIFEST.
  PLUGIN_INTEGRITY_CHECK_ENABLED: "false"
  # Sentry environment tag — used by sentry_sdk to distinguish prod/staging/dev events.
  # Override per chart release: helm upgrade --set env.SENTRY_ENVIRONMENT=staging ...
  # Must be one of: production, staging, development
  SENTRY_ENVIRONMENT: "production"

  # HashiCorp Vault JWT path (intent_capture/api.py, cli.py) - Bug 17 fix
  # Both API and CLI now use the same path so tokens are cross-compatible.
  # Override: helm upgrade --set env.JWT_VAULT_PATH=secrets/data/my-jwt ...
  JWT_VAULT_PATH: "secrets/data/jwt"
  
  # Kafka Configuration: Multiple variables for component compatibility
  # Different components check different variable names due to evolution of codebase:
  # - KAFKA_ENABLED: Primary flag checked by ArbiterConfig (via Pydantic validation_alias)
  #                  Used by: self_fixing_engineer/arbiter/config.py, database layer, policy engine
  # - ENABLE_KAFKA: Legacy flag checked by older components and server/config_utils.py
  #                 Used by: Some initialization code, compatibility layer
  # - USE_KAFKA_INGESTION: Controls Kafka for event ingestion in ShardedMessageBus
  #                        Used by: omnicore_engine/message_bus for job routing
  # - USE_KAFKA_AUDIT: Controls Kafka for audit event streaming
  #                    Used by: Audit logging system for distributed event collection
  # IMPORTANT: All four must be set to the same value for consistent behavior.
  # Set to "true" only when KAFKA_BOOTSTRAP_SERVERS is also provided via a Secret.
  ENABLE_KAFKA: "false"
  KAFKA_ENABLED: "false"
  USE_KAFKA_INGESTION: "false"
  USE_KAFKA_AUDIT: "false"
  
  ENABLE_CITUS: "1"  # Distributed PostgreSQL sharding via Citus

  # Blockchain/DLT Configuration
  # DLT backend type used by audit_log.py and (via initialize_dlt_backend) dlt_backend.py.
  # Options: simple (dev/in-memory), fabric (Hyperledger Fabric), evm or ethereum (EVM chains).
  # RB-5: "evm"/"ethereum" are fully supported — override per-cluster when using EVM:
  #   helm upgrade --set env.DLT_TYPE=evm ...
  # DLT_HMAC_KEY must be provided via codefactory-secrets Kubernetes Secret in production.
  DLT_TYPE: "fabric"

  # S3 off-chain blob storage (used by S3OffChainClient when DLT_TYPE=fabric)
  # Override: helm upgrade --set env.S3_BUCKET_NAME=my-bucket ...
  S3_BUCKET_NAME: "codefactory-dlt-offchain"
  S3_REGION: "us-east-1"
  # Enable AES-256-GCM client-side encryption; requires dlt-encryption-key secret.
  DLT_ENCRYPT_AT_REST: "true"

  # Hyperledger Fabric DLT client (used when DLT_TYPE=fabric)
  # Override per environment: helm upgrade --set env.FABRIC_CHANNEL=my-channel ...
  FABRIC_CHANNEL: "codefactory-channel"
  FABRIC_CHAINCODE: "codefactory-cc"
  FABRIC_ORG: "Org1"
  FABRIC_USER: "Admin"
  FABRIC_NETWORK_PROFILE: "/app/data/fabric/connection-profile.json"

  # ML/NLP Data Paths
  # NLTK data directory (accessible by appuser in Docker runtime)
  # Pre-downloaded during Docker build to avoid runtime downloads
  NLTK_DATA: "/opt/nltk_data"
  # HuggingFace model cache directory
  # Pre-downloaded models to prevent runtime downloads and ensure air-gapped compatibility
  HF_HOME: "/opt/huggingface_cache"
  TRANSFORMERS_CACHE: "/opt/huggingface_cache"

  # Audit Crypto Configuration
  # CRITICAL: "0" means fail fast if crypto cannot be initialized — the correct
  # setting for production. Set to "1" only in development/testing when audit
  # crypto is intentionally disabled.
  AUDIT_CRYPTO_MODE: "software"
  AUDIT_CRYPTO_ALLOW_INIT_FAILURE: "0"
  # Audit log compression algorithm (gzip, zstd, or none)
  COMPRESSION_ALGO: "gzip"

  # Kubernetes/Cloud Native secret management
  # For Kubernetes/Helm: Set USE_ENV_SECRETS=true (plaintext secrets, K8s encrypts via etcd)
  # For AWS: Set USE_ENV_SECRETS=false and configure KMS (see AWS_KMS_TROUBLESHOOTING.md)
  # Railway: Set USE_ENV_SECRETS=true (Railway encrypts at platform level)
  USE_ENV_SECRETS: "true"
  AUDIT_CRYPTO_USE_KMS: "false"  # KMS not used in Kubernetes - secrets managed by K8s

  # Docker validation: skip when Docker socket is not available (standard in K8s pods)
  SKIP_DOCKER_VALIDATION: "true"

  # Logging
  LOG_LEVEL: "INFO"
  ENABLE_STRUCTURED_LOGGING: "1"

  # Monitoring
  PROMETHEUS_PORT: "9090"
  # OpenTelemetry OTLP export endpoint (Bug 6 fix).
  # When set, the dlt-client-plugin routes spans to an OTLP collector instead of stdout,
  # preventing Railway's 500 logs/sec rate-limit hits during burst lint operations.
  # Override per release: helm upgrade --set env.OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
  OTEL_EXPORTER_OTLP_ENDPOINT: ""

  # Application Paths
  CREW_CONFIG_PATH: "/app/self_fixing_engineer/crew_config.yaml"
  AUDIT_LOG_PATH: "/app/logs/audit_trail.log"
  # Path to the Refactor Agent crew YAML configuration.
  # Defaults to the bundled refactor_agent.yaml baked into the container image.
  # Override with a mounted ConfigMap path if you need environment-specific config.
  # Example: helm upgrade --set env.REFACTOR_AGENT_CONFIG=/app/config/refactor_prod.yaml
  REFACTOR_AGENT_CONFIG: "/app/self_fixing_engineer/refactor_agent/refactor_agent.yaml"

  # ============================================
  # Self-Healing Import Fixer (SHIF) Settings
  # ============================================
  # Enable per-operation metrics in the import healer (fixer_dep.py).
  # Set to "true" to expose files_scanned, fixes_applied, and error counters.
  # Override per-environment:
  #   helm upgrade --set env.HEAL_METRICS=true ...
  HEAL_METRICS: "false"

  # Refactor Agent — ConfigDB remote resolution
  # Optional HTTPS endpoint for remote agent role/skill resolution by ConfigDBResolver.
  # Leave empty (default) to use the bundled local YAML (configdb_defaults.yaml).
  # When set, the host MUST also appear in CONFIGDB_ALLOWED_HOSTS (SSRF protection).
  # Example: helm upgrade --set env.CONFIGDB_REMOTE_ENDPOINT=https://config.internal.corp/configdb
  CONFIGDB_REMOTE_ENDPOINT: ""
  # Comma-separated list of hostnames permitted for remote ConfigDB requests.
  # Required when CONFIGDB_REMOTE_ENDPOINT is set; requests to unlisted hosts are blocked.
  # Example: helm upgrade --set env.CONFIGDB_ALLOWED_HOSTS=config.internal.corp
  CONFIGDB_ALLOWED_HOSTS: ""

  # MetaLearning state persistence path.
  # Points to the data PVC so state survives pod restarts.
  # Override if you mount the data volume at a different path.
  META_LEARNING_STATE_PATH: "/app/data/meta_learning_state.json"

  # ============================================
  # Arbiter Configuration
  # ============================================
  # Arbiter world-size: number of virtual agent slots managed by the primary Arbiter.
  # Increase for larger multi-agent deployments:
  #   helm upgrade --set env.ARBITER_WORLD_SIZE=20 ...
  ARBITER_WORLD_SIZE: "10"
  # Arbiter role: "admin" grants the primary arbiter full policy and governance access.
  ARBITER_ROLE: "admin"
  # Absolute path for the encrypted PolicyManager policy file.
  # MUST point to the data PVC mount so policies survive pod restarts.
  # Override if the data volume is mounted at a non-default path:
  #   helm upgrade --set env.POLICY_CONFIG_FILE_PATH=/data/policies.json ...
  POLICY_CONFIG_FILE_PATH: "/app/data/policies.json"
  # File provenance registry path — records which files were produced by the Generator
  # pipeline so the SFE can prioritise generated artefacts for quality checks.
  # MUST be on the data PVC so the registry survives pod restarts; otherwise the
  # Arbiter loses track of generator-produced files on every restart.
  # Override: helm upgrade --set env.ARBITER_PROVENANCE_PATH=/data/provenance.json ...
  ARBITER_PROVENANCE_PATH: "/app/data/provenance.json"

  # SFE Checkpoint Manager Paths (container-friendly defaults)
  # These use relative paths that resolve to /app/logs/checkpoint/ in containers
  # Override if custom paths are needed (e.g., mounted persistent volumes)
  # CHECKPOINT_AUDIT_LOG_PATH: "/app/logs/checkpoint/audit.log"
  # CHECKPOINT_DLQ_PATH: "/app/logs/checkpoint/dlq.jsonl"

  # Runner Configuration Path
  # Optional: Set custom path to runner configuration file
  # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
  # For production deployments, recommend explicit path for clarity
  # Default search order:
  #   1. RUNNER_CONFIG_PATH (if set)
  #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
  # Uncomment and set if needed:
  # RUNNER_CONFIG_PATH: "/app/generator/config.yaml"

  # Worker configuration
  # Number of uvicorn workers per pod (single-process mode)
  # FastAPI is fully async and doesn't benefit from multiple workers.
  # Multiple workers cause job synchronization issues (each worker has its own memory cache).
  # Set to 1 for consistent job state across requests.
  WORKER_COUNT: "1"

# Secrets configuration
# These should be created manually or via external secrets operator
secrets:
  # Redis configuration
  redis:
    host: "codefactory-redis"
    port: "6379"
    # Password should be provided via secret
    passwordSecretName: "codefactory-secrets"
    passwordSecretKey: "redis-password"

  # Database configuration (optional)
  database:
    enabled: false
    urlSecretName: "codefactory-secrets"
    urlSecretKey: "database-url"

  # API keys (required)
  apiKeys:
    openaiSecretName: "codefactory-secrets"
    openaiSecretKey: "openai-api-key"
    anthropicSecretName: "codefactory-secrets"
    anthropicSecretKey: "anthropic-api-key"

  # Security keys (CRITICAL for production)
  # Run 'make validate-secrets' to verify all required keys are set
  security:
    hmacKeySecretName: "codefactory-secrets"
    hmacKeySecretKey: "hmac-key"
    encryptionKeySecretName: "codefactory-secrets"
    encryptionKeySecretKey: "encryption-key"
    # Audit crypto master key (base64-encoded)
    # For non-KMS: Generate with python -c "import base64, os; print(base64.b64encode(os.urandom(32)).decode())"
    # For KMS: Encrypt the generated key with your KMS key
    # See docs/AWS_KMS_TROUBLESHOOTING.md and docs/RAILWAY_DEPLOYMENT.md
    auditCryptoMasterKeySecretName: "codefactory-secrets"
    auditCryptoMasterKeySecretKey: "audit-crypto-master-key"
    # Optional: KMS key ID for AWS KMS audit crypto
    kmsKeyIdSecretName: "codefactory-secrets"
    kmsKeyIdSecretKey: "kms-key-id"
    # CLI WebSocket JWT secret (intent_capture/cli.py) - Bug 4 fix
    # REQUIRED in production; cli.py emits a fatal warning if the insecure default is used
    cliJwtSecretName: "codefactory-secrets"
    cliJwtSecretKey: "cli-jwt-secret"
    # RabbitMQ URL for task queuing (intent_capture/api.py, cli.py) - Bug 10 fix
    # Only required when USE_QUEUE=true
    rabbitmqUrlSecretName: "codefactory-secrets"
    rabbitmqUrlSecretKey: "rabbitmq-url"

  # DLT / off-chain storage secrets
  # These are optional — leave the secret values empty to disable.
  dlt:
    # HMAC-SHA256 signing key for checkpoint integrity (dlt_backend, S3 client, Fabric client).
    # Generate: openssl rand -hex 32
    hmacKeySecretName: "codefactory-secrets"
    hmacKeySecretKey: "dlt-hmac-key"
    # AES-256-GCM client-side encryption key (required when DLT_ENCRYPT_AT_REST=true).
    # Generate: python -c "import os; print(os.urandom(32).hex())"
    encryptionKeySecretName: "codefactory-secrets"
    encryptionKeySecretKey: "dlt-encryption-key"
    # AWS credentials for S3 off-chain blob storage (optional — prefer IAM instance profile).
    awsAccessKeyIdSecretName: "codefactory-secrets"
    awsAccessKeyIdSecretKey: "aws-access-key-id"
    awsSecretAccessKeySecretName: "codefactory-secrets"
    awsSecretAccessKeySecretKey: "aws-secret-access-key"
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: "codefactory-secrets"
    existingSecretPasswordKey: "redis-password"
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

# Database migrations with Alembic
migrations:
  enabled: true
  # Run migrations as an init container (recommended) or separate Job
  runAs: "initContainer"  # Options: "initContainer", "job", "none"
  # Image configuration (uses same image as main app by default)
  image:
    # Leave empty to use main app image
    repository: ""
    tag: ""
    pullPolicy: ""
  # Job-specific configuration (only used if runAs: "job")
  job:
    # Automatically run migrations on helm upgrade
    autoRun: true
    # Keep successful job pods for debugging
    ttlSecondsAfterFinished: 300
    backoffLimit: 3
    annotations: {}
    # Use hook to run migrations before deployment
    hook:
      enabled: true
      weight: "-5"
      deletePolicy: "before-hook-creation"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Monitoring
monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
