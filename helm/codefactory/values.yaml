# Default values for Code Factory Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas (can be overridden by HPA)
replicaCount: 1

image:
  repository: ghcr.io/musicmonk42/codefactory
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Set to true if possible, requires tmpfs mounts
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  metricsPort: 9090
  annotations: {}

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # WebSocket support for /api/clarifier/ws/* endpoints
    nginx.ingress.kubernetes.io/proxy-set-header-upgrade: "$http_upgrade"
    nginx.ingress.kubernetes.io/proxy-set-header-connection: "upgrade"
    nginx.ingress.kubernetes.io/websocket-services: "codefactory-api"
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: codefactory.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: codefactory-tls
      hosts:
        - codefactory.example.com

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Startup probe - critical for agent loading
# Allows up to 120 seconds for background agent initialization (increased from 90s)
# to accommodate the 120s router loading timeout
startupProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 24  # 24 * 5s = 120s max startup time

# Liveness probe - restart if unhealthy
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

# Readiness probe - remove from load balancer if not ready
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

# Additional volumes and volume mounts
volumes: []
# - name: uploads
#   persistentVolumeClaim:
#     claimName: codefactory-uploads

volumeMounts: []
# - name: uploads
#   mountPath: /app/uploads

# Persistent storage
persistence:
  uploads:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteMany
    size: 10Gi
    annotations: {}
  workspace:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteMany
    size: 5Gi
    annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Topology spread for better availability
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: codefactory

# Environment variables
env:
  # Application Environment
  PRODUCTION_MODE: "1"
  APP_ENV: "production"
  DEV_MODE: "0"

  # Startup Optimization
  APP_STARTUP: "1"
  SKIP_IMPORT_TIME_VALIDATION: "1"
  SPACY_WARNING_IGNORE: "W007"

  # Performance optimizations
  PARALLEL_AGENT_LOADING: "1"
  LAZY_LOAD_ML: "1"
  STARTUP_TIMEOUT: "90"

  # Agent Loading Race Condition Prevention
  # Resilience settings for jobs submitted during agent loading phase
  # Production values: longer timeouts and more retries for stability
  AGENT_WAIT_TIMEOUT: "120"  # Max seconds to wait for agents to load
  AGENT_WAIT_INTERVAL: "2"   # Check interval in seconds
  AGENT_RETRY_ATTEMPTS: "5"  # Number of retry attempts for agent loading
  AGENT_RETRY_BASE_DELAY: "5"  # Base delay for exponential backoff (seconds)
  AGENT_RETRY_MAX_DELAY: "45"  # Maximum delay cap for backoff

  # Database Configuration
  DB_POOL_SIZE: "50"
  DB_POOL_MAX_OVERFLOW: "20"
  DB_RETRY_ATTEMPTS: "3"
  DB_RETRY_DELAY: "1.0"

  # Message Bus Configuration
  MESSAGE_BUS_SHARD_COUNT: "8"
  MESSAGE_BUS_WORKERS_PER_SHARD: "4"
  ENABLE_MESSAGE_BUS_GUARDIAN: "1"
  MESSAGE_BUS_GUARDIAN_INTERVAL: "30"
  # Canonical shard count for the OmniCore message bus (Feature 5).
  # Takes precedence over MESSAGE_BUS_SHARD_COUNT when both are set.
  # See docs/SHARDING_GUIDE.md for sizing recommendations.
  MESSAGE_BUS_SHARDS: "8"

  # LLM Configuration
  DEFAULT_LLM_PROVIDER: "openai"
  LLM_TIMEOUT: "300"
  LLM_MAX_RETRIES: "3"
  LLM_TEMPERATURE: "0.7"
  TESTGEN_LLM_TIMEOUT: "300"
  # LLM_USE_MOCK: set to "true" ONLY for non-production testing when no real API keys are
  # available. agent_core.init_llm() raises ValueError on a missing key unless
  # this flag is "true". Never enable in staging or production deployments.
  LLM_USE_MOCK: "false"

  # XAI Test-Generation API (XAITestGenerationAPI in gen_plugins.py)
  # Non-secret tuning knobs — the XAI_API_KEY credential lives in codefactory-secrets.
  # Override per-environment: helm upgrade --set env.XAI_API_MODEL=gpt-4o-mini ...
  XAI_API_PROVIDER: "openai"
  XAI_API_MODEL: "gpt-4o"
  XAI_RETRY_ATTEMPTS: "3"
  XAI_CALL_TIMEOUT: "60"

  # Feature flags
  ENABLE_DATABASE: "1"
  ENABLE_REDIS: "1"
  ENABLE_PROMETHEUS: "1"
  ENABLE_AUDIT_LOGGING: "1"
  ENABLE_HSM: "0"
  ENABLE_FEATURE_STORE: "0"
  ENABLE_LIBVIRT: "0"

  # ---------------------------------------------------------------------------
  # Tier-1 AI Capability Feature Flags
  # ---------------------------------------------------------------------------
  # Feature 1: Quantum / Neuromorphic Array Backend
  # Requires qiskit + qiskit-aer (quantum) or nengo (neuromorphic) to be installed.
  # Both fall back silently to NumPy when the optional libraries are absent.
  # Enable via: helm install --set env.ARRAY_BACKEND_QUANTUM=true ...
  ARRAY_BACKEND_QUANTUM: "false"
  ARRAY_BACKEND_NEUROMORPHIC: "false"

  # Feature 6: RL Metrics Collector — Prometheus scrape URL
  # Set to the in-cluster Prometheus endpoint to enable latency metric collection.
  # Example: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
  PROMETHEUS_URL: ""

  # Feature 5: Genetic Evolution Engine population size
  EVOLUTION_POPULATION_SIZE: "10"

  # Feature 2: LLM Feature Suggestion Cache TTL (seconds)
  FEATURE_SUGGESTION_CACHE_TTL: "3600"

  # Clarifier WebSocket Configuration
  # Session timeout for real-time clarifier Q&A WebSocket connections (seconds).
  CLARIFIER_WS_TIMEOUT: "300"

  # ---------------------------------------------------------------------------
  # Tier-2 Feature Configuration
  # ---------------------------------------------------------------------------

  # Job-Status WebSocket heartbeat / idle-connection timeout (seconds).
  # Controls JOBS_WS_TIMEOUT in server/routers/jobs_ws.py.
  # Must be ≤ the load-balancer idle-timeout (typically 60–600 s).
  JOBS_WS_TIMEOUT: "30"

  # Post-Quantum Cryptography signing for audit logs.
  # Set to "true" only after installing pqcrypto>=0.1.3 or liboqs-python>=0.12.0.
  # See requirements-pqc.txt for installation instructions.
  # Falls back gracefully to HMAC-SHA-256 when libraries are absent.
  USE_PQC_SIGNING: "false"
  
  # Kafka Configuration: Multiple variables for component compatibility
  # Different components check different variable names due to evolution of codebase:
  # - KAFKA_ENABLED: Primary flag checked by ArbiterConfig (via Pydantic validation_alias)
  #                  Used by: self_fixing_engineer/arbiter/config.py, database layer, policy engine
  # - ENABLE_KAFKA: Legacy flag checked by older components and server/config_utils.py
  #                 Used by: Some initialization code, compatibility layer
  # - USE_KAFKA_INGESTION: Controls Kafka for event ingestion in ShardedMessageBus
  #                        Used by: omnicore_engine/message_bus for job routing
  # - USE_KAFKA_AUDIT: Controls Kafka for audit event streaming
  #                    Used by: Audit logging system for distributed event collection
  # All four should be set to the same value for consistent behavior.
  # Setting all to "true" enables Kafka across the entire platform.
  ENABLE_KAFKA: "true"  # Legacy flag - Keep for backward compatibility
  KAFKA_ENABLED: "true"  # Primary flag - Main configuration source
  USE_KAFKA_INGESTION: "true"  # Message bus ingestion - Event routing
  USE_KAFKA_AUDIT: "true"  # Audit system - Compliance logging
  
  ENABLE_CITUS: "0"  # Set to "1" to enable Citus distributed SQL features

  # ML/NLP Data Paths
  # NLTK data directory (accessible by appuser in Docker runtime)
  # Pre-downloaded during Docker build to avoid runtime downloads
  NLTK_DATA: "/opt/nltk_data"
  # HuggingFace model cache directory
  # Pre-downloaded models to prevent runtime downloads and ensure air-gapped compatibility
  HF_HOME: "/opt/huggingface_cache"
  TRANSFORMERS_CACHE: "/opt/huggingface_cache"

  # Audit Crypto Configuration
  # CRITICAL: For production deployments, set AUDIT_CRYPTO_ALLOW_INIT_FAILURE=0
  # to fail fast if crypto cannot be initialized. Change to "1" only for
  # development/testing when audit crypto is intentionally disabled.
  AUDIT_CRYPTO_MODE: "software"
  AUDIT_CRYPTO_ALLOW_INIT_FAILURE: "1"  # Set to "0" for production
  # Audit log compression algorithm (gzip, zstd, or none)
  COMPRESSION_ALGO: "gzip"

  # Kubernetes/Cloud Native secret management
  # For Kubernetes/Helm: Set USE_ENV_SECRETS=true (plaintext secrets, K8s encrypts via etcd)
  # For AWS: Set USE_ENV_SECRETS=false and configure KMS (see AWS_KMS_TROUBLESHOOTING.md)
  # Railway: Set USE_ENV_SECRETS=true (Railway encrypts at platform level)
  USE_ENV_SECRETS: "true"
  AUDIT_CRYPTO_USE_KMS: "false"  # KMS not used in Kubernetes - secrets managed by K8s

  # Docker validation: skip when Docker socket is not available (standard in K8s pods)
  SKIP_DOCKER_VALIDATION: "true"

  # Logging
  LOG_LEVEL: "INFO"
  ENABLE_STRUCTURED_LOGGING: "1"

  # Monitoring
  PROMETHEUS_PORT: "9090"

  # Application Paths
  CREW_CONFIG_PATH: "/app/self_fixing_engineer/crew_config.yaml"
  AUDIT_LOG_PATH: "/app/logs/audit_trail.log"

  # SFE Checkpoint Manager Paths (container-friendly defaults)
  # These use relative paths that resolve to /app/logs/checkpoint/ in containers
  # Override if custom paths are needed (e.g., mounted persistent volumes)
  # CHECKPOINT_AUDIT_LOG_PATH: "/app/logs/checkpoint/audit.log"
  # CHECKPOINT_DLQ_PATH: "/app/logs/checkpoint/dlq.jsonl"

  # Runner Configuration Path
  # Optional: Set custom path to runner configuration file
  # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
  # For production deployments, recommend explicit path for clarity
  # Default search order:
  #   1. RUNNER_CONFIG_PATH (if set)
  #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
  # Uncomment and set if needed:
  # RUNNER_CONFIG_PATH: "/app/generator/config.yaml"

  # Worker configuration
  # Number of uvicorn workers per pod (single-process mode)
  # FastAPI is fully async and doesn't benefit from multiple workers.
  # Multiple workers cause job synchronization issues (each worker has its own memory cache).
  # Set to 1 for consistent job state across requests.
  WORKER_COUNT: "1"

# Secrets configuration
# These should be created manually or via external secrets operator
secrets:
  # Redis configuration
  redis:
    host: "codefactory-redis"
    port: "6379"
    # Password should be provided via secret
    passwordSecretName: "codefactory-secrets"
    passwordSecretKey: "redis-password"

  # Database configuration (optional)
  database:
    enabled: false
    urlSecretName: "codefactory-secrets"
    urlSecretKey: "database-url"

  # API keys (required)
  apiKeys:
    openaiSecretName: "codefactory-secrets"
    openaiSecretKey: "openai-api-key"
    anthropicSecretName: "codefactory-secrets"
    anthropicSecretKey: "anthropic-api-key"

  # Security keys (CRITICAL for production)
  # Run 'make validate-secrets' to verify all required keys are set
  security:
    hmacKeySecretName: "codefactory-secrets"
    hmacKeySecretKey: "hmac-key"
    encryptionKeySecretName: "codefactory-secrets"
    encryptionKeySecretKey: "encryption-key"
    # Audit crypto master key (base64-encoded)
    # For non-KMS: Generate with python -c "import base64, os; print(base64.b64encode(os.urandom(32)).decode())"
    # For KMS: Encrypt the generated key with your KMS key
    # See docs/AWS_KMS_TROUBLESHOOTING.md and docs/RAILWAY_DEPLOYMENT.md
    auditCryptoMasterKeySecretName: "codefactory-secrets"
    auditCryptoMasterKeySecretKey: "audit-crypto-master-key"
    # Optional: KMS key ID for AWS KMS audit crypto
    kmsKeyIdSecretName: "codefactory-secrets"
    kmsKeyIdSecretKey: "kms-key-id"

# Redis subchart configuration
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: "codefactory-secrets"
    existingSecretPasswordKey: "redis-password"
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

# Database migrations with Alembic
migrations:
  enabled: true
  # Run migrations as an init container (recommended) or separate Job
  runAs: "initContainer"  # Options: "initContainer", "job", "none"
  # Image configuration (uses same image as main app by default)
  image:
    # Leave empty to use main app image
    repository: ""
    tag: ""
    pullPolicy: ""
  # Job-specific configuration (only used if runAs: "job")
  job:
    # Automatically run migrations on helm upgrade
    autoRun: true
    # Keep successful job pods for debugging
    ttlSecondsAfterFinished: 300
    backoffLimit: 3
    annotations: {}
    # Use hook to run migrations before deployment
    hook:
      enabled: true
      weight: "-5"
      deletePolicy: "before-hook-creation"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Monitoring
monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
