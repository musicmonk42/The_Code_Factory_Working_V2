apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "codefactory.fullname" . }}
  labels:
    {{- include "codefactory.labels" . | nindent 4 }}
data:
  # Environment configuration
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
