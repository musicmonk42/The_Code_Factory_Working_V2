# This is a template for creating secrets
# In production, create secrets manually or use External Secrets Operator
# DO NOT commit actual secrets to git

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "codefactory.fullname" . }}-secrets
  labels:
    {{- include "codefactory.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Redis password
  # Generate with: openssl rand -base64 32
  redis-password: "CHANGEME"
  
  # Database URL (if using PostgreSQL)
  # Format: postgresql+asyncpg://user:password@host:5432/dbname
  database-url: "postgresql+asyncpg://codefactory:CHANGEME@postgres:5432/codefactory"
  
  # OpenAI API Key (REQUIRED)
  openai-api-key: "sk-CHANGEME"
  
  # Anthropic API Key (optional)
  anthropic-api-key: "sk-ant-CHANGEME"
  
  # Google AI API Key (optional)
  google-api-key: "CHANGEME"
  
  # XAI/Grok API Key (optional)
  xai-api-key: "CHANGEME"
  grok-api-key: "CHANGEME"
  
  # Ollama Host (optional, for local LLM)
  ollama-host: ""
  
  # HMAC key for audit logging
  # Generate with: openssl rand -hex 32
  hmac-key: "CHANGEME"
  
  # Encryption key for sensitive data
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  encryption-key: "CHANGEME"
  
  # KMS Key ID (optional, for AWS KMS)
  kms-key-id: ""
  
  # Audit Crypto Master Encryption Key (optional, base64 encoded)
  audit-crypto-key: ""
  
  # Sentry DSN (optional, for error tracking)
  sentry-dsn: ""
  
  # CORS Allowed Origins (optional, comma-separated)
  allowed-origins: ""
