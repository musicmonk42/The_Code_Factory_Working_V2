# This is a template for creating secrets
# In production, create secrets manually or use External Secrets Operator
# DO NOT commit actual secrets to git

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "codefactory.fullname" . }}-secrets
  labels:
    {{- include "codefactory.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Redis password
  # Generate with: openssl rand -base64 32
  redis-password: "CHANGEME"

  # Database URL (if using PostgreSQL)
  # Format: postgresql+asyncpg://user:password@host:5432/dbname
  database-url: "postgresql+asyncpg://codefactory:CHANGEME@postgres:5432/codefactory"

  # OpenAI API Key (REQUIRED)
  openai-api-key: "sk-CHANGEME"

  # Anthropic API Key (optional)
  anthropic-api-key: "sk-ant-CHANGEME"

  # Google AI API Key (optional)
  google-api-key: "CHANGEME"

  # XAI/Grok API Key (optional)
  xai-api-key: "CHANGEME"
  grok-api-key: "CHANGEME"

  # Ollama Host (optional, for local LLM)
  ollama-host: ""

  # HMAC key for audit logging
  # Generate with: openssl rand -hex 32
  hmac-key: "CHANGEME"

  # Encryption key for sensitive data
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  encryption-key: "CHANGEME"

  # KMS Key ID (optional, for AWS KMS)
  kms-key-id: ""

  # Audit Crypto Master Encryption Key (CRITICAL - Required for production)
  # 
  # KUBERNETES/HELM DEPLOYMENTS (non-KMS):
  #   Generate UNENCRYPTED base64 key:
  #   python -c "import base64, os; print(base64.b64encode(os.urandom(32)).decode())"
  #   
  #   Set USE_ENV_SECRETS=true in values.yaml env section (already configured)
  #   Kubernetes handles encryption at rest via etcd encryption
  #
  # AWS KMS DEPLOYMENTS (if using AWS):
  #   1. Generate plaintext key (command above)
  #   2. Encrypt with KMS:
  #      aws kms encrypt --key-id alias/your-key \
  #        --plaintext fileb://<(echo -n 'YOUR_KEY' | base64 -d) \
  #        --query CiphertextBlob --output text
  #   3. Set USE_ENV_SECRETS=false and AUDIT_CRYPTO_USE_KMS=true in values.yaml
  #   4. Use the resulting ciphertext below
  #
  # See docs/AWS_KMS_TROUBLESHOOTING.md and docs/RAILWAY_DEPLOYMENT.md for details
  audit-crypto-key: ""

  # Sentry DSN (optional, for error tracking)
  sentry-dsn: ""

  # CORS Allowed Origins (optional, comma-separated)
  allowed-origins: ""

  # Audit log cryptographic signing keys (required for PRIVATE_KEY_B64 signer)
  # Generate private key: openssl genrsa -out private.pem 2048
  # Base64 encode: base64 -w0 private.pem
  private-key-b64: ""
  private-key-password: ""

  # ============================================================
  # test_generation / self_fixing_engineer integration secrets
  # These are OPTIONAL — omit or leave blank to disable the
  # corresponding integration.  All integrations degrade
  # gracefully when not configured.
  # ============================================================

  # GitHub integration (PRCreator.create_pr)
  # Required fields: GITHUB_TOKEN + pr_integration.repo in config
  # Generate at: https://github.com/settings/tokens (repo + workflow scopes)
  github-token: ""

  # Jira Cloud integration (PRCreator.create_jira_ticket)
  # Set JIRA_EMAIL when targeting Jira Cloud (uses Basic base64(email:token) auth).
  # Omit JIRA_EMAIL for Jira Server / Data Center (uses Bearer PAT auth instead).
  # Generate API token at: https://id.atlassian.com/manage-profile/security/api-tokens
  jira-api-url: ""
  jira-email: ""
  jira-api-token: ""

  # Neo4j KnowledgeGraphClient backend (KnowledgeGraphClient)
  # Falls back to local JSON file (atco_artifacts/knowledge_graph.json) when not set.
  # Format: bolt://host:7687 or neo4j+s://host:7687
  neo4j-uri: ""
  neo4j-user: ""
  neo4j-password: ""

  # ============================================================
  # DLT / off-chain storage secrets
  # ============================================================

  # HMAC-SHA256 signing key for DLT checkpoint integrity.
  # Generate: openssl rand -hex 32
  dlt-hmac-key: "CHANGEME"

  # AES-256-GCM client-side encryption key for S3 off-chain blobs.
  # Required when DLT_ENCRYPT_AT_REST=true.
  # Generate: python -c "import os; print(os.urandom(32).hex())"
  dlt-encryption-key: "CHANGEME_64_CHAR_HEX"

  # AWS credentials for S3 off-chain blob storage (optional — prefer IAM instance profile).
  aws-access-key-id: ""
  aws-secret-access-key: ""
