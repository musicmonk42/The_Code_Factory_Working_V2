apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codefactory.fullname" . }}
  labels:
    {{- include "codefactory.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployments
  selector:
    matchLabels:
      {{- include "codefactory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "codefactory.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "codefactory.serviceAccountName" . }}
      # terminationGracePeriodSeconds must exceed preStop sleep + uvicorn graceful shutdown
      # timeout + buffer.  See values.yaml for the rationale and formula.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 90 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c']
          args:
            - |
              until nc -z {{ .Values.secrets.redis.host }} {{ .Values.secrets.redis.port }}; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        {{- if and .Values.migrations.enabled (eq .Values.migrations.runAs "initContainer") }}
        - name: run-migrations
          image: "{{ .Values.migrations.image.repository | default .Values.image.repository }}:{{ .Values.migrations.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy | default .Values.image.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              echo "Running database migrations with Alembic..."
              cd /app
              alembic upgrade head
              echo "Migrations completed successfully"
          env:
            {{- if .Values.secrets.database.enabled }}
            - name: DB_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.urlSecretName }}
                  key: {{ .Values.secrets.database.urlSecretKey }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.urlSecretName }}
                  key: {{ .Values.secrets.database.urlSecretKey }}
            {{- end }}
            - name: APP_ENV
              value: "{{ .Values.env.APP_ENV }}"
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
            # Disable features not needed during migrations to prevent connection attempts
            # at module-import time (mirrors the same flags in k8s/base/migration-job.yaml)
            - name: ENABLE_REDIS
              value: "0"
            - name: ENABLE_PROMETHEUS
              value: "0"
            - name: SKIP_IMPORT_TIME_VALIDATION
              value: "1"
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        {{- end }}
        # Seed the data PVC with bundled default files on first boot.
        # Copies policies.json and provenance.json from /app/data-bundled (baked into the image)
        # to the writable data PVC (/app/data) if the files are not already present.
        - name: seed-data
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['sh', '-c']
          args:
            - |
              set -e
              DATA_DIR=/app/data
              BUNDLED_DIR=/app/data-bundled
              echo "Seeding data PVC from bundled defaults..."
              for f in policies.json provenance.json; do
                if [ ! -f "$DATA_DIR/$f" ] && [ -f "$BUNDLED_DIR/$f" ]; then
                  cp "$BUNDLED_DIR/$f" "$DATA_DIR/$f"
                  echo "Seeded $f"
                fi
              done
              echo "Data seeding complete."
          volumeMounts:
            - name: data
              mountPath: /app/data
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurityContext.runAsUser }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      containers:
        - name: codefactory
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "codefactory.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Redis configuration
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.secrets.redis.host }}:{{ .Values.secrets.redis.port }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.passwordSecretName }}
                  key: {{ .Values.secrets.redis.passwordSecretKey }}
            {{- if .Values.secrets.database.enabled }}
            # Database configuration
            - name: DB_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.urlSecretName }}
                  key: {{ .Values.secrets.database.urlSecretKey }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.urlSecretName }}
                  key: {{ .Values.secrets.database.urlSecretKey }}
            {{- end }}
            # API keys
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: {{ .Values.secrets.apiKeys.openaiSecretKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.anthropicSecretName }}
                  key: {{ .Values.secrets.apiKeys.anthropicSecretKey }}
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: google-api-key
                  optional: true
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: xai-api-key
                  optional: true
            {{- /* XAI Test-Generation API tuning knobs — non-secret, sourced from env values */}}
            - name: XAI_API_PROVIDER
              value: {{ .Values.env.XAI_API_PROVIDER | default "openai" | quote }}
            - name: XAI_API_MODEL
              value: {{ .Values.env.XAI_API_MODEL | default "gpt-4o" | quote }}
            - name: XAI_RETRY_ATTEMPTS
              value: {{ .Values.env.XAI_RETRY_ATTEMPTS | default "3" | quote }}
            - name: XAI_CALL_TIMEOUT
              value: {{ .Values.env.XAI_CALL_TIMEOUT | default "60" | quote }}
            - name: GROK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: grok-api-key
                  optional: true
            - name: OLLAMA_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: ollama-host
                  optional: true
            # Security keys
            - name: AGENTIC_AUDIT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.hmacKeySecretName }}
                  key: {{ .Values.secrets.security.hmacKeySecretKey }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: {{ .Values.secrets.security.encryptionKeySecretKey }}
            - name: KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: kms-key-id
                  optional: true
            - name: AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: audit-crypto-key
                  optional: true
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: sentry-dsn
                  optional: true
            - name: SENTRY_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codefactory.fullname" . }}-config
                  key: SENTRY_ENVIRONMENT
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: allowed-origins
                  optional: true
            - name: PRIVATE_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: private-key-b64
                  optional: true
            - name: PRIVATE_KEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: private-key-password
                  optional: true

            {{- /* ---- DLT / off-chain storage secrets ---- */}}
            - name: DLT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dlt.hmacKeySecretName }}
                  key: {{ .Values.secrets.dlt.hmacKeySecretKey }}
                  optional: true
            - name: DLT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dlt.encryptionKeySecretName }}
                  key: {{ .Values.secrets.dlt.encryptionKeySecretKey }}
                  optional: true
            # AWS credentials for S3 off-chain storage (optional — prefer IAM instance profile).
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dlt.awsAccessKeyIdSecretName }}
                  key: {{ .Values.secrets.dlt.awsAccessKeyIdSecretKey }}
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dlt.awsSecretAccessKeySecretName }}
                  key: {{ .Values.secrets.dlt.awsSecretAccessKeySecretKey }}
                  optional: true
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.uploads.enabled }}
            - name: uploads
              mountPath: /app/uploads
            {{- end }}
            {{- if .Values.persistence.workspace.enabled }}
            - name: workspace
              mountPath: /app/workspace
            {{- end }}
            - name: logs
              mountPath: /app/logs
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
        {{- if .Values.persistence.uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "codefactory.fullname" . }}-uploads
        {{- end }}
        {{- if .Values.persistence.workspace.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "codefactory.fullname" . }}-workspace
        {{- end }}
        - name: logs
          emptyDir: {}
        # data is a PVC when persistence.data.enabled, otherwise ephemeral emptyDir.
        # Using a PVC ensures MetaLearning state and other runtime data survive pod restarts.
        {{- if .Values.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "codefactory.fullname" . }}-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
