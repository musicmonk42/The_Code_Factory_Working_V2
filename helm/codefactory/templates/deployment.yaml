apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codefactory.fullname" . }}
  labels:
    {{- include "codefactory.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployments
  selector:
    matchLabels:
      {{- include "codefactory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "codefactory.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "codefactory.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c']
          args:
            - |
              until nc -z {{ .Values.secrets.redis.host }} {{ .Values.secrets.redis.port }}; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "codefactory.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Redis configuration
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.secrets.redis.host }}:{{ .Values.secrets.redis.port }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.passwordSecretName }}
                  key: {{ .Values.secrets.redis.passwordSecretKey }}
            {{- if .Values.secrets.database.enabled }}
            # Database configuration
            - name: DB_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.urlSecretName }}
                  key: {{ .Values.secrets.database.urlSecretKey }}
            {{- end }}
            # API keys
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: {{ .Values.secrets.apiKeys.openaiSecretKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.anthropicSecretName }}
                  key: {{ .Values.secrets.apiKeys.anthropicSecretKey }}
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: google-api-key
                  optional: true
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: xai-api-key
                  optional: true
            - name: GROK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: grok-api-key
                  optional: true
            - name: OLLAMA_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeys.openaiSecretName }}
                  key: ollama-host
                  optional: true
            # Security keys
            - name: AGENTIC_AUDIT_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.hmacKeySecretName }}
                  key: {{ .Values.secrets.security.hmacKeySecretKey }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: {{ .Values.secrets.security.encryptionKeySecretKey }}
            - name: KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: kms-key-id
                  optional: true
            - name: AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: audit-crypto-key
                  optional: true
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: sentry-dsn
                  optional: true
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.security.encryptionKeySecretName }}
                  key: allowed-origins
                  optional: true
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.uploads.enabled }}
            - name: uploads
              mountPath: /app/uploads
            {{- end }}
            {{- if .Values.persistence.workspace.enabled }}
            - name: workspace
              mountPath: /app/workspace
            {{- end }}
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
        {{- if .Values.persistence.uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "codefactory.fullname" . }}-uploads
        {{- end }}
        {{- if .Values.persistence.workspace.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "codefactory.fullname" . }}-workspace
        {{- end }}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
