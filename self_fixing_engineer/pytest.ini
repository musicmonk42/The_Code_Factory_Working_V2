[pytest]
# Pytest configuration for self_fixing_engineer tests
markers =
    heavy: marks tests as heavy/resource-intensive (deselect with '-m "not heavy"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Default test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore certain patterns during collection
norecursedirs = .git .tox dist build *.egg __pycache__

# Memory optimization settings
# Disable output capturing to reduce memory usage
addopts = 
    --strict-markers
    --tb=short
    -p no:cacheprovider
    -p no:randomly

# Timeout for individual tests (5 minutes)
timeout = 300
