[pytest]
# Pytest configuration for self_fixing_engineer tests
markers =
    heavy: marks tests as heavy/resource-intensive (deselect with '-m "not heavy"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    e2e: marks tests as end-to-end tests
    timeout: marks test with timeout

# Default test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore certain patterns during collection
norecursedirs = .git .tox dist build *.egg __pycache__

# Memory optimization settings
addopts = 
    --strict-markers
    --tb=short
    --asyncio-mode=auto

# Timeout settings - more aggressive
timeout = 300
timeout_method = thread
timeout_func_only = true

# Asyncio settings - stricter cleanup
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# pytest-xdist settings - distributed testing support
# Note: -n and --dist arguments are passed from command line in CI workflow
