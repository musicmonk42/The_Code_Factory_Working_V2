# === AuditLogger Core: Mesh-Native, Multi-Signer, Agentic, Adaptive ===
AUDIT_LOG_PATH = os.environ.get("AUDIT_LOG_PATH", "simulation/results/audit_trail.log")
AUDIT_LOCK = threading.RLock()

class AuditLogger:
    def __init__(
        self,
        log_path: Optional[str] = None,
        signers: Optional[List[Any]] = None,
        hash_algo: str = "sha3_512",
        plugins: Optional[List[Callable[[dict], None]]] = None,
        policy: Optional[AdaptivePolicy] = None,
    ):
        self.log_path = log_path or AUDIT_LOG_PATH
        self.signers = signers or []
        self.hash_algo = hash_algo
        self.plugins = plugins or PLUGIN_REGISTRY
        self.policy = policy or AdaptivePolicy([notify_email, notify_slack, notify_mesh])

    def log(self, event_type: str, details: Dict[str, Any], artifact_path: Optional[str] = None, extra: Optional[Dict[str, Any]] = None):
        entry = {
            "timestamp": current_utc_iso(),
            "event_type": event_type,
            "details": details,
            "artifact_path": artifact_path,
            "host": socket.gethostname(),
        }
        if extra:
            entry.update(extra)

        entry["signatures"] = []
        if self.signers and CRYPTO_AVAILABLE:
            raw = json.dumps(_strip_signatures(entry), sort_keys=True, separators=(",", ":")).encode()
            for signer in self.signers:
                try:
                    sig = signer.sign(raw)
                    entry["signatures"].append(sig.hex())
                except Exception:
                    entry["signatures"].append("error")
        entry["hash"] = hash_entry(_strip_signatures(entry), self.hash_algo)

        # Thread-safe append & streaming
        with AUDIT_LOCK:
            with open(self.log_path, "a", encoding="utf-8") as f:
                f.write(json.dumps(entry, sort_keys=True) + "\n")

        # === Plugin/Adapter/Auto-Discovery for Universal Integration ===
        for plugin in self.plugins:
            try:
                plugin(entry)
            except Exception:
                pass
        auto_discover_adapters(entry)
        log_blockchain(entry)  # DLT/Chain plugins

        # === Adaptive Agentic Policy/Alert/Automation ===
        if self.policy:
            self.policy.apply(entry)

    def log_event(self, event_type: str, **kwargs):
        artifact_path = kwargs.pop("artifact_path", None)
        extra = kwargs.pop("extra", None)
        self.log(event_type, kwargs, artifact_path=artifact_path, extra=extra)

    def verify_entry(self, entry: Dict[str, Any], pubkeys: Union[Any, List[Any]]) -> bool:
        if not CRYPTO_AVAILABLE or not entry.get("signatures"):
            return False
        if not isinstance(pubkeys, list):
            pubkeys = [pubkeys]
        raw = json.dumps(_strip_signatures(entry), sort_keys=True, separators=(",", ":")).encode()
        for sig in entry["signatures"]:
            verified = False
            for pub in pubkeys:
                try:
                    pub.verify(bytes.fromhex(sig), raw)
                    verified = True
                    break
                except Exception:
                    continue
            if not verified:
                return False
        return True

    def live_subscribe(self, hook: Callable[[dict], None]):
        self.plugins.append(hook)

    def query(self, filter_fn: Optional[Callable[[dict], bool]] = None, max_results: Optional[int] = None) -> List[dict]:
        log = load_audit_log(self.log_path)
        results = [e for e in log if not filter_fn or filter_fn(e)]
        if max_results is not None:
            return results[:max_results]
        return results

    def summarize(self) -> Dict[str, Any]:
        log = load_audit_log(self.log_path)
        by_type = {}
        for entry in log:
            et = entry["event_type"]
            by_type.setdefault(et, 0)
            by_type[et] += 1
        return {
            "total_events": len(log),
            "event_breakdown": by_type,
            "first_event": log[0]["timestamp"] if log else None,
            "last_event": log[-1]["timestamp"] if log else None,
        }

# === Open Trust/Provenance Mesh Utilities ===
def load_audit_log(log_path: Optional[str] = None) -> List[dict]:
    path = log_path or AUDIT_LOG_PATH
    if not os.path.exists(path):
        return []
    with open(path, "r", encoding="utf-8") as f:
        return [json.loads(line) for line in f if line.strip()]

def summarize_audit_log(log_path: Optional[str] = None) -> Dict[str, Any]:
    return AuditLogger(log_path=log_path).summarize()

def time_travel_search(log_path: Optional[str], timestamp: str) -> List[dict]:
    log = load_audit_log(log_path)
    return [e for e in log if e["timestamp"] <= timestamp]

def verify_audit_chain(log_path: Optional[str] = None) -> bool:
    log = load_audit_log(log_path)
    prev_hash = None
    for entry in log:
        entry_hash = hash_entry(_strip_signatures(entry))
        if entry_hash != entry.get("hash"):
            return False
        prev_hash = entry_hash
    return True

# === Quantum/Post-Quantum Key Management ===
def generate_ed25519_keypair(save_private_to: Optional[str] = None) -> Any:
    if not CRYPTO_AVAILABLE:
        raise ImportError("cryptography not installed.")
    private_key = Ed25519PrivateKey.generate()
    if save_private_to:
        with open(save_private_to, "wb") as f:
            f.write(private_key.private_bytes(
                encoding=serialization.Encoding.PEM,
                format=serialization.PrivateFormat.PKCS8,
                encryption_algorithm=serialization.NoEncryption(),
            ))
    return private_key

def load_ed25519_private_key(path: str) -> Any:
    if not CRYPTO_AVAILABLE:
        raise ImportError("cryptography not installed.")
    with open(path, "rb") as f:
        return serialization.load_pem_private_key(f.read(), password=None)

def load_ed25519_public_key_from_private(private_key: Any):
    return private_key.public_key()

