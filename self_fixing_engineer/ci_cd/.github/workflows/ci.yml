# === Dynamic SIEM, DLT, Mesh, Notification, and Dashboard Discovery ===
def auto_discover_adapters(entry: dict):
    """Dynamically discover and invoke all mesh/SIEM/DLT/notification endpoints present in env or config."""
    for envvar in os.environ:
        if envvar.startswith("AUDIT_PLUGIN_"):
            try:
                exec(os.environ[envvar], globals(), {"entry": entry})
            except Exception:
                pass

# === Quantum/Post-Quantum/Custom Hashing ===
def hash_entry(entry: dict, algo: str = "sha3_512") -> str:
    s = json.dumps(entry, sort_keys=True, separators=(",", ":"))
    try:
        h = getattr(hashlib, algo)
        return h(s.encode()).hexdigest()
    except Exception:
        return hashlib.sha512(s.encode()).hexdigest()

def current_utc_iso() -> str:
    return datetime.utcnow().replace(microsecond=0).isoformat() + "Z"

def _strip_signatures(entry: dict) -> dict:
    return {k: v for k, v in entry.items() if not k.startswith("signature")}

# === Adaptive Agentic Policy/Alert/Automation ===
class AdaptivePolicy:
    """Agentic, composable, updatable policies and automations."""
    def __init__(self, hooks: Optional[List[Callable[[dict], None]]] = None):
        self.hooks = hooks or []

    def apply(self, entry: dict):
        for hook in self.hooks:
            try:
                hook(entry)
            except Exception:
                pass

    def add_hook(self, hook: Callable[[dict], None]):
        self.hooks.append(hook)

# === Universal Notification/Streaming Adapters (primitive examples, extend via plugins) ===
def notify_email(entry: dict):
    email = os.environ.get("AUDIT_ALERT_EMAIL")
    if not email:
        return
    msg = MIMEText(json.dumps(entry, indent=2))
    msg['Subject'] = f"[AUDIT] {entry['event_type']}"
    msg['From'] = "audit@localhost"
    msg['To'] = email
    try:
        with smtplib.SMTP(os.environ.get("SMTP_SERVER", "localhost"), int(os.environ.get("SMTP_PORT", 25))) as s:
            s.sendmail(msg['From'], [email], msg.as_string())
    except Exception:
        pass

def notify_slack(entry: dict):
    webhook = os.environ.get("SLACK_WEBHOOK_URL")
    if webhook:
        try:
            import requests
            requests.post(webhook, json={"text": f"[AUDIT] {entry['event_type']}: {entry['details']}"})
        except Exception:
            pass

def notify_mesh(entry: dict):
    mesh_url = os.environ.get("GOV_MESH_URL")
    if mesh_url:
        try:
            import requests
            requests.post(mesh_url, json=entry)
        except Exception:
            pass

