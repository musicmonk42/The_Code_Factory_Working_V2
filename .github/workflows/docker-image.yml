name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      skip_heavy_deps:
        description: 'Skip heavy dependencies (0=include, 1=skip)'
        required: false
        default: '0'

env:
  SKIP_HEAVY_DEPS: ${{ github.event.inputs.skip_heavy_deps || '0' }}
  IMAGE_TAG: code-factory-platform:ci-${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        df -h

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build the Docker image
      env:
        DOCKER_BUILDKIT: 1
      run: |
        docker build . --file Dockerfile --tag "${{ env.IMAGE_TAG }}" --build-arg SKIP_HEAVY_DEPS=${{ env.SKIP_HEAVY_DEPS }}

    - name: Test Docker image can run
      run: |
        docker run --rm "${{ env.IMAGE_TAG }}" python --version
