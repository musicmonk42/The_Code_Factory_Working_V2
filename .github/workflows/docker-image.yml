name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        df -h
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build the Docker image
      env:
        DOCKER_BUILDKIT: 1
      run: |
        docker build . --file Dockerfile --tag code-factory-platform:$(date +%s) --build-arg SKIP_HEAVY_DEPS=0
    
    - name: Test Docker image can run
      run: |
        docker run --rm code-factory-platform:$(docker images -q code-factory-platform | head -1) python --version
