name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Run safety check on requirements
        run: |
          if [ -f requirements.txt ]; then
            echo "Checking unified platform requirements.txt"
            safety check -r requirements.txt --output json || true
          fi

      - name: Run pip-audit
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            echo "Auditing unified platform requirements.txt"
            pip-audit -r requirements.txt || true
          fi

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan — pull request
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: TruffleHog Secret Scan — push and schedule (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  code-scanning:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"

  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the entire workflow
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space for Docker build
        run: |
          echo "=== Initial Disk Space ==="
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          docker system prune -af --volumes 2>/dev/null || true
          echo "=== Disk Space After Cleanup ==="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        timeout-minutes: 20  # Explicit timeout for build
        run: |
          echo "=== Starting Docker build ==="
          if ! docker build -t code-factory:scan -f Dockerfile . \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --progress=plain 2>&1 | tee docker-build.log; then
            echo "❌ Docker build failed"
            echo "=== Last 100 lines of build output ==="
            tail -n 100 docker-build.log || true
            echo "=== Disk space at failure ==="
            df -h
            exit 1
          fi
          echo "✅ Docker build succeeded"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        timeout-minutes: 10  # Explicit timeout
        continue-on-error: true
        with:
          image-ref: 'code-factory:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        timeout-minutes: 10  # Explicit timeout
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Docker build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-build-logs
          path: docker-build.log
          retention-days: 14

      - name: Docker security diagnostic info (on failure)
        if: failure()
        run: |
          echo "=== Docker Security Scan Failure Diagnostics ==="
          echo "Disk space:"
          df -h
          echo ""
          echo "Docker version:"
          docker --version
          echo ""
          echo "Docker images:"
          docker images
          echo ""
          echo "Docker system df:"
          docker system df

  sast-analysis:
    name: SAST with Bandit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r generator/ omnicore_engine/ self_fixing_engineer/ \
            -f json -o bandit-report.json || true
          bandit -r generator/ omnicore_engine/ self_fixing_engineer/ \
            -f screen || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the entire workflow
    timeout-minutes: 20  # Explicit timeout for the entire job

    steps:
      - name: Free up disk space
        run: |
          echo "=== Initial Disk Space ==="
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache 2>/dev/null || true
          docker rmi $(docker images -q) 2>/dev/null || true
          docker system prune -af --volumes 2>/dev/null || true
          echo "=== Disk Space After Cleanup ==="
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-licenses
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses

      - name: Check licenses
        timeout-minutes: 15  # Explicit timeout for this step
        continue-on-error: true  # Continue workflow even if this step fails
        run: |
          set -euo pipefail
          HAS_ISSUES=0
          TEMP_DIR=$(mktemp -d)
          cleanup() {
            echo "Cleaning up temporary directory..."
            rm -rf "$TEMP_DIR" || true
          }
          trap cleanup EXIT

          if [ -f requirements.txt ]; then
            echo "=== Checking licenses for unified platform requirements.txt ==="
            echo "Creating virtual environment..."

            # Create venv with error handling
            if ! python -m venv "$TEMP_DIR/venv"; then
              echo "⚠️  Failed to create virtual environment - skipping license check"
              exit 0
            fi

            source "$TEMP_DIR/venv/bin/activate"
            python -m pip install --upgrade pip --quiet

            echo "=== Installing dependencies (this may take several minutes) ==="

            # Install with timeout, retries, and better error handling
            if ! timeout 600 pip install -r requirements.txt --timeout=120 --retries=3 2>&1 | tee pip-install.log; then
              echo "⚠️  pip install failed for requirements.txt"
              echo "=== Last 50 lines of pip install output ==="
              tail -n 50 pip-install.log || true
              echo "=== Disk space at failure ==="
              df -h
              echo "⚠️  Skipping license check due to installation failure"
              deactivate
              exit 0  # Exit gracefully instead of failing
            fi

            echo "=== Dependencies installed successfully ==="

            # Install pip-licenses in venv
            pip install pip-licenses --quiet

            # Generate license reports
            echo "=== Generating license report ==="
            pip-licenses --format=json > "$TEMP_DIR/licenses-requirements.json" || {
              echo "⚠️  Failed to generate license report"
              deactivate
              exit 0
            }

            # Check for GPL/AGPL licenses using jq (ignore LGPL)
            if command -v jq >/dev/null 2>&1; then
              echo "=== Checking for restrictive licenses ==="
              RESTRICTIVE=$(jq -r '.[] | select((.License|test("AGPL|GPL"; "i")) and (.License|test("LGPL";"i")|not) and (.Name != "docutils")) | "\(.Name) \(.Version) - \(.License)"' "$TEMP_DIR/licenses-requirements.json" 2>/dev/null || true)

              if [ -n "$RESTRICTIVE" ]; then
                echo "⚠️  Found packages with restrictive licenses:"
                echo "$RESTRICTIVE"
                HAS_ISSUES=1
              else
                echo "✅ No restrictive licenses found"
              fi
            else
              echo "⚠️  jq not available - skipping restrictive license check"
            fi

            # Generate markdown report for artifacts
            echo "=== Generating markdown report ==="
            pip-licenses --format=markdown --output-file="licenses-unified-platform.md" || {
              echo "⚠️  Failed to generate markdown report"
            }

            deactivate
          else
            echo "⚠️  requirements.txt not found - skipping license check"
          fi

          if [ "$HAS_ISSUES" -eq 1 ]; then
            echo ""
            echo "❌ License compliance check failed!"
            echo "Found packages with GPL or AGPL licenses. See uploaded reports."
            exit 1
          fi

          echo "✅ License compliance check passed!"

      - name: Upload license reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-reports
          path: |
            licenses-*.md
            pip-install.log
          retention-days: 30

      - name: License check diagnostic info (on failure)
        if: failure()
        run: |
          echo "=== License Check Failure Diagnostics ==="
          echo "Disk space:"
          df -h
          echo ""
          echo "Python version:"
          python --version
          echo ""
          echo "Pip version:"
          pip --version || true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, secret-scan, code-scanning, docker-security, sast-analysis, license-check]
    if: always()

    steps:
      - name: Security scan summary
        run: |
          echo "=== Security Scanning Results ==="
          echo ""
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "CodeQL: ${{ needs.code-scanning.result }}"
          echo "Docker Security: ${{ needs.docker-security.result }}"
          echo "SAST Analysis: ${{ needs.sast-analysis.result }}"
          echo "License Check: ${{ needs.license-check.result }}"
          echo ""

          # Count failures (excluding skipped and cancelled)
          FAILURES=0
          CRITICAL_FAILURES=0

          [ "${{ needs.dependency-check.result }}" == "failure" ] && ((FAILURES++)) && ((CRITICAL_FAILURES++))
          [ "${{ needs.secret-scan.result }}" == "failure" ] && ((FAILURES++)) && ((CRITICAL_FAILURES++))
          [ "${{ needs.code-scanning.result }}" == "failure" ] && ((FAILURES++))
          [ "${{ needs.docker-security.result }}" == "failure" ] && ((FAILURES++))
          [ "${{ needs.sast-analysis.result }}" == "failure" ] && ((FAILURES++))
          [ "${{ needs.license-check.result }}" == "failure" ] && ((FAILURES++))

          echo "Total failures: $FAILURES"
          echo "Critical failures (dependency-check, secret-scan): $CRITICAL_FAILURES"
          echo ""

          if [ $CRITICAL_FAILURES -gt 0 ]; then
            echo "❌ CRITICAL security issues detected!"
            echo "Review dependency-check and secret-scan results immediately."
            exit 1
          elif [ $FAILURES -gt 0 ]; then
            echo "⚠️  Some security checks failed, but no critical issues detected."
            echo "Review the failed jobs and address findings as needed."
            # Don't fail - just warn
            exit 0
          else
            echo "✅ All security scans completed successfully!"
          fi
