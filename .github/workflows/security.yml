name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          pip install safety
          
      - name: Run safety check on requirements
        run: |
          for req_file in requirements.txt master_requirements.txt generator/requirements.txt omnicore_engine/requirements.txt self_fixing_engineer/requirements.txt; do
            if [ -f "$req_file" ]; then
              echo "Checking $req_file"
              safety check -r "$req_file" --output json || true
            fi
          done
          
      - name: Run pip-audit
        run: |
          pip install pip-audit
          for req_file in requirements.txt generator/requirements.txt omnicore_engine/requirements.txt self_fixing_engineer/requirements.txt; do
            if [ -f "$req_file" ]; then
              echo "Auditing $req_file"
              pip-audit -r "$req_file" || true
            fi
          done

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: TruffleHog Secret Scan — pull request
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
          
      - name: TruffleHog Secret Scan — push and schedule (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  code-scanning:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"

  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        run: |
          docker build -t code-factory:scan -f Dockerfile . \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --progress=plain
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'code-factory:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail the build if CRITICAL or HIGH vulnerabilities are found
          
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail the build if CRITICAL or HIGH vulnerabilities are found

  sast-analysis:
    name: SAST with Bandit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]
          
      - name: Run Bandit security scan
        run: |
          bandit -r generator/ omnicore_engine/ self_fixing_engineer/ \
            -f json -o bandit-report.json || true
          bandit -r generator/ omnicore_engine/ self_fixing_engineer/ \
            -f screen || true
          
      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install pip-licenses
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses
          
      - name: Check licenses
        run: |
          # Track if we found any issues
          HAS_ISSUES=0
          
          for req_file in requirements.txt generator/requirements.txt omnicore_engine/requirements.txt self_fixing_engineer/requirements.txt; do
            if [ -f "$req_file" ]; then
              echo "Checking licenses for $req_file"
              pip install -r "$req_file" || continue
              
              # Generate license report
              pip-licenses --format=markdown --output-file=licenses-$(basename $req_file).md || continue
              
              # Check for GPL, AGPL, LGPL, or unknown licenses (which could be restrictive)
              echo "Checking for restrictive licenses in $req_file..."
              RESTRICTIVE=$(pip-licenses --format=plain --with-license-file --no-license-path 2>/dev/null | grep -iE "AGPL|LGPL|GPL|UNKNOWN" | grep -v "Approved" || true)
              
              if [ -n "$RESTRICTIVE" ]; then
                echo "⚠️  WARNING: Found potentially restrictive or unknown licenses in $req_file:"
                echo "$RESTRICTIVE"
                HAS_ISSUES=1
              fi
            fi
          done
          
          # Fail if restrictive licenses were found
          if [ "$HAS_ISSUES" -eq 1 ]; then
            echo ""
            echo "❌ License compliance check failed!"
            echo "Found packages with GPL, AGPL, LGPL, or UNKNOWN licenses."
            echo "Please review the license reports and either:"
            echo "  1. Replace packages with restrictive licenses with permissive alternatives"
            echo "  2. Remove unused dependencies"
            echo "  3. Update the approved licenses list if the license is acceptable"
            exit 1
          fi
          
          echo "✅ License compliance check passed!"
          
      - name: Upload license reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-reports
          path: licenses-*.md

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, secret-scan, code-scanning, docker-security, sast-analysis, license-check]
    if: always()
    
    steps:
      - name: Security scan summary
        run: |
          echo "Security scanning completed"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "CodeQL: ${{ needs.code-scanning.result }}"
          echo "Docker Security: ${{ needs.docker-security.result }}"
          echo "SAST Analysis: ${{ needs.sast-analysis.result }}"
          echo "License Check: ${{ needs.license-check.result }}"
