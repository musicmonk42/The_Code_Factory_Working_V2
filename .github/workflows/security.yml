name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          pip install safety
          
      - name: Run safety check on requirements
        run: |
          if [ -f requirements.txt ]; then
            echo "Checking unified platform requirements.txt"
            safety check -r requirements.txt --output json || true
          fi
          
      - name: Run pip-audit
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            echo "Auditing unified platform requirements.txt"
            pip-audit -r requirements.txt || true
          fi

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: TruffleHog Secret Scan — pull request
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
          
      - name: TruffleHog Secret Scan — push and schedule (full repo)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  code-scanning:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"

  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        run: |
          docker build -t code-factory:scan -f Dockerfile . \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --progress=plain
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'code-factory:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Report vulnerabilities but don't fail the build
          
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Report vulnerabilities but don't fail the build

  sast-analysis:
    name: SAST with Bandit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]
          
      - name: Run Bandit security scan
        run: |
          bandit -r generator/ omnicore_engine/ self_fixing_engineer/ \
            -f json -o bandit-report.json || true
          bandit -r generator/ omnicore_engine/ self_fixing_engineer/ \
            -f screen || true
          
      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          docker rmi $(docker images -q) || true
          echo "Disk space after cleanup:"
          df -h
          
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install pip-licenses
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses
          
      - name: Check licenses
        run: |
          set -euo pipefail
          HAS_ISSUES=0
          TEMP_DIR=$(mktemp -d)
          cleanup() { rm -rf "$TEMP_DIR"; }
          trap cleanup EXIT
          
          if [ -f requirements.txt ]; then
            echo "Checking licenses for unified platform requirements.txt"
            python -m venv "$TEMP_DIR/venv"
            source "$TEMP_DIR/venv/bin/activate"
            python -m pip install --upgrade pip
            
            # Try to install, if install fails we skip and warn
            if ! pip install -r requirements.txt; then
              echo "⚠️  pip install failed for requirements.txt — skipping license check"
              deactivate
              rm -rf "$TEMP_DIR/venv"
            else
              
              pip install pip-licenses
              pip-licenses --format=json > "$TEMP_DIR/licenses-requirements.json" || true
              
              # Check for GPL/AGPL licenses using jq (ignore LGPL)
              # Also ignore docutils which has a complex license string including GPL but is primarily BSD/Public Domain
              if command -v jq >/dev/null 2>&1; then
                RESTRICTIVE=$(jq -r '.[] | select((.License|test("AGPL|GPL"; "i")) and (.License|test("LGPL";"i")|not) and (.Name != "docutils")) | "\(.Name) \(.Version) - \(.License)"' "$TEMP_DIR/licenses-requirements.json" 2>/dev/null || true)
                if [ -n "$RESTRICTIVE" ]; then
                  echo "⚠️  Found packages with restrictive licenses:"
                  echo "$RESTRICTIVE"
                  HAS_ISSUES=1
                fi
              fi
              
              # Generate markdown report for artifacts
              pip-licenses --format=markdown --output-file="licenses-unified-platform.md" || true
              
              deactivate
              rm -rf "$TEMP_DIR/venv"
            fi
          fi
          
          if [ "$HAS_ISSUES" -eq 1 ]; then
            echo ""
            echo "❌ License compliance check failed!"
            echo "Found packages with GPL or AGPL licenses. See uploaded reports."
            exit 1
          fi
          
          echo "✅ License compliance check passed!"
          
      - name: Upload license reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-reports
          path: licenses-*.md

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, secret-scan, code-scanning, docker-security, sast-analysis, license-check]
    if: always()
    
    steps:
      - name: Security scan summary
        run: |
          echo "Security scanning completed"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"
          echo "CodeQL: ${{ needs.code-scanning.result }}"
          echo "Docker Security: ${{ needs.docker-security.result }}"
          echo "SAST Analysis: ${{ needs.sast-analysis.result }}"
          echo "License Check: ${{ needs.license-check.result }}"
