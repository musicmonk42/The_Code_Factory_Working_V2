name: CI - Code Factory Platform

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  # OpenTelemetry package versions - pinned for compatibility
  OTEL_API_VERSION: '1.38.0'
  OTEL_SDK_VERSION: '1.38.0'
  OTEL_EXPORTER_VERSION: '1.38.0'
  OTEL_INSTRUMENTATION_VERSION: '0.59b0'
  OTEL_SEMANTIC_CONVENTIONS_VERSION: '0.59b0'

permissions:
  contents: read
  
jobs:
  # Note: All three modules (generator, omnicore_engine, self_fixing_engineer) are
  # treated as a single unified platform and tested together.
  
  lint:
    name: Lint Unified Platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Free disk space
        run: |
          # Remove apt lists, docs, and clear pip cache to free disk space
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* /tmp/* || true
          df -h
          
      - name: Install linting dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir black ruff flake8 mypy
          
      - name: Run Black formatter check
        run: |
          black --check --diff generator/ omnicore_engine/ self_fixing_engineer/
          
      - name: Run Ruff linter
        run: |
          ruff check generator/ omnicore_engine/ self_fixing_engineer/
          
      - name: Run Flake8
        run: |
          flake8 generator/ omnicore_engine/ self_fixing_engineer/ --count --select=E9,F63,F7,F82 --show-source --statistics

  test-platform:
    name: Test Unified Platform
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Free disk space
        run: |
          # Remove apt lists, docs, and clear pip cache to free disk space
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* /tmp/* || true
          df -h
          
      - name: Install unified platform dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          # Ensure protobuf stays in the <6 family (google-ai-generativelanguage / other deps require this)
          # Excluded 4.21.x versions have known compatibility issues with certain packages
          pip install --no-cache-dir "protobuf!=4.21.*,<6.0.0,>=3.20.2"
          # Pin critical dependencies to ensure compatibility
          pip install --no-cache-dir \
            pytest==7.4.0 \
            pytest-asyncio==0.21.0 \
            pytest-mock==3.11.0 \
            tomli_w \
            typing-extensions
          # Install unified platform requirements
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          fi
          pip install --no-cache-dir pytest-cov
          # Force-reinstall OpenTelemetry packages to ensure correct versions
          pip install --force-reinstall \
            opentelemetry-semantic-conventions==${{ env.OTEL_SEMANTIC_CONVENTIONS_VERSION }} \
            opentelemetry-instrumentation-fastapi==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-instrumentation==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-exporter-otlp-proto-grpc==${{ env.OTEL_EXPORTER_VERSION }} \
            opentelemetry-sdk==${{ env.OTEL_SDK_VERSION }} \
            opentelemetry-api==${{ env.OTEL_API_VERSION }}
          # Check for dependency conflicts
          pip check || (echo "ERROR: Dependency conflicts detected:" && pip list --format=columns && exit 1)
          
      - name: Run unified platform tests
        run: |
          # Test generator module
          if [ -d generator/tests ]; then
            echo "Testing generator module..."
            cd generator
            pytest tests/ --cov --cov-report=xml --cov-report=term -v || echo "Generator tests completed with issues"
            cd ..
          fi
          
      - name: Upload Generator coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./generator/coverage.xml
          flags: unified-platform
          fail_ci_if_error: false

  test-omnicore-sfe:
    name: Test OmniCore & SFE (Unified Platform)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Free disk space
        run: |
          # Remove apt lists, docs, and clear pip cache to free disk space
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* /tmp/* || true
          df -h
          
      - name: Enable memory overcommit for Redis
        run: |
          sudo sysctl -w vm.overcommit_memory=1
          
      - name: Install unified platform dependencies (OmniCore & SFE)
        env:
          PIP_NO_CACHE_DIR: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          # Ensure protobuf stays in the <6 family (google-ai-generativelanguage / other deps require this)
          # Excluded 4.21.x versions have known compatibility issues with certain packages
          pip install --no-cache-dir "protobuf!=4.21.*,<6.0.0,>=3.20.2"
          # Pin critical dependencies to ensure compatibility
          pip install --no-cache-dir \
            pytest==7.4.0 \
            pytest-asyncio==0.21.0 \
            pytest-mock==3.11.0 \
            pytest-timeout \
            tomli_w \
            typing-extensions \
            aiohttp==3.8.5
          # Install unified platform requirements
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt || echo "WARNING: Some requirements failed (may be optional)"
          fi
          # Install self_fixing_engineer package (contains arbiter - CRITICAL) with verbose output
          echo "Installing self_fixing_engineer package (contains arbiter)..."
          python -m pip install -v --no-cache-dir -e ./self_fixing_engineer || {
            echo "ERROR: Failed to install self_fixing_engineer package"
            exit 1
          }
          # Verify arbiter is importable with detailed diagnostics
          python -c "import arbiter; print('arbiter imported from', arbiter.__file__)" || {
            echo "ERROR: arbiter module not importable after installing self_fixing_engineer"
            exit 1
          }
          # Install omnicore_engine package
          python -m pip install --no-cache-dir -e ./omnicore_engine
          # Install common test/runtime extras that may be missing
          pip install --no-cache-dir PyYAML httpx PyJWT || true
          pip install --no-cache-dir fastapi-csrf-protect circuitbreaker defusedxml || true
          pip install --no-cache-dir pytest-cov
          # Force-reinstall OpenTelemetry packages to ensure correct versions
          pip install --force-reinstall \
            opentelemetry-semantic-conventions==${{ env.OTEL_SEMANTIC_CONVENTIONS_VERSION }} \
            opentelemetry-instrumentation-fastapi==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-instrumentation==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-exporter-otlp-proto-grpc==${{ env.OTEL_EXPORTER_VERSION }} \
            opentelemetry-sdk==${{ env.OTEL_SDK_VERSION }} \
            opentelemetry-api==${{ env.OTEL_API_VERSION }}
          # Check for dependency conflicts
          pip check || (echo "ERROR: Dependency conflicts detected:" && pip list --format=columns && exit 1)
          
      - name: Free more disk space before tests
        run: |
          # Additional cleanup right before running tests
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* /tmp/* || true
          df -h
          
      - name: Run OmniCore tests
        env:
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
        run: |
          export PYTHONPATH="$PYTHONPATH:$PWD"
          if [ -d omnicore_engine/tests ]; then
            # Per-file diagnostic isolates CPU-heavy tests and provides resource usage metrics
            # This approach helps identify which specific test file causes SIGXCPU timeouts
            # 60-second timeout per file is intentionally strict for quick diagnosis;
            # the full pytest run uses 300s for legitimate slow tests
            echo "Running per-file diagnostic to find CPU-heavy test..."
            DIAGNOSTIC_FAILED=0
            for f in $(find omnicore_engine/tests -name 'test_*.py' | sort); do
              echo "==> Testing $f"
              /usr/bin/time -v pytest -q "$f" --maxfail=1 --timeout=60 || {
                echo "Problem detected in $f"
                DIAGNOSTIC_FAILED=1
                break
              }
            done
            if [ $DIAGNOSTIC_FAILED -eq 0 ]; then
              echo "Now running full pytest (for coverage) after successful diagnostics..."
              pytest omnicore_engine/tests/ --cov=omnicore_engine --cov-report=xml --cov-report=term -v --timeout=300 --maxfail=1
            else
              echo "Skipping full test run due to diagnostic failure"
              exit 1
            fi
          else
            echo "Error: No tests directory found. Failing the build."
            exit 1
          fi
          
      - name: Upload OmniCore coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./omnicore_engine/coverage.xml
          flags: unified-platform
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests (Unified Platform)
    runs-on: ubuntu-latest
    needs: [lint, test-platform, test-omnicore-sfe]
    if: always() && !cancelled()
    permissions:
      contents: read
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Free disk space
        run: |
          # Remove apt lists, docs, and clear pip cache to free disk space
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* /tmp/* || true
          df -h
          
      - name: Enable memory overcommit for Redis
        run: |
          sudo sysctl -w vm.overcommit_memory=1
          
      - name: Install all platform dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          # Ensure protobuf stays in the <6 family (google-ai-generativelanguage / other deps require this)
          # Excluded 4.21.x versions have known compatibility issues with certain packages
          pip install --no-cache-dir "protobuf!=4.21.*,<6.0.0,>=3.20.2"
          # Pin critical dependencies to ensure compatibility
          pip install --no-cache-dir \
            pytest==7.4.0 \
            pytest-asyncio==0.21.0 \
            pytest-mock==3.11.0 \
            pytest-timeout \
            pytest-xdist \
            tomli_w \
            typing-extensions
          # Install unified platform requirements
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          fi
          # Force-reinstall OpenTelemetry packages to ensure correct versions
          pip install --force-reinstall \
            opentelemetry-semantic-conventions==${{ env.OTEL_SEMANTIC_CONVENTIONS_VERSION }} \
            opentelemetry-instrumentation-fastapi==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-instrumentation==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-exporter-otlp-proto-grpc==${{ env.OTEL_EXPORTER_VERSION }} \
            opentelemetry-sdk==${{ env.OTEL_SDK_VERSION }} \
            opentelemetry-api==${{ env.OTEL_API_VERSION }}
          # Check for dependency conflicts
          pip check || (echo "ERROR: Dependency conflicts detected:" && pip list --format=columns && exit 1)
          
      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
        run: |
          if [ -f conftest.py ]; then
            pytest -v --tb=short --timeout=120 -n 2
          else
            echo "No root-level integration tests found"
          fi

  build-docker:
    name: Build Unified Platform Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test-platform, test-omnicore-sfe]
    if: always() && !cancelled()
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Free up disk space for Docker build
        run: |
          # Remove large packages and unused tools to free disk space
          echo "=== Disk space before cleanup ==="
          df -h
          # Remove large tool chains and runtimes
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/hostedtoolcache
          # Remove additional large directories
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/sqlpackage
          # Clear package manager caches
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/cache/apt/archives/*
          # Clear other caches (be careful not to remove files in use)
          find /tmp -maxdepth 1 -type f -mtime +1 -delete 2>/dev/null || true
          find /var/tmp -maxdepth 1 -type f -mtime +1 -delete 2>/dev/null || true
          # Aggressively prune Docker (but preserve volumes that might be needed)
          docker system prune -af || true
          # Clear BuildKit cache
          docker buildx prune -af || true
          echo "=== Disk space after cleanup ==="
          df -h
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build unified platform Docker image
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          docker build \
            --build-arg SKIP_HEAVY_DEPS=0 \
            -t code-factory:latest \
            -f Dockerfile .
          # Clean up build cache immediately after build
          docker builder prune -af || true
          
      - name: Test Docker image
        run: |
          docker run --rm code-factory:latest python --version || true

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint, test-platform, test-omnicore-sfe, integration-test, build-docker]
    if: always()
    permissions:
      contents: read
    
    steps:
      - name: Check CI status
        run: |
          echo "CI pipeline completed for unified platform"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test Platform: ${{ needs.test-platform.result }}"
          echo "Test OmniCore & SFE: ${{ needs.test-omnicore-sfe.result }}"
          echo "Integration Test: ${{ needs.integration-test.result }}"
          echo "Build Docker: ${{ needs.build-docker.result }}"
