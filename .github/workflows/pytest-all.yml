    env:
      TESTING: '1'
      CI: '1'
      SKIP_AUDIT_INIT: '1'
      OTEL_SDK_DISABLED: '1'
      PYTEST_CURRENT_TEST: 'true'
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_KEY: "0mRtqFHlMkj0xTZO14sBFr1H6jkmmI0LWyK97sGyGew="
      APP_ENV: test
      SKIP_IMPORT_TIME_VALIDATION: '1'
      SKIP_BACKGROUND_TASKS: '1'
      NO_MONITORING: '1'
      DISABLE_TELEMETRY: '1'
      MPLBACKEND: 'Agg'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      OMP_NUM_THREADS: '1'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            .github/constraints.txt
          
      - name: Free disk space
        run: |
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* || true
          find /tmp -maxdepth 1 -user "$(whoami)" -type f -delete 2>/dev/null || true
          find /tmp -mindepth 1 -maxdepth 1 -user "$(whoami)" -type d -exec rm -rf {} \; 2>/dev/null || true
          df -h
          
      - name: Enable memory overcommit for Redis
        run: |
          sudo sysctl -w vm.overcommit_memory=1
          
      - name: Install redis-cli on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools
          redis-cli --version
          
      - name: Install system dependencies for Python packages
        run: |
          sudo apt-get update
