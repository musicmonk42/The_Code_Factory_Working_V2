name: Pytest All - Run All Tests

# Runs ALL pytest tests in the repository together in a single invocation.
# Uses `ulimit -t unlimited` to remove CPU time limits that cause SIGXCPU (exit code 152).

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    # Run tests nightly at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  # OpenTelemetry package versions - pinned for compatibility
  OTEL_API_VERSION: '1.38.0'
  OTEL_SDK_VERSION: '1.38.0'
  OTEL_EXPORTER_VERSION: '1.38.0'
  OTEL_INSTRUMENTATION_VERSION: '0.59b0'
  OTEL_SEMANTIC_CONVENTIONS_VERSION: '0.59b0'

permissions:
  contents: read

jobs:
  # Tests run in parallel per module - run on every push/PR
  test-matrix:
    name: Tests - ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - omnicore_engine
          - generator
          - self_fixing_engineer
          - server
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    env:
      TESTING: '1'
      CI: '1'  # Add this to skip audit background thread
      SKIP_AUDIT_INIT: '1'  # Explicitly skip audit logger initialization
      OTEL_SDK_DISABLED: '1'
      PYTEST_CURRENT_TEST: 'true'
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_KEY: "0mRtqFHlMkj0xTZO14sBFr1H6jkmmI0LWyK97sGyGew="
      APP_ENV: test
      SKIP_IMPORT_TIME_VALIDATION: '1'  # Skip expensive validation during import
      SKIP_BACKGROUND_TASKS: '1'
      NO_MONITORING: '1'
      DISABLE_TELEMETRY: '1'
      # Prevent matplotlib from initializing GUI backends and loading font caches
      MPLBACKEND: 'Agg'
      # Prevent OpenBLAS/MKL/OMP threading issues in CI environment (RLIMIT_NPROC limits)
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      OMP_NUM_THREADS: '1'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            .github/constraints.txt
          
      - name: Free disk space
        run: |
          # Remove apt lists, docs, and clear pip cache to free disk space
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* || true
          # Clean /tmp files owned by current user only (avoids permission errors for system directories)
          find /tmp -maxdepth 1 -user "$(whoami)" -type f -delete 2>/dev/null || true
          find /tmp -mindepth 1 -maxdepth 1 -user "$(whoami)" -type d -exec rm -rf {} \; 2>/dev/null || true
          df -h
          
      - name: Enable memory overcommit for Redis
        run: |
          sudo sysctl -w vm.overcommit_memory=1
          
      - name: Install redis-cli on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools
          redis-cli --version
          
      - name: Install system dependencies for Python packages
        run: |
          # Install system dependencies required by Python packages
          # libvirt-dev and pkg-config: required by libvirt-python (if enabled)
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config
          
      - name: Wait for Redis to be ready
        run: |
          # Wait loop to ensure Redis service is fully available before running tests
          for i in $(seq 1 30); do
            if redis-cli -h localhost --raw incr ping_test >/dev/null 2>&1; then
              echo "Redis is up and responding"
              break
            fi
            echo "Waiting for Redis... attempt $i/30"
            sleep 1
          done
          # Final check - fail early if Redis is not available
          redis-cli -h localhost ping || (echo "ERROR: Redis is not available" && exit 1)
          
      - name: Install dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          # Use constraints file to prevent transitive deps from upgrading protobuf to 6.x
          # Ensure protobuf stays in the <6 family (google-ai-generativelanguage / other deps require this)
          pip install --no-cache-dir -c .github/constraints.txt protobuf
          
          # Install critical dependencies first to prevent import errors
          pip install --no-cache-dir -c .github/constraints.txt \
            cryptography \
            python-dotenv \
            presidio-analyzer \
            presidio-anonymizer
          
          # Install unified platform requirements first
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt -c .github/constraints.txt || echo "WARNING: Some requirements failed (may be optional)"
          fi
          
          # Install the unified Code Factory platform from project root
          # This installs all packages (generator, omnicore_engine, self_fixing_engineer, server)
          # in a single editable installation, which ensures proper package resolution
          echo "Installing unified Code Factory platform from project root..."
          python -m pip install -v --no-cache-dir -c .github/constraints.txt -e . || {
            echo "ERROR: Failed to install Code Factory platform from project root"
            exit 1
          }
          
          # Verify all packages are installed and importable
          echo "=== Verifying package installations ==="
          
          # Verify code-factory package
          pip show code-factory || {
            echo "ERROR: code-factory package not found in pip"
            exit 1
          }
          
          # Test omnicore_engine package
          echo "Testing omnicore_engine..."
          python -c "import omnicore_engine" || {
            echo "ERROR: omnicore_engine cannot be imported"
            echo "Package location:"
            pip show code-factory | grep Location || true
            echo "Package contents:"
            ls -la omnicore_engine/ || true
            exit 1
          }
          
          # Test plugin_registry specifically (it's been causing failures)
          python -c "from omnicore_engine import plugin_registry" || {
            echo "ERROR: plugin_registry cannot be imported"
            exit 1
          }
          
          # Test omnicore_engine.tests module (critical for pytest collection)
          python -c "import omnicore_engine.tests" || {
            echo "ERROR: omnicore_engine.tests cannot be imported - this will cause pytest collection to fail"
            echo "Tests directory contents:"
            ls -la omnicore_engine/tests/ || true
            exit 1
          }
          
          # Test self_fixing_engineer package
          echo "Testing self_fixing_engineer..."
          python -c "import self_fixing_engineer" || {
            echo "ERROR: self_fixing_engineer cannot be imported"
            exit 1
          }
          
          # Test generator package
          echo "Testing generator..."
          python -c "import generator" || {
            echo "WARNING: generator cannot be imported (may be expected)"
          }
          
          # Test server package
          echo "Testing server..."
          python -c "import server" || {
            echo "WARNING: server cannot be imported (may be expected)"
          }
          
          echo "✓ All packages verified (installed and importable)"
          # Install common test/runtime extras that may be missing
          pip install --no-cache-dir -c .github/constraints.txt PyYAML httpx PyJWT || true
          pip install --no-cache-dir -c .github/constraints.txt fastapi-csrf-protect circuitbreaker defusedxml || true
          # Install optional dependencies that are commonly needed
          pip install --no-cache-dir -c .github/constraints.txt deap hiredis || echo "WARNING: Some optional deps failed"
          # Install pytest plugins
          pip install --no-cache-dir -c .github/constraints.txt \
            pytest-cov \
            pytest-xdist \
            pytest-asyncio \
            pytest-html \
            pytest-json-report \
            pytest-timeout \
            pytest-forked \
            tomli_w \
            typing-extensions \
            hypothesis
          # Force-reinstall OpenTelemetry packages to ensure correct versions
          pip install --force-reinstall -c .github/constraints.txt \
            opentelemetry-semantic-conventions==${{ env.OTEL_SEMANTIC_CONVENTIONS_VERSION }} \
            opentelemetry-instrumentation-fastapi==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-instrumentation==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-exporter-otlp-proto-grpc==${{ env.OTEL_EXPORTER_VERSION }} \
            opentelemetry-sdk==${{ env.OTEL_SDK_VERSION }} \
            opentelemetry-api==${{ env.OTEL_API_VERSION }}
          
          # Check for dependency conflicts
          pip check || (echo "ERROR: Dependency conflicts detected:" && pip list --format=columns && exit 1)
          
      - name: Verify critical test dependencies
        run: |
          echo "=== Verifying test dependencies can be imported ==="
          python -c "import pytest; print(f'pytest {pytest.__version__}')"
          python -c "import pytest_cov; print('pytest-cov OK')"
          python -c "import pytest_asyncio; print('pytest-asyncio OK')"
          python -c "import xdist; print('pytest-xdist OK')"
          python -c "import aiofiles; print('aiofiles OK')"
          python -c "import tiktoken; print('tiktoken OK')"
          python -c "import aiohttp; print('aiohttp OK')"
          
          echo "=== Verifying critical infrastructure dependencies ==="
          python -c "import cryptography; print('cryptography OK')"
          python -c "from cryptography.fernet import Fernet; print('cryptography.fernet OK')"
          python -c "from dotenv import load_dotenv; print('python-dotenv load_dotenv OK')"
          python -c "from dotenv import find_dotenv; print('python-dotenv find_dotenv OK')"
          python -c "from dotenv import dotenv_values; print('python-dotenv dotenv_values OK')"
          python -c "import base64; print('base64 OK')"
          python -c "import typing; print('typing OK')"
          
          echo "=== Verifying boto3 submodules ==="
          python -c "import boto3.session; print('boto3.session OK')" || {
            echo "ERROR: boto3.session missing - critical for tests"
            exit 1
          }
          
          echo "=== Verifying aiokafka submodules ==="
          python -c "import aiokafka.structs; print('aiokafka.structs OK')" || echo "WARN: aiokafka.structs missing"
          
          echo "=== Verifying redis submodules ==="
          python -c "import redis.asyncio; print('redis.asyncio OK')" || echo "WARN: redis.asyncio missing"
          
          echo "=== Verifying opentelemetry submodules ==="
          python -c "import opentelemetry.propagators; print('opentelemetry.propagators OK')" || echo "WARN: opentelemetry.propagators missing - may need reinstall"
          
          echo "=== Validate syntax of critical Python files ==="
          # Check omnicore_engine files
          python -m py_compile omnicore_engine/__init__.py || {
            echo "ERROR: Syntax error in omnicore_engine/__init__.py"
            cat omnicore_engine/__init__.py | head -50
            exit 1
          }
          
          python -m py_compile omnicore_engine/plugin_registry.py || {
            echo "ERROR: Syntax error in omnicore_engine/plugin_registry.py"
            exit 1
          }
          
          python -m py_compile omnicore_engine/core.py || {
            echo "ERROR: Syntax error in omnicore_engine/core.py"
            exit 1
          }
          
          echo "✓ Syntax validation passed for critical files"
          
          echo "=== Check if test files are syntactically valid ==="
          # Only compile test files that exist to avoid false negatives
          for test_file in tests/test_*.py; do
            if [ -f "$test_file" ] && [ "$(basename "$test_file")" != "__init__.py" ]; then
              python -m py_compile "$test_file" 2>&1 || echo "SYNTAX ERROR in $test_file"
            fi
          done
          
          # Check generator tests if they exist
          if [ -d "generator/main/tests" ]; then
            for test_file in generator/main/tests/test_*.py; do
              [ -f "$test_file" ] && python -m py_compile "$test_file" 2>&1 || echo "SYNTAX ERROR in $test_file"
            done
          fi
          
          if [ -d "omnicore_engine/tests" ]; then
            for test_file in omnicore_engine/tests/test_*.py; do
              [ -f "$test_file" ] && python -m py_compile "$test_file" 2>&1 || echo "SYNTAX ERROR in $test_file"
            done
          fi
          
          echo "=== Verify conftest files syntax ==="
          python -m py_compile conftest.py
          [ -f generator/conftest.py ] && python -m py_compile generator/conftest.py
          [ -f self_fixing_engineer/conftest.py ] && python -m py_compile self_fixing_engineer/conftest.py
          echo "✓ All conftest files are syntactically valid"
          
          echo "=== Check test files for syntax errors ==="
          # Only compile test files that exist to avoid false negatives
          for test_file in tests/test_*.py; do
            if [ -f "$test_file" ] && [ "$(basename "$test_file")" != "__init__.py" ]; then
              python -m py_compile "$test_file" 2>&1 || echo "SYNTAX ERROR in $test_file"
            fi
          done
          
      - name: Verify omnicore_engine package structure
        run: |
          echo "=== Verifying omnicore_engine package structure ==="
          
          # Test 1: Can we import the package?
          echo "Test 1: Importing omnicore_engine package..."
          python -c "import omnicore_engine; print(f'✓ omnicore_engine location: {omnicore_engine.__file__}')" || {
            echo "❌ FAILED: Cannot import omnicore_engine package"
            echo "This indicates the package is not properly installed or has import-time errors"
            pip show omnicore_engine
            ls -la omnicore_engine/ || true
            exit 1
          }
          
          # Test 2: Can we import plugin_registry directly?
          echo "Test 2: Importing plugin_registry module..."
          python -c "from omnicore_engine import plugin_registry; print('✓ plugin_registry import OK')" || {
            echo "❌ FAILED: Cannot import plugin_registry from omnicore_engine"
            echo "This indicates PEP 562 lazy loading is broken or plugin_registry.py has errors"
            python -c "import sys; import omnicore_engine; print('omnicore_engine.__dict__:', dir(omnicore_engine))"
            exit 1
          }
          
          # Test 3: Can we access PLUGIN_REGISTRY singleton?
          echo "Test 3: Accessing PLUGIN_REGISTRY singleton..."
          python -c "from omnicore_engine.plugin_registry import PLUGIN_REGISTRY; print(f'✓ PLUGIN_REGISTRY type: {type(PLUGIN_REGISTRY).__name__}')" || {
            echo "❌ FAILED: Cannot import PLUGIN_REGISTRY from plugin_registry module"
            echo "This indicates plugin_registry.py has initialization errors"
            python -m py_compile omnicore_engine/plugin_registry.py 2>&1 || echo "Syntax error detected"
            exit 1
          }
          
          # Test 4: Can we use the lazy accessor function?
          echo "Test 4: Testing lazy accessor function..."
          python -c "from omnicore_engine import get_plugin_registry; reg = get_plugin_registry(); print(f'✓ get_plugin_registry returns: {type(reg).__name__}')" || {
            echo "❌ FAILED: get_plugin_registry() function is broken"
            exit 1
          }
          
          echo "✅ All import patterns verified successfully"
          
          # Verify other critical modules (warnings only for optional modules)
          echo "=== Verifying meta_supervisor import ==="
          python -c "from omnicore_engine import meta_supervisor; print('✓ meta_supervisor import OK')" || echo "WARNING: meta_supervisor module not found (may be optional)"
          
          echo "=== Verifying core module import ==="
          python -c "from omnicore_engine import core; print('✓ core module import OK')" || echo "WARNING: core module not found (may be optional)"
          
      - name: Free more disk space before tests
        run: |
          # Additional cleanup right before running tests
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* || true
          # Clean /tmp files owned by current user only (avoids permission errors for system directories)
          find /tmp -maxdepth 1 -user "$(whoami)" -type f -delete 2>/dev/null || true
          find /tmp -mindepth 1 -maxdepth 1 -user "$(whoami)" -type d -exec rm -rf {} \; 2>/dev/null || true
          df -h
      
      - name: Download NLTK data
        run: |
          echo "=== Pre-downloading NLTK data packages ==="
          python -c "
          import nltk
          import ssl
          import sys
          
          # Handle SSL certificate issues in CI environments
          try:
              _create_unverified_https_context = ssl._create_unverified_context
          except AttributeError:
              pass
          else:
              ssl._create_default_https_context = _create_unverified_https_context
          
          # Download required NLTK data packages
          packages = ['punkt', 'stopwords', 'vader_lexicon', 'averaged_perceptron_tagger']
          for package in packages:
              try:
                  print(f'Downloading {package}...', flush=True)
                  nltk.download(package, quiet=True)
                  print(f'✓ {package} downloaded successfully', flush=True)
              except Exception as e:
                  print(f'WARNING: Failed to download {package}: {e}', file=sys.stderr, flush=True)
          
          print('NLTK data download complete', flush=True)
          "
      
      - name: Verify NLTK data installation
        run: |
          echo "=== Verifying NLTK data installation ==="
          python -c "
          import nltk
          import os
          print(f'NLTK data paths: {nltk.data.path}')
          
          packages = ['punkt', 'stopwords', 'vader_lexicon']
          for package in packages:
              try:
                  nltk.data.find(f'tokenizers/{package}')
                  print(f'✓ {package} found')
              except LookupError:
                  try:
                      nltk.data.find(f'corpora/{package}')
                      print(f'✓ {package} found')
                  except LookupError:
                      try:
                          nltk.data.find(f'sentiment/{package}')
                          print(f'✓ {package} found')
                      except LookupError:
                          print(f'✗ {package} NOT FOUND')
          "
      
      - name: Collect tests (diagnostic)
        if: false  # Disable for fast-tests to save time
        run: |
          # Reduced timeout to 180s with collection optimization flags
          # --disable-warnings: Skip warning collection for faster performance
          # -p no:warnings: Disable warnings plugin
          # --co: Alias for --collect-only
          # Collect tests for specific module only
          timeout 180 pytest ${{ matrix.module }}/tests/ --co --quiet --disable-warnings -p no:warnings || {
            echo "WARNING: Collection timed out or failed - will proceed with targeted test run"
            exit 0
          }
        continue-on-error: true
          
      - name: Debug pytest collection (if previous steps passed)
        if: success()
        env:
          PYTEST_COLLECTING_ONLY: '1'
        run: |
          echo "=== Testing pytest collection with verbose output for ${{ matrix.module }} ==="
          # Try to collect tests with maximum verbosity to reveal any import errors
          python -m pytest \
            ${{ matrix.module }}/tests/ \
            --collect-only \
            -v \
            --tb=long \
            --import-mode=importlib \
            --maxfail=1 \
            2>&1 | tee pytest-collection-debug.log || {
              EXIT_CODE=$?
              echo "=========================================="
              echo "ERROR: Pytest collection failed with exit code $EXIT_CODE"
              echo "=========================================="
              echo ""
              echo "Last 200 lines of collection output:"
              tail -200 pytest-collection-debug.log
              echo ""
              echo "Searching for import errors:"
              grep -i "importerror\|modulenotfounderror\|attributeerror" pytest-collection-debug.log || echo "No obvious import errors found in logs"
              echo ""
              # Don't fail the workflow here - let the main test step handle it
              # This is just for debugging visibility
            }
        continue-on-error: true
      
      - name: Quick import health check
        if: always()
        run: |
          echo "=== Quick Import Syntax Check ==="
          # Lightweight check that doesn't trigger expensive imports
          # Uses importlib.util.find_spec to verify packages are discoverable
          # This avoids CPU timeout (exit code 152) from importing heavy modules
          python -c "import sys; import importlib.util; spec = importlib.util.find_spec('omnicore_engine'); print('✓ omnicore_engine found' if spec else '✗ omnicore_engine not found')"
          python -c "import sys; import importlib.util; spec = importlib.util.find_spec('generator'); print('✓ generator found' if spec else '✗ generator not found')"
          python -c "import sys; import importlib.util; spec = importlib.util.find_spec('self_fixing_engineer'); print('✓ self_fixing_engineer found' if spec else '✗ self_fixing_engineer not found')"
          echo "✅ All packages are discoverable"
      
      - name: Final aiohttp installation and verification
        run: |
          echo "=== Final aiohttp installation (consolidated) ==="
          # Completely remove aiohttp and all related packages to start fresh
          pip uninstall -y aiohttp aiohttp-client-cache aiosignal frozenlist yarl multidict aioresponses || true
          
          # Install core dependencies in correct dependency order
          # Version constraints come from .github/constraints.txt
          pip install --no-cache-dir -c .github/constraints.txt \
            multidict \
            yarl \
            frozenlist \
            aiosignal
          
          # Install aiohttp with the version from requirements.txt
          # Explicitly pinned to ensure consistency with requirements.txt
          pip install --no-cache-dir -c .github/constraints.txt aiohttp==3.13.3
          
          # Install aiohttp extensions
          pip install --no-cache-dir -c .github/constraints.txt \
            aiohttp-client-cache==0.13.0 \
            aioresponses>=0.7.8
          
          echo "=== Comprehensive aiohttp verification ==="
          # Critical verification - fail fast if any component is broken
          python -c "
          from aiohttp import web
          from aiohttp.web import Request, Response, RouteTableDef
          import aiohttp.web_request
          import aiohttp.helpers
          import aiohttp.client_exceptions
          print('✓ All aiohttp components verified successfully')
          " || {
            echo "CRITICAL: aiohttp installation failed after clean install"
            echo "Diagnostic information:"
            pip show aiohttp
            pip list | grep -E 'aiohttp|yarl|multidict|frozenlist|aiosignal'
            python -c "import sys; print('sys.path:', sys.path)"
            exit 1
          }
          
          echo "✓ aiohttp installation complete and verified"
      
      - name: Run tests for ${{ matrix.module }}
        env:
          TESTING: "1"
          AWS_REGION: ""
          FALLBACK_ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLXB5dGVzdC0zMi1ieXRlczEyMzQ="
          PROMETHEUS_MULTIPROC_DIR: "${{ runner.temp }}/prometheus_multiproc"
          NLTK_DATA: "$HOME/nltk_data"
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          set -o pipefail
          # conftest.py handles path setup automatically via path_setup module
          export PYTHONPATH="$PWD"
          export NLTK_DATA="$HOME/nltk_data"
          
          # Create Prometheus multiprocess directory
          mkdir -p "${{ runner.temp }}/prometheus_multiproc"
          chmod 777 "${{ runner.temp }}/prometheus_multiproc"
          
          # Remove CPU time limits to prevent SIGXCPU (exit code 152)
          ulimit -t unlimited 2>/dev/null || true
          
          echo "=== Running pytest tests for ${{ matrix.module }} ==="
          echo "NLTK_DATA: $NLTK_DATA"
          
          # Conditionally add -n flag based on module
          if [ "${{ matrix.module }}" = "self_fixing_engineer" ]; then
            # Run self_fixing_engineer without xdist (single process, no workers)
            PYTEST_ARGS=""
          else
            # Other modules can use xdist with 1 worker
            PYTEST_ARGS="-n 1"
          fi
          
          # Use python -m pytest to ensure proper sys.path setup
          python -m pytest \
            ${{ matrix.module }}/ \
            $PYTEST_ARGS \
            -v \
            --tb=short \
            --maxfail=5 \
            --timeout=300 \
            --cov=${{ matrix.module }} \
            --cov-report=xml:coverage-${{ matrix.module }}.xml \
            --junitxml=junit-${{ matrix.module }}.xml \
            -p no:randomly \
            -p no:cacheprovider \
            --import-mode=importlib \
            2>&1 | tee test-output-${{ matrix.module }}.log || {
              EXIT_CODE=$?
              echo "======================================"
              echo "Pytest exited with code $EXIT_CODE"
              echo "======================================"
              if [ $EXIT_CODE -eq 4 ]; then
                echo "ERROR: Pytest internal error (exit code 4) detected"
                echo "This typically indicates:"
                echo "  - Collection failure due to import errors"
                echo "  - Module initialization issues"
                echo "  - Syntax errors in test files"
                echo ""
                echo "Check the logs above for import errors or initialization failures"
              elif [ $EXIT_CODE -eq 152 ]; then
                echo "ERROR: CPU time limit exceeded (SIGXCPU)"
              fi
              exit $EXIT_CODE
            }
          
          echo "✓ Tests completed for ${{ matrix.module }}"
          
      - name: Profile test collection (on failure)
        if: failure()
        run: |
          echo "=== Running test collection with CPU profiling for ${{ matrix.module }} ==="
          timeout 180s python -m cProfile -o collection_profile.stats -m pytest \
            ${{ matrix.module }}/tests/ \
            --co --quiet --disable-warnings -p no:warnings --import-mode=importlib --tb=short \
            2>&1 || true
          
          if [ -f collection_profile.stats ]; then
            echo "=== Top 30 CPU-consuming functions ==="
            python -c "import pstats; p = pstats.Stats('collection_profile.stats'); p.sort_stats('cumulative').print_stats(30)"
          fi
        continue-on-error: true
          
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.module }}
          path: coverage-${{ matrix.module }}.xml
          retention-days: 7
          
      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-${{ matrix.module }}
          path: junit-${{ matrix.module }}.xml
          retention-days: 7

  combine-coverage:
    name: Combine Coverage Reports
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install coverage tools
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts/
          
      - name: Combine coverage reports
        run: |
          echo "=== Combining coverage reports ==="
          
          # Find all coverage XML files
          find coverage-artifacts/ -name "coverage-*.xml" -type f
          
          # Use coverage combine to merge the reports
          # First, we need to convert XML back to .coverage format, combine, then generate XML
          # Since we have XML files, we'll use a simpler approach with coverage.py
          
          # Create a combined coverage file by merging all XML reports
          # We'll use coverage xml --omit to combine them
          python << 'EOF'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path
          
          # Find all coverage XML files
          coverage_dir = Path("coverage-artifacts")
          coverage_files = list(coverage_dir.rglob("coverage-*.xml"))
          
          if not coverage_files:
              print("No coverage files found!")
              exit(1)
          
          print(f"Found {len(coverage_files)} coverage files:")
          for f in coverage_files:
              print(f"  - {f}")
          
          # For simplicity, we'll just copy the first file and note that proper merging
          # requires coverage combine with .coverage files, not XML
          # This is a basic implementation that concatenates coverage data
          
          # Parse all coverage files and merge them
          combined_root = None
          packages = {}
          
          for cov_file in coverage_files:
              tree = ET.parse(cov_file)
              root = tree.getroot()
              
              if combined_root is None:
                  combined_root = ET.Element("coverage")
                  for attr in root.attrib:
                      combined_root.set(attr, root.get(attr))
              
              # Merge packages
              for package in root.findall(".//package"):
                  pkg_name = package.get("name")
                  if pkg_name not in packages:
                      packages[pkg_name] = package
              
          # Create combined XML
          if combined_root is not None:
              # Add all packages to combined root
              packages_elem = ET.SubElement(combined_root, "packages")
              for pkg in packages.values():
                  packages_elem.append(pkg)
              
              # Write combined coverage
              tree = ET.ElementTree(combined_root)
              tree.write("coverage-combined.xml", encoding="utf-8", xml_declaration=True)
              print("\n✓ Combined coverage written to coverage-combined.xml")
          else:
              print("ERROR: Failed to create combined coverage")
              exit(1)
          EOF
          
          # Verify the combined file was created
          if [ -f coverage-combined.xml ]; then
            echo "✓ Combined coverage file created successfully"
            ls -lh coverage-combined.xml
          else
            echo "ERROR: Failed to create combined coverage file"
            exit 1
          fi
          
      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage-combined.xml
          retention-days: 30


