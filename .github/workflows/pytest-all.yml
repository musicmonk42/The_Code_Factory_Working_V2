        timeout-minutes: 45
        env:
          TESTING: "1"
          PROMETHEUS_MULTIPROC_DIR: "${{ runner.temp }}/prometheus_multiproc"
          NLTK_DATA: "$HOME/nltk_data"
          PYTHONPATH: "${{ github.workspace }}:${{ github.workspace }}/self_fixing_engineer"
        run: |
          set -o pipefail
          shopt -s expand_aliases
          alias python=python3
          export PYTHONPATH="$PWD:$PWD/self_fixing_engineer"
          mkdir -p "${{ runner.temp }}/prometheus_multiproc"
          chmod 777 "${{ runner.temp }}/prometheus_multiproc"
          
          prlimit --cpu=unlimited --pid=$$ 2>/dev/null || true
          ulimit -t unlimited 2>/dev/null || ulimit -t 7200 || true
          ulimit -s unlimited 2>/dev/null || ulimit -s 65536 || true
          
          echo "=== Running Remaining Tests ==="
          timeout --signal=TERM --kill-after=30s 45m python -m pytest \
            self_fixing_engineer/tests/ \
            --ignore=self_fixing_engineer/tests/test_arbiter*.py \
            --ignore=self_fixing_engineer/tests/test_mesh*.py \
            --ignore=self_fixing_engineer/tests/test_simulation*.py \
            --ignore=self_fixing_engineer/tests/test_self_healing*.py \
            -v \
            --tb=short \
            -m "not heavy" \
            --timeout=300 \
            --maxfail=10 \
            --durations=10 \
            -p no:warnings \
            -p no:randomly \
            -p no:cacheprovider \
            --import-mode=importlib \
            --junitxml=junit-sfe-remaining.xml \
            > test-output-sfe-remaining.log 2>&1 || {
            EXIT_CODE=$?
            echo "======================================"
            echo "Remaining tests failed with exit code $EXIT_CODE"
            echo "======================================"
            if [ $EXIT_CODE -eq 137 ]; then
              echo "ERROR: Still hitting OOM - memory exhausted"
              free -h || true
            fi
            tail -100 test-output-sfe-remaining.log || true
            exit $EXIT_CODE
          }

      - name: Stop memory monitor
        if: always() && matrix.module == 'self_fixing_engineer'
        run: |
          if [ -f /tmp/memory_monitor.pid ]; then
            kill $(cat /tmp/memory_monitor.pid) 2>/dev/null || true
            rm -f /tmp/memory_monitor.pid
          fi

      - name: Profile test collection (on failure)
        if: failure() && matrix.module != 'self_fixing_engineer' && matrix.module != 'generator'
        run: |
          echo "=== Running test collection with CPU profiling for ${{ matrix.module }} ==="
          timeout 180s python -m cProfile -o collection_profile.stats -m pytest \
            ${{ matrix.module }}/tests/ \
            --co --quiet --disable-warnings -p no:warnings --import-mode=importlib --tb=short \
            2>&1 || true

          if [ -f collection_profile.stats ]; then
            echo "=== Top 30 CPU-consuming functions ==="
            python -c "import pstats; p = pstats.Stats('collection_profile.stats'); p.sort_stats('cumulative').print_stats(30)"
          fi
        continue-on-error: true

      - name: Lightweight test collection debug (self_fixing_engineer only)
        if: failure() && matrix.module == 'self_fixing_engineer'
        run: |
          echo "=== Lightweight test collection for self_fixing_engineer (no profiling) ==="
          echo "Note: Excluding test_arbiter_growth.py due to expensive import-time module stubbing"
          python -m pytest self_fixing_engineer/tests/ \
            --collect-only \
            --quiet \
            --ignore=self_fixing_engineer/tests/test_arbiter_growth.py \
            2>&1 | head -50 || true
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always() && matrix.module != 'self_fixing_engineer' && matrix.module != 'generator'
        with:
          name: coverage-${{ matrix.module }}
          path: coverage-${{ matrix.module }}.xml
          retention-days: 7

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-${{ matrix.module }}
          path: junit-${{ matrix.module }}.xml
          retention-days: 7

      - name: Upload test log artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ matrix.module }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-output-*.log
          retention-days: 7
          if-no-files-found: ignore

  combine-coverage:
    name: Combine Coverage Reports
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install coverage tools
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts/

      - name: Combine coverage reports
        run: |
          echo "=== Combining coverage reports ==="

          # Find all coverage XML files
          find coverage-artifacts/ -name "coverage-*.xml" -type f

          # Use coverage combine to merge the reports
          # First, we need to convert XML back to .coverage format, combine, then generate XML
          # Since we have XML files, we'll use a simpler approach with coverage.py

          # Create a combined coverage file by merging all XML reports
          # We'll use coverage xml --omit to combine them
          python << 'EOF'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          # Find all coverage XML files
          coverage_dir = Path("coverage-artifacts")
          coverage_files = list(coverage_dir.rglob("coverage-*.xml"))

          if not coverage_files:
              print("No coverage files found!")
              exit(1)

          print(f"Found {len(coverage_files)} coverage files:")
          for f in coverage_files:
              print(f"  - {f}")

          # For simplicity, we'll just copy the first file and note that proper merging
          # requires coverage combine with .coverage files, not XML
          # This is a basic implementation that concatenates coverage data

          # Parse all coverage files and merge them
          combined_root = None
          packages = {}

          for cov_file in coverage_files:
              tree = ET.parse(cov_file)
              root = tree.getroot()

              if combined_root is None:
                  combined_root = ET.Element("coverage")
                  for attr in root.attrib:
                      combined_root.set(attr, root.get(attr))

              # Merge packages
              for package in root.findall(".//package"):
                  pkg_name = package.get("name")
                  if pkg_name not in packages:
                      packages[pkg_name] = package

          # Create combined XML
          if combined_root is not None:
              # Add all packages to combined root
              packages_elem = ET.SubElement(combined_root, "packages")
              for pkg in packages.values():
                  packages_elem.append(pkg)

              # Write combined coverage
              tree = ET.ElementTree(combined_root)
              tree.write("coverage-combined.xml", encoding="utf-8", xml_declaration=True)
              print("\n✓ Combined coverage written to coverage-combined.xml")
          else:
              print("ERROR: Failed to create combined coverage")
              exit(1)
          EOF

          # Verify the combined file was created
          if [ -f coverage-combined.xml ]; then
            echo "✓ Combined coverage file created successfully"
            ls -lh coverage-combined.xml
          else
            echo "ERROR: Failed to create combined coverage file"
            exit 1
          fi

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage-combined.xml
          retention-days: 30


