name: Pytest All - Run All Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  # OpenTelemetry package versions - pinned for compatibility
  OTEL_API_VERSION: '1.38.0'
  OTEL_SDK_VERSION: '1.38.0'
  OTEL_EXPORTER_VERSION: '1.38.0'
  OTEL_INSTRUMENTATION_VERSION: '0.59b0'
  OTEL_SEMANTIC_CONVENTIONS_VERSION: '0.59b0'

permissions:
  contents: read

jobs:
  test-all:
    name: Run All Tests (Pytest from Root)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    env:
      TESTING: '1'
      OTEL_SDK_DISABLED: '1'
      PYTEST_CURRENT_TEST: 'true'
      REDIS_URL: redis://localhost:6379
      APP_ENV: test
      SKIP_IMPORT_TIME_VALIDATION: '1'  # Skip expensive validation during import
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            .github/constraints.txt
          
      - name: Free disk space
        run: |
          # Remove apt lists, docs, and clear pip cache to free disk space
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* /tmp/* || true
          df -h
          
      - name: Enable memory overcommit for Redis
        run: |
          sudo sysctl -w vm.overcommit_memory=1
          
      - name: Install redis-cli on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools
          redis-cli --version
          
      - name: Install system dependencies for Python packages
        run: |
          # Install system dependencies required by Python packages
          # libvirt-dev and pkg-config: required by libvirt-python (if enabled)
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config
          
      - name: Wait for Redis to be ready
        run: |
          # Wait loop to ensure Redis service is fully available before running tests
          for i in $(seq 1 30); do
            if redis-cli -h localhost --raw incr ping_test >/dev/null 2>&1; then
              echo "Redis is up and responding"
              break
            fi
            echo "Waiting for Redis... attempt $i/30"
            sleep 1
          done
          # Final check - fail early if Redis is not available
          redis-cli -h localhost ping || (echo "ERROR: Redis is not available" && exit 1)
          
      - name: Install dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          # Use constraints file to prevent transitive deps from upgrading protobuf to 6.x
          # Ensure protobuf stays in the <6 family (google-ai-generativelanguage / other deps require this)
          pip install --no-cache-dir -c .github/constraints.txt protobuf
          # Install unified platform requirements first
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt -c .github/constraints.txt || echo "WARNING: Some requirements failed (may be optional)"
          fi
          # Install self_fixing_engineer package (contains arbiter - CRITICAL) with verbose output
          echo "Installing self_fixing_engineer package (contains arbiter)..."
          python -m pip install -v --no-cache-dir -c .github/constraints.txt -e ./self_fixing_engineer || {
            echo "ERROR: Failed to install self_fixing_engineer package"
            exit 1
          }
          # Verify arbiter is importable with timeout protection and detailed error reporting
          echo "=== Attempting to import arbiter ==="
          timeout 10s python -c 'import sys; from self_fixing_engineer import arbiter; arbiter_file = getattr(arbiter, "__file__", "unknown"); print(f"✓ arbiter imported from {arbiter_file}"); print(f"✓ Module attributes: {list(dir(arbiter)[:10])}")' || {
            echo "ERROR: arbiter module not importable after installing self_fixing_engineer"
            echo "This may indicate heavy import-time initialization or missing dependencies."
            exit 1
          }
          # Install omnicore_engine package
          python -m pip install --no-cache-dir -c .github/constraints.txt -e ./omnicore_engine
          # Install common test/runtime extras that may be missing
          pip install --no-cache-dir -c .github/constraints.txt PyYAML httpx PyJWT || true
          pip install --no-cache-dir -c .github/constraints.txt fastapi-csrf-protect circuitbreaker defusedxml || true
          # Install optional dependencies that are commonly needed
          pip install --no-cache-dir -c .github/constraints.txt deap hiredis || echo "WARNING: Some optional deps failed"
          # Install pytest plugins
          pip install --no-cache-dir -c .github/constraints.txt \
            pytest-cov \
            pytest-timeout \
            pytest-xdist \
            pytest-asyncio \
            tomli_w \
            typing-extensions \
            hypothesis
          # Force-reinstall OpenTelemetry packages to ensure correct versions
          pip install --force-reinstall -c .github/constraints.txt \
            opentelemetry-semantic-conventions==${{ env.OTEL_SEMANTIC_CONVENTIONS_VERSION }} \
            opentelemetry-instrumentation-fastapi==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-instrumentation==${{ env.OTEL_INSTRUMENTATION_VERSION }} \
            opentelemetry-exporter-otlp-proto-grpc==${{ env.OTEL_EXPORTER_VERSION }} \
            opentelemetry-sdk==${{ env.OTEL_SDK_VERSION }} \
            opentelemetry-api==${{ env.OTEL_API_VERSION }}
          # Check for dependency conflicts
          pip check || (echo "ERROR: Dependency conflicts detected:" && pip list --format=columns && exit 1)
          
      - name: Verify critical test dependencies
        run: |
          echo "=== Verifying test dependencies can be imported ==="
          python -c "import pytest; print(f'pytest {pytest.__version__}')"
          python -c "import pytest_cov; print('pytest-cov OK')"
          python -c "import pytest_asyncio; print('pytest-asyncio OK')"
          python -c "import pytest_timeout; print('pytest-timeout OK')"
          python -c "import xdist; print('pytest-xdist OK')"
          python -c "import aiofiles; print('aiofiles OK')"
          python -c "import tiktoken; print('tiktoken OK')"
          python -c "import aiohttp; print('aiohttp OK')"
          
          echo "=== Check if test files are syntactically valid ==="
          python -m py_compile tests/test_generator_fixes.py || echo "SYNTAX ERROR in test_generator_fixes.py"
          python -m py_compile tests/test_cleanup_old_docs.py || echo "SYNTAX ERROR in test_cleanup_old_docs.py"
          python -m py_compile generator/main/tests/test_gui.py || echo "SYNTAX ERROR in test_gui.py"
          python -m py_compile omnicore_engine/tests/test_core.py || echo "SYNTAX ERROR in test_core.py"
          
          echo "=== Verify conftest files can be imported ==="
          python -c "import conftest; print('Root conftest OK')"
          python -c "import generator.conftest; print('Generator conftest OK')" || echo "Generator conftest import failed"
          
      - name: Free more disk space before tests
        run: |
          # Additional cleanup right before running tests
          sudo rm -rf /var/lib/apt/lists/* /usr/share/doc/* /usr/share/man/* || true
          rm -rf /home/runner/.cache/pip/* /tmp/* || true
          df -h
          
      - name: Debug test collection
        run: |
          export PYTHONPATH="$PYTHONPATH:$PWD"
          
          echo "=== Python path ==="
          python -c "import sys; print('\n'.join(sys.path))"
          
          echo "=== Testing conftest import ==="
          python -c "import conftest; print('conftest OK')" || echo "conftest import failed"
          
          echo "=== Pytest collection preview (full output saved) ==="
          pytest --collect-only -q 2>&1 | tee debug-collection.log
          
          echo ""
          echo "=== First 50 lines of collection output ==="
          head -50 debug-collection.log
          
          echo ""
          echo "=== Last 100 lines of collection output (errors usually at end) ==="
          tail -100 debug-collection.log
          
          echo ""
          echo "=== Searching for errors in collection output ==="
          grep -i "error\|exception\|failed\|traceback" debug-collection.log || echo "No obvious errors found in collection"
          
      - name: Run all tests from repository root
        run: |
          export PYTHONPATH="$PYTHONPATH:$PWD"
          
          # Verify tests can be collected with full verbosity
          echo "=== Collecting tests with verbose output ==="
          pytest --collect-only -v 2>&1 | tee collection.log
          
          echo ""
          echo "=== Analyzing collection results ==="
          
          # Check for import errors or warnings
          if grep -i "import.*error\|cannot import\|no module named" collection.log; then
            echo "ERROR: Import errors detected during collection!"
            echo "=== Full collection log ==="
            cat collection.log
            exit 1
          fi
          
          # Count collected tests - FIX: Use pytest's native output parsing
          # pytest --collect-only -q outputs one line per test, plus summary lines
          # We count lines that don't start with '=' or contain 'error' (case-insensitive)
          TEST_COUNT=$(grep -v '^=' collection.log | grep -v -i 'error' | grep -v '^$' | grep '::' | wc -l)
          
          # Alternative: parse the summary line "X selected" if available
          if [ "$TEST_COUNT" -eq 0 ]; then
            SUMMARY_COUNT=$(grep -oP '\d+(?= selected)' collection.log 2>/dev/null | head -1)
            if [ -n "$SUMMARY_COUNT" ] && [ "$SUMMARY_COUNT" -gt 0 ]; then
              TEST_COUNT=$SUMMARY_COUNT
            fi
          fi
          
          echo "Found $TEST_COUNT test items"
          
          # Check if TEST_COUNT is a valid number and greater than 0
          if ! [[ "$TEST_COUNT" =~ ^[0-9]+$ ]] || [ "$TEST_COUNT" -eq 0 ]; then
            echo "ERROR: No tests collected! Showing collection errors:"
            cat collection.log
            echo ""
            echo "=== Attempting to import test modules directly ==="
            python -c "import tests.test_generator_fixes" || echo "FAILED to import tests.test_generator_fixes"
            python -c "import tests.test_cleanup_old_docs" || echo "FAILED to import tests.test_cleanup_old_docs"
            echo ""
            echo "=== Checking PYTHONPATH ==="
            echo "PYTHONPATH=$PYTHONPATH"
            echo "PWD=$PWD"
            ls -la tests/ || echo "tests/ directory not found"
            ls -la generator/tests/ || echo "generator/tests/ directory not found"
            exit 1
          fi
          
          # Run pytest from repository root with all configured test paths
          pytest \
            -n 2 \
            --maxfail=50 \
            --timeout=300 \
            --cov=generator \
            --cov=omnicore_engine \
            --cov=self_fixing_engineer \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            -v \
            2>&1 | tee test-output.log
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always() && hashFiles('./coverage.xml') != ''
        with:
          files: ./coverage.xml
          flags: pytest-all
          fail_ci_if_error: false
          
      - name: Upload test output log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-log
          path: test-output.log
          retention-days: 7
          
      - name: Upload diagnostic logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnostic-logs
          path: |
            debug-collection.log
            collection.log
          retention-days: 7
