name: Dependency Updates

on:
  schedule:
    # Run weekly on Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Python Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools
          
      - name: Update requirements files
        run: |
          # Update main requirements
          if [ -f requirements.txt ]; then
            pip-compile --upgrade --resolver=backtracking requirements.txt || true
          fi
          
          # Update generator requirements
          if [ -f generator/requirements.txt ]; then
            cd generator
            pip-compile --upgrade --resolver=backtracking requirements.txt || true
            cd ..
          fi
          
          # Update omnicore requirements
          if [ -f omnicore_engine/requirements.txt ]; then
            cd omnicore_engine
            pip-compile --upgrade --resolver=backtracking requirements.txt || true
            cd ..
          fi
          
          # Update SFE requirements
          if [ -f self_fixing_engineer/requirements.txt ]; then
            cd self_fixing_engineer
            pip-compile --upgrade --resolver=backtracking requirements.txt || true
            cd ..
          fi
          
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Python dependencies'
          title: 'chore: Update Python Dependencies'
          body: |
            Automated dependency updates by GitHub Actions.
            
            Please review the changes and ensure all tests pass before merging.
            
            Updated components:
            - Main requirements
            - Generator requirements
            - OmniCore Engine requirements
            - Self-Fixing Engineer requirements
          branch: automated/dependency-updates
          delete-branch: true
          labels: dependencies, automated

  check-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Check for outdated packages
        run: |
          python -m pip install --upgrade pip
          
          echo "## Outdated Packages Report" > outdated-report.md
          echo "" >> outdated-report.md
          
          for req_file in requirements.txt generator/requirements.txt omnicore_engine/requirements.txt self_fixing_engineer/requirements.txt; do
            if [ -f "$req_file" ]; then
              echo "### $req_file" >> outdated-report.md
              pip install -r "$req_file" > /dev/null 2>&1 || true
              pip list --outdated --format=markdown >> outdated-report.md || true
              echo "" >> outdated-report.md
            fi
          done
          
      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-dependencies-report
          path: outdated-report.md
          
      - name: Comment on Issue
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('outdated-report.md', 'utf8');
            
            // Find or create an issue for outdated dependencies
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies'
            });
            
            const existingIssue = issues.data.find(issue => 
              issue.title.includes('Outdated Dependencies')
            );
            
            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## Dependency Update Check - ${new Date().toISOString()}\n\n${report}`
              });
            }
