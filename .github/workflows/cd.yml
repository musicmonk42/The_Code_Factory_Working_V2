name: CD - Continuous Deployment

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        component: [root, generator]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Free up disk space for Docker build
        run: |
          # Remove large packages and unused tools to free disk space
          echo "=== Disk space before cleanup ==="
          df -h
          # Remove large tool chains and runtimes
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /opt/hostedtoolcache
          # Remove additional large directories
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/sqlpackage
          # Clear package manager caches
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/cache/apt/archives/*
          # Clear other caches
          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*
          # Aggressively prune Docker
          docker system prune -af --volumes || true
          # Clear BuildKit cache
          docker buildx prune -af || true
          echo "=== Disk space after cleanup ==="
          df -h
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            
      - name: Build and push Docker image - ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component == 'root' && '.' || format('./{0}', matrix.component) }}
          file: ${{ matrix.component == 'root' && 'Dockerfile' || format('{0}/Dockerfile', matrix.component) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    permissions:
      contents: read
    environment:
      name: staging
      url: https://staging.codefactory.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment"
          # Add your deployment commands here
          # Examples:
          # - kubectl apply -f k8s/staging/
          # - helm upgrade --install code-factory ./charts/code-factory --namespace staging
          # - docker-compose -f docker-compose.staging.yml up -d
          
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging"
          # Add smoke test commands here
          # curl -f https://staging.codefactory.example.com/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    permissions:
      contents: read
    environment:
      name: production
      url: https://codefactory.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to production
        run: |
          echo "Deploying to production environment"
          # Add your deployment commands here
          # Examples:
          # - kubectl apply -f k8s/production/
          # - helm upgrade --install code-factory ./charts/code-factory --namespace production
          # - docker-compose -f docker-compose.production.yml up -d
          
      - name: Run smoke tests
        run: |
          echo "Running smoke tests on production"
          # Add smoke test commands here
          # curl -f https://codefactory.example.com/health || exit 1
          
      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Creating release notes for ${{ github.ref_name }}"
          # Generate release notes from commits
          
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-staging, deploy-production]
    permissions:
      contents: read
    
    steps:
      - name: Rollback deployment
        run: |
          echo "Rolling back deployment"
          # Add rollback commands here
          # helm rollback code-factory
          
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    permissions:
      contents: read
    
    steps:
      - name: Send notification
        run: |
          echo "Deployment completed"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "Production: ${{ needs.deploy-production.result }}"
          # Add notification commands (Slack, email, etc.)
