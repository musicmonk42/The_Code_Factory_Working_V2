[pytest]
# Prevent expensive plugin loading during collection
# - no:randomly: Disable pytest-randomly plugin (if installed) to reduce collection overhead
# - no:cacheprovider: Disable pytest cache to avoid filesystem overhead during collection
# - import-mode=importlib: Use importlib instead of prepend mode for cleaner imports
addopts = -p no:randomly -p no:cacheprovider --import-mode=importlib

# Increase collection timeout - this is a large codebase with extensive mocking
# The root conftest.py contains 3000+ lines of module mocking logic
timeout_func_only = true

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to ignore during collection to reduce overhead
norecursedirs = .git .github .venv venv env build dist *.egg-info node_modules __pycache__ .pytest_cache

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    
# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
