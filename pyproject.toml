[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "code-factory"
version = "1.0.0"
description = "Unified Code Factory Platform - AI-driven ecosystem for automated software development and maintenance"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
authors = [
    {name = "Novatrax Labs", email = "support@novatraxlabs.com"}
]
keywords = ["ai", "code-generation", "self-healing", "automation", "devops"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Code Generators",
    "Topic :: Software Development :: Quality Assurance",
]

# Note: This is a unified platform consisting of three integrated modules:
# - generator: README-to-App Code Generator (RCG)
# - omnicore_engine: OmniCore Omega Pro Engine
# - self_fixing_engineer: Self-Fixing Engineer (SFE) powered by Arbiter AI
# All modules share a single unified requirements.txt

[tool.setuptools.packages.find]
where = ["."]
include = ["generator*", "omnicore_engine*", "self_fixing_engineer*"]

[tool.pytest.ini_options]
minversion = "7.4"
addopts = "-ra -q --tb=short"
testpaths = [
    "generator/tests",
    "generator/agents/tests",
    "generator/audit_log/tests",
    "generator/clarifier/tests",
    "generator/intent_parser/tests",
    "generator/main/tests",
    "generator/runner/tests",
    "omnicore_engine/tests",
    "omnicore_engine/database/tests",
    "omnicore_engine/message_bus/tests",
    "self_fixing_engineer/tests",
    "self_fixing_engineer/arbiter/tests",
    "self_fixing_engineer/arbiter/arbiter_growth/tests",
    "self_fixing_engineer/arbiter/bug_manager/tests",
    "self_fixing_engineer/arbiter/explainable_reasoner/tests",
    "self_fixing_engineer/arbiter/knowledge_graph/tests",
    "self_fixing_engineer/arbiter/learner/tests",
    "self_fixing_engineer/arbiter/meta_learning_orchestrator/tests",
    "self_fixing_engineer/arbiter/models/tests",
    "self_fixing_engineer/arbiter/plugins/tests",
    "self_fixing_engineer/arbiter/policy/tests"
]
python_files = ["test_*.py"]
asyncio_mode = "auto"

[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312']
include = '.pyi?$'
exclude = '''
/(
    .git
  | .hg
  | .mypy_cache
  | .tox
  | .venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true

[tool.ruff]
line-length = 88
target-version = "py310"
exclude = [".git", "__pycache__", "build", "dist", ".venv"]

[tool.ruff.lint]
extend-ignore = [
    "E402",  # module level import not at top
    "E712",  # comparison to True/False
    "E721",  # type comparison - use isinstance() instead
    "E722",  # bare except
    "E741",  # ambiguous variable name
    "F401",  # unused import
    "F403",  # undefined local with import star
    "F405",  # may be undefined from star imports
    "F811",  # redefinition of unused variable
    "F821",  # undefined name
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
