# Ruff linting configuration
# https://docs.astral.sh/ruff/

[lint]
# Ignore rules that require extensive manual fixes or are low priority
extend-ignore = [
    "E402",  # module level import not at top - many intentional in tests
    "E712",  # comparison to True/False
    "E721",  # type comparison - use isinstance() instead
    "E722",  # bare except
    "E741",  # ambiguous variable name
    "F401",  # unused import - many conditional imports
    "F403",  # undefined local with import star
    "F405",  # may be undefined from star imports
    "F811",  # redefinition of unused variable
    "F821",  # undefined name - many conditional imports
]

[lint.per-file-ignores]
# Additional relaxed checks in test directories
"**/tests/*.py" = ["F841"]
"**/test_*.py" = ["F841"]
"**/conftest.py" = ["F841"]
