# Development Docker Compose Configuration
# SECURITY NOTE: This file is for local development only.
# Do NOT use in production environments.

services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      # NOTE: Docker socket mount removed for security
      # If Docker-in-Docker is needed, use a dedicated DinD container
    command: sleep infinity
    network_mode: service:redis
    depends_on:
      - redis
      - postgres
    environment:
      # Development-only environment variables
      # IMPORTANT: Generate keys before running:
      #   export AGENTIC_AUDIT_HMAC_KEY=$(openssl rand -hex 32)
      #   export ENCRYPTION_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
      - AGENTIC_AUDIT_HMAC_KEY=${AGENTIC_AUDIT_HMAC_KEY:?AGENTIC_AUDIT_HMAC_KEY is required - run: export AGENTIC_AUDIT_HMAC_KEY=$(openssl rand -hex 32)}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-devpassword}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
      # Database connection - uses asyncpg driver for SQLAlchemy async support
      - DB_PATH=postgresql+asyncpg://codefactory:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/codefactory_dev
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379
      # Development mode settings
      - DEV_MODE=1
      - APP_ENV=development
      - LOG_LEVEL=DEBUG

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devpassword}
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: codefactory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: codefactory_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codefactory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
