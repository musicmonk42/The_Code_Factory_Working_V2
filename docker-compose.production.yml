# Production Docker Compose Configuration
# This file provides production-ready settings with security best practices
# 
# ============================================================================
# CRITICAL SECURITY WARNING
# ============================================================================
# 1. NEVER use default passwords in production
# 2. Store ALL secrets in external secrets manager (AWS Secrets Manager, Vault, etc.)
# 3. Generate strong random passwords (see instructions below)
# 4. Rotate secrets regularly (every 90 days minimum)
# 5. Use proper SSL/TLS certificates
# 6. Enable all monitoring and security features
# 7. Review and follow DOCKER_SECURITY.md guidelines
#
# Generate Strong Secrets:
#   REDIS_PASSWORD: openssl rand -base64 32
#   POSTGRES_PASSWORD: openssl rand -base64 32  
#   AGENTIC_AUDIT_HMAC_KEY: openssl rand -hex 32
#   ENCRYPTION_KEY: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# Security Checklist:
#   [ ] All secrets generated and stored in secrets manager
#   [ ] Different passwords per environment (dev/staging/prod)
#   [ ] SSL/TLS certificates obtained and configured
#   [ ] Firewall rules applied
#   [ ] Monitoring and alerting enabled
#   [ ] Regular security scans scheduled
#   [ ] Backup and disaster recovery tested
# ============================================================================

services:
  # Redis for message bus and caching
  redis:
    image: redis:7.4-alpine
    container_name: codefactory-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - codefactory-network

  # PostgreSQL database with Citus extension for production scale-out
  # Using citusdata/citus image provides the Citus extension for distributed SQL
  postgres:
    image: citusdata/citus:12.1
    container_name: codefactory-postgres-prod
    environment:
      POSTGRES_DB: codefactory
      POSTGRES_USER: codefactory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codefactory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - codefactory-network

  # Unified Code Factory Platform
  codefactory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codefactory-platform-prod
    environment:
      # ============================================
      # CRITICAL: Application Environment
      # ============================================
      - APP_ENV=production
      - DEV_MODE=0
      - PRODUCTION_MODE=1
      
      # ============================================
      # CRITICAL: Security Configuration
      # Replace with strong random keys from secrets manager!
      # ============================================
      - AGENTIC_AUDIT_HMAC_KEY=${AGENTIC_AUDIT_HMAC_KEY}  # REQUIRED: 64-char hex key
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}  # REQUIRED: Fernet key
      - KMS_KEY_ID=${KMS_KEY_ID:-}  # Optional: AWS KMS key
      
      # ============================================
      # Startup Optimization
      # ============================================
      - APP_STARTUP=1
      - SKIP_IMPORT_TIME_VALIDATION=1
      - SPACY_WARNING_IGNORE=W007
      
      # ============================================
      # Configuration Path Resolution
      # ============================================
      # Optional: Set custom path to runner configuration file
      # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
      # For production, recommend explicit path to ensure correct config is loaded
      # Example: RUNNER_CONFIG_PATH=/app/config/production.yaml
      # Default search order:
      #   1. RUNNER_CONFIG_PATH (if set)
      #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
      # - RUNNER_CONFIG_PATH=${RUNNER_CONFIG_PATH:-/app/generator/config.yaml}
      
      # ============================================
      # Database Configuration
      # ============================================
      - DB_PATH=postgresql+asyncpg://codefactory:${POSTGRES_PASSWORD}@postgres:5432/codefactory
      - DB_POOL_SIZE=50
      - DB_POOL_MAX_OVERFLOW=20
      - DB_RETRY_ATTEMPTS=3
      - DB_RETRY_DELAY=1.0
      
      # ============================================
      # Message Bus Configuration
      # ============================================
      - MESSAGE_BUS_SHARD_COUNT=8
      - MESSAGE_BUS_WORKERS_PER_SHARD=4
      - ENABLE_MESSAGE_BUS_GUARDIAN=1
      - MESSAGE_BUS_GUARDIAN_INTERVAL=30
      
      # ============================================
      # LLM Provider Configuration
      # ============================================
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # REQUIRED for most features
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - LLM_TIMEOUT=300
      - LLM_MAX_RETRIES=3
      - LLM_TEMPERATURE=0.7
      - TESTGEN_LLM_TIMEOUT=${TESTGEN_LLM_TIMEOUT:-300}  # Testgen-specific timeout (5 minutes)
      
      # ============================================
      # Infrastructure
      # ============================================
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}  # Kafka broker addresses
      
      # ============================================
      # Citus Extension Configuration
      # ============================================
      # Set to 1 to enable Citus distributed SQL features for production scale-out
      # Requires postgres service to use citusdata/citus image (already configured)
      - ENABLE_CITUS=${ENABLE_CITUS:-1}  # Enabled by default in production
      
      # ============================================
      # CORS Configuration
      # CRITICAL: Set ALLOWED_ORIGINS for production domains
      # Example: https://yourdomain.com,https://app.yourdomain.com
      # ============================================
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}  # REQUIRED for production web clients
      
      # ============================================
      # Feature Flags
      # Options: "0" (disabled), "1" (enabled), "auto" (auto-detect based on library availability)
      # ============================================
      - ENABLE_DATABASE=${ENABLE_DATABASE:-1}  # Database support enabled by default
      - ENABLE_HSM=${ENABLE_HSM:-auto}  # Hardware Security Module support with auto-detection
      - ENABLE_FEATURE_STORE=${ENABLE_FEATURE_STORE:-auto}  # Feast feature store with auto-detection
      - ENABLE_LIBVIRT=${ENABLE_LIBVIRT:-auto}  # Libvirt virtualization support with auto-detection
      - ENABLE_REDIS=1
      - ENABLE_KAFKA=${ENABLE_KAFKA:-0}
      
      # ============================================
      # Performance Flags
      # ============================================
      - PARALLEL_AGENT_LOADING=1  # Enable parallel agent loading for faster startup
      - LAZY_LOAD_ML=1  # Lazy load ML libraries to reduce memory usage
      
      # ============================================
      # Audit Crypto Configuration (SECURITY UPDATE)
      # Set AUDIT_CRYPTO_MODE="software" for production security
      # ============================================
      - AUDIT_CRYPTO_MODE=${AUDIT_CRYPTO_MODE:-software}  # Changed from "disabled" to "software"
      - AUDIT_CRYPTO_ALLOW_INIT_FAILURE=${AUDIT_CRYPTO_ALLOW_INIT_FAILURE:-1}
      - AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64=${AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64:-}
      
      # ============================================
      # Sentry Error Tracking (Optional)
      # Automatically enabled when SENTRY_DSN is set
      # ============================================
      - SENTRY_DSN=${SENTRY_DSN:-}
      
      # ============================================
      # Logging Configuration
      # ============================================
      - LOG_LEVEL=INFO
      - ENABLE_STRUCTURED_LOGGING=1
      
      # ============================================
      # Monitoring
      # ============================================
      - PROMETHEUS_PORT=9090
      
      # ============================================
      # Application Paths
      # ============================================
      - CREW_CONFIG_PATH=/app/self_fixing_engineer/crew_config.yaml
      - AUDIT_LOG_PATH=/app/logs/audit_trail.log
      
      # ============================================
      # Worker Configuration
      # ============================================
      - WORKER_COUNT=${WORKER_COUNT:-4}
      
    ports:
      - "8000:8000"  # Main API endpoint
      - "9090:9090"  # Prometheus metrics
    volumes:
      # Use named volumes for persistence, not bind mounts
      - platform-output:/app/output
      - platform-uploads:/app/uploads
      - platform-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - codefactory-network
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false  # Set to true if possible, requires tmpfs mounts for write paths
    tmpfs:
      - /tmp:size=256M,mode=1777
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Command with production workers
    # Using gunicorn with secure defaults
    # Note: WORKER_COUNT must be set in environment before running docker-compose
    command: ["sh", "-c", "gunicorn server.main:app -w $${WORKER_COUNT:-4} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300 --graceful-timeout 30 --keep-alive 5 --max-requests 1000 --max-requests-jitter 50 --access-logfile - --error-logfile -"]

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: codefactory-prometheus-prod
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: always
    networks:
      - codefactory-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.3.3
    container_name: codefactory-grafana-prod
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.yourdomain.com
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: always
    networks:
      - codefactory-network

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  platform-output:
    driver: local
  platform-uploads:
    driver: local
  platform-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  codefactory-network:
    driver: bridge

# ============================================
# Production Deployment Instructions
# ============================================
#
# 1. Create .env.production file with all required secrets:
#    AGENTIC_AUDIT_HMAC_KEY=<64-char-hex-key>
#    ENCRYPTION_KEY=<fernet-key>
#    POSTGRES_PASSWORD=<strong-password>
#    REDIS_PASSWORD=<strong-password>
#    OPENAI_API_KEY=<your-key>
#    GRAFANA_PASSWORD=<strong-password>
#
# 2. Generate strong keys:
#    # HMAC key (64 hex chars)
#    openssl rand -hex 32
#    
#    # Fernet encryption key
#    python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# 3. Deploy:
#    docker-compose -f docker-compose.production.yml --env-file .env.production up -d
#
# 4. Verify:
#    docker-compose -f docker-compose.production.yml ps
#    curl http://localhost:8000/health
#    curl http://localhost:8000/ready
#
# 5. Monitor:
#    Prometheus: http://localhost:9091
#    Grafana: http://localhost:3000
#    Metrics: http://localhost:9090/metrics
#
# 6. Backup:
#    docker-compose -f docker-compose.production.yml exec postgres pg_dump -U codefactory codefactory > backup.sql
#
# 7. Security Checklist:
#    [ ] All secrets stored in secrets manager (not .env files)
#    [ ] Strong random keys generated
#    [ ] Different keys per environment
#    [ ] SSL/TLS enabled (use reverse proxy like nginx)
#    [ ] Firewall rules configured
#    [ ] Regular key rotation schedule
#    [ ] Monitoring and alerting configured
#    [ ] Backup and restore tested
