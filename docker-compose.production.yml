# Production Docker Compose Configuration
# Redis and Postgres are provided by Railway — set REDIS_URL and DATABASE_URL
# from your Railway service "Connect" tabs. No local DB containers needed.
#
# ============================================================================
# CRITICAL SECURITY WARNING
# ============================================================================
# 1. Store ALL secrets in Railway's environment variable settings or a secrets manager
# 2. Generate strong random keys (see instructions below)
# 3. Rotate secrets regularly (every 90 days minimum)
# 4. Use proper SSL/TLS certificates
# 5. Enable all monitoring and security features
#
# Generate Strong Secrets:
#   AGENTIC_AUDIT_HMAC_KEY: openssl rand -hex 32
#   ENCRYPTION_KEY: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# Security Checklist:
#   [ ] All secrets stored in Railway env vars (not committed to repo)
#   [ ] Different keys per environment (dev/staging/prod)
#   [ ] SSL/TLS enabled via Railway's built-in TLS
#   [ ] Monitoring and alerting configured
# ============================================================================

services:
  # Unified Code Factory Platform
  codefactory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codefactory-platform-prod
    environment:
      # ============================================
      # CRITICAL: Application Environment
      # ============================================
      - APP_ENV=production
      - DEV_MODE=0
      - PRODUCTION_MODE=1
      # Deterministic build mode — set to 1 to enforce byte-identical reproducible builds.
      # Activates sorted ZIP entries, fixed timestamps, temperature=0 LLM calls, and
      # build_plan.json enforcement.  Recommended when CI validates supply-chain integrity.
      - DETERMINISTIC=${DETERMINISTIC:-0}

      # ============================================
      # CRITICAL: Security Configuration
      # Replace with strong random keys from secrets manager!
      # ============================================
      - AGENTIC_AUDIT_HMAC_KEY=${AGENTIC_AUDIT_HMAC_KEY}  # REQUIRED: 64-char hex key
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}  # REQUIRED: Fernet key
      - KMS_KEY_ID=${KMS_KEY_ID:-}  # Optional: AWS KMS key

      # ============================================
      # Startup Optimization
      # ============================================
      - APP_STARTUP=1
      - SKIP_IMPORT_TIME_VALIDATION=1
      - SPACY_WARNING_IGNORE=W007
      - PYTHONPATH=/app

      # ============================================
      # Configuration Path Resolution
      # ============================================
      # Optional: Set custom path to runner configuration file
      # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
      # For production, recommend explicit path to ensure correct config is loaded
      # Example: RUNNER_CONFIG_PATH=/app/config/production.yaml
      # Default search order:
      #   1. RUNNER_CONFIG_PATH (if set)
      #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
      # - RUNNER_CONFIG_PATH=${RUNNER_CONFIG_PATH:-/app/generator/config.yaml}

      # ============================================
      # Database and Cache — provided by Railway
      # ============================================
      - DB_PATH=${DB_PATH}
      - DATABASE_URL=${DATABASE_URL}
      - DB_POOL_SIZE=50
      - DB_POOL_MAX_OVERFLOW=20
      - DB_CONNECT_TIMEOUT=30  # Connection timeout in seconds
      - DB_COMMAND_TIMEOUT=60  # Query execution timeout in seconds
      - DB_RETRY_ATTEMPTS=3
      - DB_RETRY_DELAY=1.0
      # Canonical names read by codebase_analyzer.py (mirrors DB_RETRY_* above)
      - DATABASE_RETRY_ATTEMPTS=3
      - DATABASE_RETRY_DELAY=1.0

      # ============================================
      # Message Bus Configuration
      # ============================================
      - MESSAGE_BUS_SHARD_COUNT=8
      - MESSAGE_BUS_WORKERS_PER_SHARD=4
      - ENABLE_MESSAGE_BUS_GUARDIAN=1
      - MESSAGE_BUS_GUARDIAN_INTERVAL=30
      # Canonical shard count (Feature 5) — takes precedence over MESSAGE_BUS_SHARD_COUNT
      - MESSAGE_BUS_SHARDS=${MESSAGE_BUS_SHARDS:-8}
      # Post-Quantum Cryptography signing for audit logs
      # Requires pqcrypto>=0.1.3 or liboqs-python>=0.12.0 (see requirements-pqc.txt)
      - USE_PQC_SIGNING=${USE_PQC_SIGNING:-false}
      # Job-status WebSocket heartbeat / idle-connection timeout (seconds)
      - JOBS_WS_TIMEOUT=${JOBS_WS_TIMEOUT:-30}

      # ============================================
      # LLM Provider Configuration
      # ============================================
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # REQUIRED for most features
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      # Per-call LLM API timeout (seconds).
      # Multi-pass ensemble generation makes 3 sequential ensemble calls per large-spec job;
      # total generation budget per job = up to 3 × LLM_TIMEOUT (background task, not HTTP).
      - LLM_TIMEOUT=300
      - LLM_MAX_RETRIES=3
      - LLM_TEMPERATURE=0.7
      - TESTGEN_LLM_TIMEOUT=${TESTGEN_LLM_TIMEOUT:-300}  # Testgen-specific timeout (5 minutes)
      # Maximum tokens for code-generation prompts (supports large README-driven specs)
      - CODEGEN_MAX_PROMPT_TOKENS=${CODEGEN_MAX_PROMPT_TOKENS:-32000}
      # Minimum character length for an optimised prompt returned by docgen_prompt.py.
      # When gpt-3.5-turbo compresses below this threshold, the system retries with
      # gpt-4o-mini before falling back to hard token-budget truncation.
      - DOCGEN_PROMPT_MIN_LENGTH=${DOCGEN_PROMPT_MIN_LENGTH:-800}
      # Docgen context pre-summarisation — truncate files to avoid >150s prompt latency.
      - DOCGEN_MAX_CONTEXT_CHARS=${DOCGEN_MAX_CONTEXT_CHARS:-30000}
      - DOCGEN_TRUNCATION_LINES=${DOCGEN_TRUNCATION_LINES:-100}
      # Multi-pass code generation thresholds.
      # When a spec reaches either threshold the codegen agent splits generation into
      # sequential passes and auto-enables ensemble voting per chunk.
      - CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD=${CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD:-10}
      - CODEGEN_MULTIPASS_FILE_THRESHOLD=${CODEGEN_MULTIPASS_FILE_THRESHOLD:-20}
      - CODEGEN_MULTIPASS_MD_SIZE_THRESHOLD=${CODEGEN_MULTIPASS_MD_SIZE_THRESHOLD:-30000}

      # ============================================
      # Infrastructure — provided by Railway
      # ============================================
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-}  # Required when ENABLE_KAFKA=1; validated at app startup if Kafka is enabled

      # ============================================
      # Citus Extension Configuration
      # ============================================
      # Set to 1 to enable Citus distributed SQL features for production scale-out
      # Requires postgres service to use citusdata/citus image (already configured)
      - ENABLE_CITUS=${ENABLE_CITUS:-1}  # Enabled by default in production

      # ============================================
      # CORS Configuration
      # CRITICAL: Set ALLOWED_ORIGINS for production domains
      # Example: https://yourdomain.com,https://app.yourdomain.com
      # ============================================
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}  # REQUIRED for production web clients

      # ============================================
      # Feature Flags
      # Options: "0" (disabled), "1" (enabled), "auto" (auto-detect based on library availability)
      # ============================================
      - ENABLE_DATABASE=${ENABLE_DATABASE:-1}  # Database support enabled by default
      - ENABLE_HSM=${ENABLE_HSM:-auto}  # Hardware Security Module support with auto-detection
      - ENABLE_FEATURE_STORE=${ENABLE_FEATURE_STORE:-auto}  # Feast feature store with auto-detection
      - ENABLE_LIBVIRT=${ENABLE_LIBVIRT:-auto}  # Libvirt virtualization support with auto-detection
      - ENABLE_REDIS=1
      - ENABLE_KAFKA=${ENABLE_KAFKA:-0}

      # ============================================
      # Performance Flags
      # ============================================
      - PARALLEL_AGENT_LOADING=1  # Enable parallel agent loading for faster startup
      - LAZY_LOAD_ML=1  # Lazy load ML libraries to reduce memory usage

      # ============================================
      # Audit Crypto Configuration (SECURITY UPDATE)
      # Set AUDIT_CRYPTO_MODE="software" for production security
      # ============================================
      - AUDIT_CRYPTO_MODE=${AUDIT_CRYPTO_MODE:-software}  # Changed from "disabled" to "software"
      - AUDIT_CRYPTO_ALLOW_INIT_FAILURE=${AUDIT_CRYPTO_ALLOW_INIT_FAILURE:-1}
      - AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64=${AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64:-}
      
      # Docker/Container secret management
      # Set to "true" to use plaintext secrets from container environment
      # Set to "false" for AWS deployments using KMS
      - USE_ENV_SECRETS=${USE_ENV_SECRETS:-true}
      - AUDIT_CRYPTO_USE_KMS=${AUDIT_CRYPTO_USE_KMS:-false}

      # ============================================
      # Sentry Error Tracking (Optional)
      # Automatically enabled when SENTRY_DSN is set
      # ============================================
      - SENTRY_DSN=${SENTRY_DSN:-}
      # Sentry environment tag for event classification (production/staging/development)
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}

      # ============================================
      # Intent Capture Module (Bug fixes: #4, #10, #17)
      # ============================================
      # CLI WebSocket collaboration JWT secret (intent_capture/cli.py)
      # REQUIRED in production — generate with: openssl rand -hex 32
      - CLI_JWT_SECRET=${CLI_JWT_SECRET:?CLI_JWT_SECRET is required in production}
      # Vault KV v2 path for the JWT_SECRET shared by API and CLI (Bug 17)
      - JWT_VAULT_PATH=${JWT_VAULT_PATH:-secrets/data/jwt}
      # RabbitMQ URL for task queuing — only needed when USE_QUEUE=true
      - RABBITMQ_URL=${RABBITMQ_URL:-}

      # ============================================
      # Logging Configuration
      # ============================================
      - LOG_LEVEL=INFO
      - ENABLE_STRUCTURED_LOGGING=1

      # ============================================
      # Monitoring
      # ============================================
      - PROMETHEUS_PORT=9090
      # OpenTelemetry OTLP export endpoint (Bug 6 fix: set to route spans to a collector
      # instead of stdout, eliminating Railway's 500 logs/sec rate-limit hits).
      # Example: - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # OpenTelemetry Batch Span Processor tuning — keeps export bursts well under
      # Railway's 500 logs/sec rate limit.
      - OTEL_BSP_MAX_EXPORT_BATCH_SIZE=${OTEL_BSP_MAX_EXPORT_BATCH_SIZE:-64}
      - OTEL_BSP_SCHEDULE_DELAY=${OTEL_BSP_SCHEDULE_DELAY:-10000}
      - OTEL_BSP_MAX_QUEUE_SIZE=${OTEL_BSP_MAX_QUEUE_SIZE:-2048}
      # Batch per-file lint spans into a single parent span to avoid Railway rate limit.
      - OTEL_BATCH_LINT_SPANS=${OTEL_BATCH_LINT_SPANS:-true}
      # RAG/vector DB for context-aware critique (off by default).
      - RAG_ENABLED=${RAG_ENABLED:-false}
      # Set below 1.0 to sample traces (e.g. 0.5 = 50 %); 1.0 = sample all (default).
      - OTEL_TRACES_SAMPLE_RATE=${OTEL_TRACES_SAMPLE_RATE:-1.0}

      # ============================================
      # Application Paths
      # ============================================
      - CREW_CONFIG_PATH=/app/self_fixing_engineer/crew_config.yaml
      - AUDIT_LOG_PATH=/app/logs/audit_trail.log
      # Refactor Agent config override (defaults to bundled refactor_agent.yaml)
      - REFACTOR_AGENT_CONFIG=${REFACTOR_AGENT_CONFIG:-/app/self_fixing_engineer/refactor_agent/refactor_agent.yaml}
      # ConfigDB remote resolution (leave empty to use bundled local YAML)
      - CONFIGDB_REMOTE_ENDPOINT=${CONFIGDB_REMOTE_ENDPOINT:-}
      - CONFIGDB_ALLOWED_HOSTS=${CONFIGDB_ALLOWED_HOSTS:-}
      # SFE Arbiter analysis tuning
      # Wall-clock budget for one full codebase scan (default 300 s = 5 min).
      - SFE_ANALYSIS_TIMEOUT_SECONDS=${SFE_ANALYSIS_TIMEOUT_SECONDS:-300}
      # Critique pipeline outer budget: security scanning (bandit/semgrep) can take
      # longer than linting alone.  180 s covers large repos (≥ 46 files).
      - PIPELINE_CRITIQUE_TIMEOUT_SECONDS=${PIPELINE_CRITIQUE_TIMEOUT_SECONDS:-180}
      # Skip individual linters when running in resource-constrained environments.
      - SFE_SKIP_MYPY=${SFE_SKIP_MYPY:-false}
      - SFE_SKIP_PYLINT=${SFE_SKIP_PYLINT:-false}
      # SFE_FAST_MODE=true skips both Pylint and Mypy, running only Bandit + Radon.
      - SFE_FAST_MODE=${SFE_FAST_MODE:-false}
      # Skip Alembic migrations during analysis-only runs (~39s saving per run).
      - SFE_SKIP_MIGRATE_ON_ANALYSIS=${SFE_SKIP_MIGRATE_ON_ANALYSIS:-false}
      # AUTO_MIGRATE=0 disables automatic Alembic upgrade at startup.
      - AUTO_MIGRATE=${AUTO_MIGRATE:-0}

      # ============================================
      # Arbiter Configuration
      # ============================================
      # Arbiter world-size controls how many virtual agent slots the Arbiter manages.
      - ARBITER_WORLD_SIZE=${ARBITER_WORLD_SIZE:-10}
      # Arbiter role: "admin" for full-access primary arbiter.
      - ARBITER_ROLE=${ARBITER_ROLE:-admin}
      # Absolute path for the encrypted policy configuration file (PolicyManager).
      # Must be on the data PVC so policies survive pod/container restarts.
      - POLICY_CONFIG_FILE_PATH=${POLICY_CONFIG_FILE_PATH:-/app/data/policies.json}
      # Reports directory — used by the Genetic Evolution Engine to persist the GA
      # population (evolution_population.json) across container restarts, including
      # evolved prompt templates stored in genomes. Must be on a persistent volume.
      - REPORTS_DIRECTORY=${REPORTS_DIRECTORY:-/app/data/reports}

      # ============================================
      # Genetic Evolution Engine (Feature 5)
      # ============================================
      # IB-2: arbiter.py now reads these env vars to configure evolve_configs() calls.
      - EVOLUTION_POPULATION_SIZE=${EVOLUTION_POPULATION_SIZE:-10}
      - EVOLUTION_GENERATIONS=${EVOLUTION_GENERATIONS:-5}
      # GA backend selector for Arbiter.evolve(): auto | deap | custom
      # "auto" prefers DEAP when available; falls back to the custom GA.
      - EVOLUTION_BACKEND=${EVOLUTION_BACKEND:-auto}
      # ArbiterGrowthManager evolutionary experiment parameters (arbiter_growth_manager.py).
      - EXPLORER_EVOLUTION_GENERATIONS=${EXPLORER_EVOLUTION_GENERATIONS:-5}
      - EXPLORER_EVOLUTION_POPULATION_SIZE=${EXPLORER_EVOLUTION_POPULATION_SIZE:-10}
      # Minimum RL action-outcome samples before learn_from_data() trains a model.
      - MIN_SUPERVISED_TRAINING_SAMPLES=${MIN_SUPERVISED_TRAINING_SAMPLES:-50}
      # Guard for the experimental SelfEvolutionEngine: must be "true" to allow
      # SelfEvolutionEngine.start() when PRODUCTION_MODE=1.  Always "false" in
      # production unless the evolution subsystem has passed full QA sign-off.
      - ENABLE_EXPERIMENTAL_EVOLUTION=false
      # DLT backend type (RB-5: evm/ethereum now fully supported in dlt_backend.py).
      - DLT_TYPE=${DLT_TYPE:-fabric}
      # DLT HMAC signing key for checkpoint integrity (dlt_backend + off-chain clients).
      # REQUIRED in production. Generate: openssl rand -hex 32
      - DLT_HMAC_KEY=${DLT_HMAC_KEY}
      # AES-256-GCM client-side encryption key for S3 off-chain blobs (64 hex chars = 32 bytes).
      # REQUIRED in production when DLT_ENCRYPT_AT_REST=true.
      # Generate: python -c "import os; print(os.urandom(32).hex())"
      - DLT_ENCRYPTION_KEY=${DLT_ENCRYPTION_KEY}
      # Enable client-side AES-256-GCM encryption of off-chain blobs before upload.
      - DLT_ENCRYPT_AT_REST=${DLT_ENCRYPT_AT_REST:-true}
      # S3 off-chain blob storage (used by S3OffChainClient when DLT_TYPE=fabric).
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION:-us-east-1}
      # AWS credentials (omit to use the task's IAM role — strongly preferred in production).
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      # Hyperledger Fabric DLT client configuration (used when DLT_TYPE=fabric).
      - FABRIC_CHANNEL=${FABRIC_CHANNEL:-codefactory-channel}
      - FABRIC_CHAINCODE=${FABRIC_CHAINCODE:-codefactory-cc}
      - FABRIC_ORG=${FABRIC_ORG:-Org1}
      - FABRIC_USER=${FABRIC_USER:-Admin}
      - FABRIC_NETWORK_PROFILE=${FABRIC_NETWORK_PROFILE:-/app/data/fabric/connection-profile.json}
      # ============================================
      # Single worker mode - FastAPI is async and multiple workers cause job sync issues
      - WORKER_COUNT=${WORKER_COUNT:-1}

    ports:
      - "8000:8000"  # Main API endpoint
      - "9090:9090"  # Prometheus metrics
    volumes:
      # Use named volumes for persistence, not bind mounts
      - platform-output:/app/output
      - platform-uploads:/app/uploads
      - platform-logs:/app/logs
      - platform-data:/app/data  # Persists policies.json, provenance.json, reports, DLT data
    restart: always
    networks:
      - codefactory-network
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false  # Set to true if possible, requires tmpfs mounts for write paths
    tmpfs:
      - /tmp:size=256M,mode=1777
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # Command with single worker for async FastAPI
    # Using gunicorn with secure defaults
    # Single worker prevents job synchronization issues in async applications
    command: ["sh", "-c", "gunicorn server.main:app -w $${WORKER_COUNT:-1} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300 --graceful-timeout 30 --keep-alive 5 --max-requests 1000 --max-requests-jitter 50 --access-logfile - --error-logfile -"]

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: codefactory-prometheus-prod
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: always
    networks:
      - codefactory-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.3.3
    container_name: codefactory-grafana-prod
    ports:
      - "3000:3000"
    environment:
      - "GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required — generate with: openssl rand -base64 32}"
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.yourdomain.com
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      prometheus:
        condition: service_healthy
    restart: always
    networks:
      - codefactory-network

volumes:
  platform-output:
    driver: local
  platform-uploads:
    driver: local
  platform-logs:
    driver: local
  platform-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  codefactory-network:
    driver: bridge

# ============================================
# Production Deployment Instructions
# ============================================
#
# Redis and Postgres are provided by Railway.
# Railway automatically injects REDIS_URL and DATABASE_URL into
# the service environment — no local containers needed.
#
# 1. Set required secrets in Railway (or your secrets manager):
#    AGENTIC_AUDIT_HMAC_KEY=<64-char-hex-key>   openssl rand -hex 32
#    ENCRYPTION_KEY=<fernet-key>                 python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#    OPENAI_API_KEY=<your-key>
#    GRAFANA_PASSWORD=<strong-password>
#
# 2. Deploy:
#    docker-compose -f docker-compose.production.yml --env-file .env.production up -d
#
# 3. Verify:
#    docker-compose -f docker-compose.production.yml ps
#    curl http://localhost:8000/health
#    curl http://localhost:8000/ready
#
# 4. Monitor:
#    Prometheus: http://localhost:9091
#    Grafana: http://localhost:3000
#    Metrics: http://localhost:9090/metrics
