# Production Docker Compose Configuration
# Redis and Postgres are provided by Railway — set REDIS_URL and DATABASE_URL
# from your Railway service "Connect" tabs. No local DB containers needed.
#
# ============================================================================
# CRITICAL SECURITY WARNING
# ============================================================================
# 1. Store ALL secrets in Railway's environment variable settings or a secrets manager
# 2. Generate strong random keys (see instructions below)
# 3. Rotate secrets regularly (every 90 days minimum)
# 4. Use proper SSL/TLS certificates
# 5. Enable all monitoring and security features
#
# Generate Strong Secrets:
#   AGENTIC_AUDIT_HMAC_KEY: openssl rand -hex 32
#   ENCRYPTION_KEY: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# Security Checklist:
#   [ ] All secrets stored in Railway env vars (not committed to repo)
#   [ ] Different keys per environment (dev/staging/prod)
#   [ ] SSL/TLS enabled via Railway's built-in TLS
#   [ ] Monitoring and alerting configured
# ============================================================================

services:
  # Unified Code Factory Platform
  codefactory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codefactory-platform-prod
    environment:
      # ============================================
      # CRITICAL: Application Environment
      # ============================================
      - APP_ENV=production
      - DEV_MODE=0
      - PRODUCTION_MODE=1

      # ============================================
      # CRITICAL: Security Configuration
      # Replace with strong random keys from secrets manager!
      # ============================================
      - AGENTIC_AUDIT_HMAC_KEY=${AGENTIC_AUDIT_HMAC_KEY}  # REQUIRED: 64-char hex key
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}  # REQUIRED: Fernet key
      - KMS_KEY_ID=${KMS_KEY_ID:-}  # Optional: AWS KMS key

      # ============================================
      # Startup Optimization
      # ============================================
      - APP_STARTUP=1
      - SKIP_IMPORT_TIME_VALIDATION=1
      - SPACY_WARNING_IGNORE=W007

      # ============================================
      # Configuration Path Resolution
      # ============================================
      # Optional: Set custom path to runner configuration file
      # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
      # For production, recommend explicit path to ensure correct config is loaded
      # Example: RUNNER_CONFIG_PATH=/app/config/production.yaml
      # Default search order:
      #   1. RUNNER_CONFIG_PATH (if set)
      #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
      # - RUNNER_CONFIG_PATH=${RUNNER_CONFIG_PATH:-/app/generator/config.yaml}

      # ============================================
      # Database and Cache — provided by Railway
      # ============================================
      - DB_PATH=${DB_PATH}
      - DATABASE_URL=${DATABASE_URL}
      - DB_POOL_SIZE=50
      - DB_POOL_MAX_OVERFLOW=20
      - DB_CONNECT_TIMEOUT=30  # Connection timeout in seconds
      - DB_COMMAND_TIMEOUT=60  # Query execution timeout in seconds
      - DB_RETRY_ATTEMPTS=3
      - DB_RETRY_DELAY=1.0

      # ============================================
      # Message Bus Configuration
      # ============================================
      - MESSAGE_BUS_SHARD_COUNT=8
      - MESSAGE_BUS_WORKERS_PER_SHARD=4
      - ENABLE_MESSAGE_BUS_GUARDIAN=1
      - MESSAGE_BUS_GUARDIAN_INTERVAL=30
      # Canonical shard count (Feature 5) — takes precedence over MESSAGE_BUS_SHARD_COUNT
      - MESSAGE_BUS_SHARDS=${MESSAGE_BUS_SHARDS:-8}
      # Post-Quantum Cryptography signing for audit logs
      # Requires pqcrypto>=0.1.3 or liboqs-python>=0.12.0 (see requirements-pqc.txt)
      - USE_PQC_SIGNING=${USE_PQC_SIGNING:-false}
      # Job-status WebSocket heartbeat / idle-connection timeout (seconds)
      - JOBS_WS_TIMEOUT=${JOBS_WS_TIMEOUT:-30}

      # ============================================
      # LLM Provider Configuration
      # ============================================
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # REQUIRED for most features
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      # Per-call LLM API timeout (seconds).
      # Multi-pass ensemble generation makes 3 sequential ensemble calls per large-spec job;
      # total generation budget per job = up to 3 × LLM_TIMEOUT (background task, not HTTP).
      - LLM_TIMEOUT=300
      - LLM_MAX_RETRIES=3
      - LLM_TEMPERATURE=0.7
      - TESTGEN_LLM_TIMEOUT=${TESTGEN_LLM_TIMEOUT:-300}  # Testgen-specific timeout (5 minutes)
      # Maximum tokens for code-generation prompts (supports large README-driven specs)
      - CODEGEN_MAX_PROMPT_TOKENS=${CODEGEN_MAX_PROMPT_TOKENS:-32000}
      # Multi-pass code generation thresholds.
      # When a spec reaches either threshold the codegen agent splits generation into
      # sequential passes and auto-enables ensemble voting per chunk.
      - CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD=${CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD:-15}
      - CODEGEN_MULTIPASS_FILE_THRESHOLD=${CODEGEN_MULTIPASS_FILE_THRESHOLD:-20}

      # ============================================
      # Infrastructure — provided by Railway
      # ============================================
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:?KAFKA_BOOTSTRAP_SERVERS is required in production — set to your Kafka broker addresses}  # Kafka broker addresses

      # ============================================
      # Citus Extension Configuration
      # ============================================
      # Set to 1 to enable Citus distributed SQL features for production scale-out
      # Requires postgres service to use citusdata/citus image (already configured)
      - ENABLE_CITUS=${ENABLE_CITUS:-1}  # Enabled by default in production

      # ============================================
      # CORS Configuration
      # CRITICAL: Set ALLOWED_ORIGINS for production domains
      # Example: https://yourdomain.com,https://app.yourdomain.com
      # ============================================
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}  # REQUIRED for production web clients

      # ============================================
      # Feature Flags
      # Options: "0" (disabled), "1" (enabled), "auto" (auto-detect based on library availability)
      # ============================================
      - ENABLE_DATABASE=${ENABLE_DATABASE:-1}  # Database support enabled by default
      - ENABLE_HSM=${ENABLE_HSM:-auto}  # Hardware Security Module support with auto-detection
      - ENABLE_FEATURE_STORE=${ENABLE_FEATURE_STORE:-auto}  # Feast feature store with auto-detection
      - ENABLE_LIBVIRT=${ENABLE_LIBVIRT:-auto}  # Libvirt virtualization support with auto-detection
      - ENABLE_REDIS=1
      - ENABLE_KAFKA=${ENABLE_KAFKA:-0}

      # ============================================
      # Performance Flags
      # ============================================
      - PARALLEL_AGENT_LOADING=1  # Enable parallel agent loading for faster startup
      - LAZY_LOAD_ML=1  # Lazy load ML libraries to reduce memory usage

      # ============================================
      # Audit Crypto Configuration (SECURITY UPDATE)
      # Set AUDIT_CRYPTO_MODE="software" for production security
      # ============================================
      - AUDIT_CRYPTO_MODE=${AUDIT_CRYPTO_MODE:-software}  # Changed from "disabled" to "software"
      - AUDIT_CRYPTO_ALLOW_INIT_FAILURE=${AUDIT_CRYPTO_ALLOW_INIT_FAILURE:-1}
      - AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64=${AUDIT_CRYPTO_SOFTWARE_KEY_MASTER_ENCRYPTION_KEY_B64:-}
      
      # Docker/Container secret management
      # Set to "true" to use plaintext secrets from container environment
      # Set to "false" for AWS deployments using KMS
      - USE_ENV_SECRETS=${USE_ENV_SECRETS:-true}
      - AUDIT_CRYPTO_USE_KMS=${AUDIT_CRYPTO_USE_KMS:-false}

      # ============================================
      # Sentry Error Tracking (Optional)
      # Automatically enabled when SENTRY_DSN is set
      # ============================================
      - SENTRY_DSN=${SENTRY_DSN:-}

      # ============================================
      # Logging Configuration
      # ============================================
      - LOG_LEVEL=INFO
      - ENABLE_STRUCTURED_LOGGING=1

      # ============================================
      # Monitoring
      # ============================================
      - PROMETHEUS_PORT=9090

      # ============================================
      # Application Paths
      # ============================================
      - CREW_CONFIG_PATH=/app/self_fixing_engineer/crew_config.yaml
      - AUDIT_LOG_PATH=/app/logs/audit_trail.log

      # ============================================
      # Arbiter Configuration
      # ============================================
      # Arbiter world-size controls how many virtual agent slots the Arbiter manages.
      - ARBITER_WORLD_SIZE=${ARBITER_WORLD_SIZE:-10}
      # Arbiter role: "admin" for full-access primary arbiter.
      - ARBITER_ROLE=${ARBITER_ROLE:-admin}
      # Absolute path for the encrypted policy configuration file (PolicyManager).
      # Must be on the data PVC so policies survive pod/container restarts.
      - POLICY_CONFIG_FILE_PATH=${POLICY_CONFIG_FILE_PATH:-/app/data/policies.json}

      # ============================================
      # Genetic Evolution Engine (Feature 5)
      # ============================================
      # IB-2: arbiter.py now reads these env vars to configure evolve_configs() calls.
      - EVOLUTION_POPULATION_SIZE=${EVOLUTION_POPULATION_SIZE:-10}
      - EVOLUTION_GENERATIONS=${EVOLUTION_GENERATIONS:-5}
      # DLT backend type (RB-5: evm/ethereum now fully supported in dlt_backend.py).
      - DLT_TYPE=${DLT_TYPE:-fabric}

      # ============================================
      # Worker Configuration
      # ============================================
      # Single worker mode - FastAPI is async and multiple workers cause job sync issues
      - WORKER_COUNT=${WORKER_COUNT:-1}

    ports:
      - "8000:8000"  # Main API endpoint
      - "9090:9090"  # Prometheus metrics
    volumes:
      # Use named volumes for persistence, not bind mounts
      - platform-output:/app/output
      - platform-uploads:/app/uploads
      - platform-logs:/app/logs
    restart: always
    networks:
      - codefactory-network
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false  # Set to true if possible, requires tmpfs mounts for write paths
    tmpfs:
      - /tmp:size=256M,mode=1777
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # Command with single worker for async FastAPI
    # Using gunicorn with secure defaults
    # Single worker prevents job synchronization issues in async applications
    command: ["sh", "-c", "gunicorn server.main:app -w $${WORKER_COUNT:-1} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300 --graceful-timeout 30 --keep-alive 5 --max-requests 1000 --max-requests-jitter 50 --access-logfile - --error-logfile -"]

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: codefactory-prometheus-prod
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: always
    networks:
      - codefactory-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.3.3
    container_name: codefactory-grafana-prod
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required — generate with: openssl rand -base64 32}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.yourdomain.com
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: always
    networks:
      - codefactory-network

volumes:
  platform-output:
    driver: local
  platform-uploads:
    driver: local
  platform-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  codefactory-network:
    driver: bridge

# ============================================
# Production Deployment Instructions
# ============================================
#
# Redis and Postgres are provided by Railway.
# Railway automatically injects REDIS_URL and DATABASE_URL into
# the service environment — no local containers needed.
#
# 1. Set required secrets in Railway (or your secrets manager):
#    AGENTIC_AUDIT_HMAC_KEY=<64-char-hex-key>   openssl rand -hex 32
#    ENCRYPTION_KEY=<fernet-key>                 python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#    OPENAI_API_KEY=<your-key>
#    GRAFANA_PASSWORD=<strong-password>
#
# 2. Deploy:
#    docker-compose -f docker-compose.production.yml --env-file .env.production up -d
#
# 3. Verify:
#    docker-compose -f docker-compose.production.yml ps
#    curl http://localhost:8000/health
#    curl http://localhost:8000/ready
#
# 4. Monitor:
#    Prometheus: http://localhost:9091
#    Grafana: http://localhost:3000
#    Metrics: http://localhost:9090/metrics
