# Redis and Postgres are provided by Railway — set REDIS_URL and DATABASE_URL
# in your environment (Railway injects these automatically).

services:
  # Unified Code Factory Platform
  # Note: All three modules (generator, omnicore_engine, self_fixing_engineer)
  # are part of a single unified platform and are built together.
  codefactory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codefactory-platform
    environment:
      # Application Environment
      - APP_ENV=development
      - DEV_MODE=1
      - PRODUCTION_MODE=0
      # Deterministic build mode — forces sorted ZIP entries, fixed timestamps,
      # temperature=0 LLM calls, and build_plan.json enforcement.
      # Set to 1 in CI pipelines that verify reproducible build output (SLSA L2).
      - DETERMINISTIC=${DETERMINISTIC:-0}

      # Enterprise-grade startup optimization
      - APP_STARTUP=1
      - SKIP_IMPORT_TIME_VALIDATION=1
      - SPACY_WARNING_IGNORE=W007
      - PYTHONPATH=/app

      # ============================================
      # Configuration Path Resolution
      # ============================================
      # Optional: Set custom path to runner configuration file
      # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
      # Default search order:
      #   1. RUNNER_CONFIG_PATH (if set)
      #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
      #   3. ./runner_config.yaml -> ./config/runner_config.yaml (for runner_config.yaml)
      # - RUNNER_CONFIG_PATH=/app/generator/config.yaml

      # ============================================
      # SECURITY: Required keys - must be set via environment variables
      # Generate keys with:
      #   openssl rand -hex 32  (for AGENTIC_AUDIT_HMAC_KEY)
      #   python -c "from cryptography.fernet import Fernet;
      #     print(Fernet.generate_key().decode())"  (for ENCRYPTION_KEY)
      # ============================================
      - AGENTIC_AUDIT_HMAC_KEY=${AGENTIC_AUDIT_HMAC_KEY:?AGENTIC_AUDIT_HMAC_KEY is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}

      # LLM Provider Configuration
      - XAI_API_KEY=${XAI_API_KEY:-}
      # XAI Test-Generation API configuration (used by XAITestGenerationAPI in gen_plugins.py)
      # XAI_API_PROVIDER: LLM provider for AI test generation (openai, anthropic, ollama …)
      # XAI_API_MODEL:    Model identifier, e.g. gpt-4o, claude-3-5-sonnet-20241022
      # XAI_RETRY_ATTEMPTS: Max tenacity retry attempts (default: 3)
      # XAI_CALL_TIMEOUT:   Per-call timeout in seconds (default: 60)
      - XAI_API_PROVIDER=${XAI_API_PROVIDER:-openai}
      - XAI_API_MODEL=${XAI_API_MODEL:-gpt-4o}
      - XAI_RETRY_ATTEMPTS=${XAI_RETRY_ATTEMPTS:-3}
      - XAI_CALL_TIMEOUT=${XAI_CALL_TIMEOUT:-60}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      # LLM_USE_MOCK: set to "true" ONLY for local development when no real API keys are
      # available. agent_core.init_llm() raises ValueError if a key is missing and this
      # flag is not set — which is the correct production behaviour.
      # Never set this to "true" in staging or production.
      - LLM_USE_MOCK=${LLM_USE_MOCK:-false}
      # Per-call LLM API timeout (seconds).
      # Multi-pass ensemble generation makes 3 sequential ensemble calls per large-spec job;
      # total generation budget per job = up to 3 × LLM_TIMEOUT (background task, not HTTP).
      - LLM_TIMEOUT=${LLM_TIMEOUT:-300}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      # Maximum tokens for code-generation prompts (supports large README-driven specs)
      - CODEGEN_MAX_PROMPT_TOKENS=${CODEGEN_MAX_PROMPT_TOKENS:-32000}
      # Minimum character length for an optimised prompt returned by docgen_prompt.py.
      # When gpt-3.5-turbo compresses below this threshold, the system retries with
      # gpt-4o-mini before falling back to hard token-budget truncation.
      # Raise if the 800-char default still produces over-compressed prompts in practice.
      - DOCGEN_PROMPT_MIN_LENGTH=${DOCGEN_PROMPT_MIN_LENGTH:-800}
      # Docgen context pre-summarisation — truncate files to avoid >150s prompt latency.
      - DOCGEN_MAX_CONTEXT_CHARS=${DOCGEN_MAX_CONTEXT_CHARS:-30000}
      - DOCGEN_TRUNCATION_LINES=${DOCGEN_TRUNCATION_LINES:-100}
      # Multi-pass code generation thresholds.
      # Raise to disable multi-pass for all but the largest specs; lower to enable earlier.
      - CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD=${CODEGEN_MULTIPASS_ENDPOINT_THRESHOLD:-10}
      - CODEGEN_MULTIPASS_FILE_THRESHOLD=${CODEGEN_MULTIPASS_FILE_THRESHOLD:-20}
      - CODEGEN_MULTIPASS_MD_SIZE_THRESHOLD=${CODEGEN_MULTIPASS_MD_SIZE_THRESHOLD:-30000}

      # Infrastructure — provided by Railway
      - REDIS_URL=${REDIS_URL}
      - DB_PATH=${DB_PATH}
      - DATABASE_URL=${DATABASE_URL}
      # Canonical names read by codebase_analyzer.py for SFE analysis DB retries (Bug 7 fix)
      - DATABASE_RETRY_ATTEMPTS=${DATABASE_RETRY_ATTEMPTS:-3}
      - DATABASE_RETRY_DELAY=${DATABASE_RETRY_DELAY:-1.0}

      # Citus Extension Configuration
      # Set to 1 to enable Citus distributed SQL features
      # Requires postgres service to use citusdata/citus image (already configured)
      - ENABLE_CITUS=${ENABLE_CITUS:-0}

      # Message Bus Configuration
      - MESSAGE_BUS_SHARD_COUNT=${MESSAGE_BUS_SHARD_COUNT:-4}
      - MESSAGE_BUS_WORKERS_PER_SHARD=${MESSAGE_BUS_WORKERS_PER_SHARD:-4}
      - ENABLE_MESSAGE_BUS_GUARDIAN=${ENABLE_MESSAGE_BUS_GUARDIAN:-0}

      # Self-Fixing Engineer
      - CREW_CONFIG_PATH=/app/self_fixing_engineer/crew_config.yaml
      # Refactor Agent config override (defaults to bundled refactor_agent.yaml)
      - REFACTOR_AGENT_CONFIG=${REFACTOR_AGENT_CONFIG:-/app/self_fixing_engineer/refactor_agent/refactor_agent.yaml}
      # ConfigDB remote resolution (leave empty to use bundled local YAML)
      - CONFIGDB_REMOTE_ENDPOINT=${CONFIGDB_REMOTE_ENDPOINT:-}
      - CONFIGDB_ALLOWED_HOSTS=${CONFIGDB_ALLOWED_HOSTS:-}
      - AUDIT_LOG_PATH=/app/audit_trail.log
      # SFE Arbiter analysis tuning
      # SFE_ANALYSIS_TIMEOUT_SECONDS: wall-clock budget for one full codebase scan.
      #   Default 300 s (5 min) — increase for repos with 100+ Python files.
      - SFE_ANALYSIS_TIMEOUT_SECONDS=${SFE_ANALYSIS_TIMEOUT_SECONDS:-300}
      # Critique pipeline outer budget: security scanning (bandit/semgrep) can take
      # longer than linting alone.  180 s covers large repos (≥ 46 files).
      - PIPELINE_CRITIQUE_TIMEOUT_SECONDS=${PIPELINE_CRITIQUE_TIMEOUT_SECONDS:-180}
      # Skip individual linters for resource-constrained or CI environments.
      - SFE_SKIP_MYPY=${SFE_SKIP_MYPY:-false}
      - SFE_SKIP_PYLINT=${SFE_SKIP_PYLINT:-false}
      # SFE_FAST_MODE=true skips both Pylint and Mypy, running only Bandit + Radon.
      - SFE_FAST_MODE=${SFE_FAST_MODE:-false}
      # Skip Alembic migrations during analysis-only runs (~39s saving per run).
      - SFE_SKIP_MIGRATE_ON_ANALYSIS=${SFE_SKIP_MIGRATE_ON_ANALYSIS:-false}
      # AUTO_MIGRATE=0 disables automatic Alembic upgrade at startup.
      - AUTO_MIGRATE=${AUTO_MIGRATE:-0}

      # ============================================
      # Arbiter Configuration
      # ============================================
      # Arbiter world-size controls how many virtual agent slots the Arbiter
      # manages. Increase for larger multi-agent deployments.
      - ARBITER_WORLD_SIZE=${ARBITER_WORLD_SIZE:-10}
      # Arbiter role: "admin" for full-access primary arbiter (default).
      - ARBITER_ROLE=${ARBITER_ROLE:-admin}
      # Absolute path for the encrypted policy configuration file used by
      # PolicyManager. Must be on a persistent volume in production.
      # Defaults to /app/data/policies.json (on the data PVC).
      - POLICY_CONFIG_FILE_PATH=${POLICY_CONFIG_FILE_PATH:-/app/data/policies.json}
      # File provenance registry path — records which files were produced by the Generator
      # pipeline. MUST reside on the platform-data volume so the registry survives
      # container restarts. Override via .env if the data volume is mounted elsewhere.
      - ARBITER_PROVENANCE_PATH=${ARBITER_PROVENANCE_PATH:-/app/data/provenance.json}
      # Reports directory — used by the Genetic Evolution Engine to persist the GA
      # population (evolution_population.json) across container restarts, including
      # evolved prompt templates stored in genomes. Must be on a persistent volume.
      - REPORTS_DIRECTORY=${REPORTS_DIRECTORY:-/app/data/reports}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_STRUCTURED_LOGGING=${ENABLE_STRUCTURED_LOGGING:-0}

      # Feature Flags
      # Options: "0" (disabled), "1" (enabled), "auto" (auto-detect based on library availability)
      - ENABLE_DATABASE=${ENABLE_DATABASE:-1}  # Database support enabled by default
      - ENABLE_HSM=${ENABLE_HSM:-auto}  # Hardware Security Module support with auto-detection
      - ENABLE_FEATURE_STORE=${ENABLE_FEATURE_STORE:-auto}  # Feast feature store with auto-detection
      - ENABLE_LIBVIRT=${ENABLE_LIBVIRT:-auto}  # Libvirt virtualization support with auto-detection

      # Performance Flags
      - PARALLEL_AGENT_LOADING=${PARALLEL_AGENT_LOADING:-1}  # Enable parallel agent loading
      - LAZY_LOAD_ML=${LAZY_LOAD_ML:-1}  # Lazy load ML libraries

      # Audit Crypto (development defaults - change in production)
      - AUDIT_CRYPTO_MODE=${AUDIT_CRYPTO_MODE:-disabled}
      - AUDIT_CRYPTO_ALLOW_INIT_FAILURE=1

      # Sentry Error Tracking (Optional - auto-enabled when SENTRY_DSN is set)
      - SENTRY_DSN=${SENTRY_DSN:-}
      # Sentry environment tag for event classification (production/staging/development)
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}

      # Metrics
      - PROMETHEUS_PORT=9090  # Prometheus metrics HTTP server port
      # OpenTelemetry OTLP export endpoint (Bug 6 fix: set to a collector endpoint to
      # route spans off stdout and avoid Railway's 500 logs/sec rate-limit burst).
      # Example: OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # OpenTelemetry Batch Span Processor tuning — keeps export bursts under
      # Railway's 500 logs/sec rate limit.  Values below are the application defaults;
      # override in .env to tune without rebuilding the image.
      - OTEL_BSP_MAX_EXPORT_BATCH_SIZE=${OTEL_BSP_MAX_EXPORT_BATCH_SIZE:-64}
      - OTEL_BSP_SCHEDULE_DELAY=${OTEL_BSP_SCHEDULE_DELAY:-10000}
      - OTEL_BSP_MAX_QUEUE_SIZE=${OTEL_BSP_MAX_QUEUE_SIZE:-2048}
      # Batch per-file lint spans into a single parent span to avoid Railway rate limit.
      - OTEL_BATCH_LINT_SPANS=${OTEL_BATCH_LINT_SPANS:-true}
      # RAG/vector DB for context-aware critique (off by default).
      - RAG_ENABLED=${RAG_ENABLED:-false}
      # Set below 1.0 to sample traces (e.g. 0.5 = 50 %); 1.0 = sample all (default).
      - OTEL_TRACES_SAMPLE_RATE=${OTEL_TRACES_SAMPLE_RATE:-1.0}

      # ============================================
      # Intent Capture Module (Bug fixes: #4, #10, #17)
      # ============================================
      # CLI WebSocket collaboration JWT secret (intent_capture/cli.py)
      # Generate with: openssl rand -hex 32
      # WARNING: A fatal log is emitted in production if the insecure default is used
      - CLI_JWT_SECRET=${CLI_JWT_SECRET:-default-insecure-secret-key-for-dev}
      # Vault KV v2 path for the JWT_SECRET shared by API and CLI
      - JWT_VAULT_PATH=${JWT_VAULT_PATH:-secrets/data/jwt}
      # RabbitMQ URL for task queuing (only required when USE_QUEUE=true)
      - RABBITMQ_URL=${RABBITMQ_URL:-}

      # -----------------------------------------------------------------------
      # Tier-1 AI Capability Configuration
      # -----------------------------------------------------------------------
      # Feature 1: Quantum / Neuromorphic Array Backend
      # Controls omnicore_engine.array_backend.ArrayBackend (numerical computing).
      # Distinct from the Arbiter persistence layer (PersistentArrayStore).
      # Install qiskit+qiskit-aer / nengo first: make install-ai
      - ARRAY_BACKEND_QUANTUM=${ARRAY_BACKEND_QUANTUM:-false}
      - ARRAY_BACKEND_NEUROMORPHIC=${ARRAY_BACKEND_NEUROMORPHIC:-false}
      # Feature 6: RL Metrics Collector — Prometheus URL (empty = skip latency metrics)
      # Example: PROMETHEUS_URL=http://prometheus:9090
      - PROMETHEUS_URL=${PROMETHEUS_URL:-}
      # Feature 5: Genetic Evolution Engine
      - EVOLUTION_POPULATION_SIZE=${EVOLUTION_POPULATION_SIZE:-10}
      # Number of GA generations per evolution run (IB-2: new kwarg wired from env)
      - EVOLUTION_GENERATIONS=${EVOLUTION_GENERATIONS:-5}
      # GA backend selector for Arbiter.evolve(): auto | deap | custom
      # "auto" prefers DEAP when available; falls back to the custom GA.
      - EVOLUTION_BACKEND=${EVOLUTION_BACKEND:-auto}
      # ArbiterGrowthManager evolutionary experiment parameters (arbiter_growth_manager.py).
      # These control the ArbiterExplorer run_evolutionary_experiment() call, which is
      # separate from the DEAP evolve_configs() call above.
      - EXPLORER_EVOLUTION_GENERATIONS=${EXPLORER_EVOLUTION_GENERATIONS:-5}
      - EXPLORER_EVOLUTION_POPULATION_SIZE=${EXPLORER_EVOLUTION_POPULATION_SIZE:-10}
      # Minimum number of RL action-outcome samples required before learn_from_data()
      # will train the supervised policy model.  Prevents training on noise.
      - MIN_SUPERVISED_TRAINING_SAMPLES=${MIN_SUPERVISED_TRAINING_SAMPLES:-50}
      # Enable SelfEvolutionEngine in non-production deployments.
      # Must be "true" to allow SelfEvolutionEngine.start() when PRODUCTION_MODE=1.
      # Leave "false" in dev/staging unless actively testing evolution cycles.
      - ENABLE_EXPERIMENTAL_EVOLUTION=${ENABLE_EXPERIMENTAL_EVOLUTION:-false}
      # DLT backend type for checkpoint storage and audit log DLT integration.
      # Options: simple (dev), fabric (Hyperledger Fabric), evm/ethereum (EVM chains).
      # RB-5: evm/ethereum support added to dlt_backend.py; IB-1: dlt/evm added to checkpoint_manager.
      - DLT_TYPE=${DLT_TYPE:-fabric}
      # Dev-mode file-backed DLT storage root (PRODUCTION_MODE=0 only).
      # Redirects the local JSON store onto the persistent data volume so dev
      # checkpoint data survives container restarts.
      - DLT_DEV_STORAGE_DIR=/app/data/dlt_dev_storage
      # DLT HMAC signing key for checkpoint integrity (dlt_backend + off-chain clients).
      # Generate: openssl rand -hex 32
      - DLT_HMAC_KEY=${DLT_HMAC_KEY:-dev-dlt-hmac-key-not-for-production}
      # AES-256-GCM client-side encryption key for S3 off-chain blobs (64 hex chars = 32 bytes).
      # Required when DLT_ENCRYPT_AT_REST=true.
      - DLT_ENCRYPTION_KEY=${DLT_ENCRYPTION_KEY:-}
      # Enable client-side AES-256-GCM encryption of off-chain blobs before upload.
      - DLT_ENCRYPT_AT_REST=${DLT_ENCRYPT_AT_REST:-false}
      # S3 off-chain blob storage (used when DLT_TYPE=fabric and PRODUCTION_MODE=true).
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-codefactory-dlt-offchain-dev}
      - S3_REGION=${S3_REGION:-us-east-1}
      # AWS credentials for S3 (omit to use IAM instance profile / localstack in dev).
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      # Hyperledger Fabric DLT client configuration (used when DLT_TYPE=fabric).
      - FABRIC_CHANNEL=${FABRIC_CHANNEL:-codefactory-channel}
      - FABRIC_CHAINCODE=${FABRIC_CHAINCODE:-codefactory-cc}
      - FABRIC_ORG=${FABRIC_ORG:-Org1}
      - FABRIC_USER=${FABRIC_USER:-Admin}
      - FABRIC_NETWORK_PROFILE=${FABRIC_NETWORK_PROFILE:-/app/data/fabric/connection-profile.json}
      # Feature 2: LLM Feature Suggestion Cache TTL (seconds)
      - FEATURE_SUGGESTION_CACHE_TTL=${FEATURE_SUGGESTION_CACHE_TTL:-3600}
      # Clarifier WebSocket session timeout (seconds)
      - CLARIFIER_WS_TIMEOUT=${CLARIFIER_WS_TIMEOUT:-300}
      # Job-status WebSocket heartbeat / idle-connection timeout (seconds)
      - JOBS_WS_TIMEOUT=${JOBS_WS_TIMEOUT:-30}
      # Post-Quantum Cryptography signing for audit logs (default: false = HMAC-SHA-256 fallback)
      # Set to "true" only after installing pqcrypto>=0.1.3 or liboqs-python>=0.12.0 (see requirements-pqc.txt)
      - USE_PQC_SIGNING=${USE_PQC_SIGNING:-false}
      # Canonical shard count for the OmniCore message bus (overrides MESSAGE_BUS_SHARD_COUNT)
      - MESSAGE_BUS_SHARDS=${MESSAGE_BUS_SHARDS:-4}
    ports:
      - "8000:8000"  # Main API endpoint
      - "9090:9090"  # Prometheus metrics HTTP server
    volumes:
      - platform-output:/app/output
      - platform-uploads:/app/uploads  # Persist uploaded files across restarts
      - platform-logs:/app/logs        # Runtime log files isolated from repo
      - platform-data:/app/data        # Runtime data/DB files isolated from repo
      - /var/run/docker.sock:/var/run/docker.sock  # Allow critique_agent to run pylint/ruff via Docker
    restart: unless-stopped
    # Resource limits for production deployment
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    # Health check for container orchestration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # Default command runs the unified platform API server
    # Use PORT environment variable if set, otherwise default to 8000
    command: ["python", "server/run.py"]

  # Prometheus for metrics (optional)
  # Note: Running on different port (9091) to avoid conflict with app's Prometheus metrics server
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: codefactory-prometheus
    ports:
      - "9091:9090"  # Map host 9091 to container 9090 to avoid conflict
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:10.3.3
    container_name: codefactory-grafana
    ports:
      - "3000:3000"
    environment:
      # SECURITY: Set GRAFANA_PASSWORD in your environment before running.
      # Generate with: openssl rand -base64 32
      # Never use the default "admin" password in shared or exposed environments.
      - "GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required - generate with: openssl rand -base64 32}"
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  platform-output:
  platform-uploads:  # Persist uploaded job files
  platform-logs:     # Runtime log files (never in repo)
  platform-data:     # Runtime data/DB files (never in repo)
  prometheus-data:
  grafana-data:

networks:
  default:
    name: codefactory-network
