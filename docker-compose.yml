services:
  # Redis for message bus and caching
  # SECURITY: Password authentication enabled even for development
  redis:
    image: redis:7.4-alpine
    container_name: codefactory-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devpassword}
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: codefactory-postgres
    environment:
      POSTGRES_DB: codefactory
      POSTGRES_USER: codefactory
      # SECURITY WARNING: Default password is for DEVELOPMENT ONLY
      # In production, ALWAYS set POSTGRES_PASSWORD via environment variable or secrets manager
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codefactory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - default

  # Unified Code Factory Platform
  # Note: All three modules (generator, omnicore_engine, self_fixing_engineer)
  # are part of a single unified platform and are built together.
  codefactory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codefactory-platform
    environment:
      # Application Environment
      - APP_ENV=development
      - DEV_MODE=1
      - PRODUCTION_MODE=0
      
      # Enterprise-grade startup optimization
      - APP_STARTUP=1
      - SKIP_IMPORT_TIME_VALIDATION=1
      - SPACY_WARNING_IGNORE=W007
      
      # ============================================
      # Configuration Path Resolution
      # ============================================
      # Optional: Set custom path to runner configuration file
      # If not set, uses smart path resolution (see CONFIG_PATH_RESOLUTION_FIX.md)
      # Default search order:
      #   1. RUNNER_CONFIG_PATH (if set)
      #   2. ./config.yaml -> ./generator/config.yaml (for config.yaml)
      #   3. ./runner_config.yaml -> ./config/runner_config.yaml (for runner_config.yaml)
      # - RUNNER_CONFIG_PATH=/app/generator/config.yaml
      
      # ============================================
      # SECURITY: Required keys - must be set via environment variables
      # Generate keys with:
      #   openssl rand -hex 32  (for AGENTIC_AUDIT_HMAC_KEY)
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"  (for ENCRYPTION_KEY)
      # ============================================
      - AGENTIC_AUDIT_HMAC_KEY=${AGENTIC_AUDIT_HMAC_KEY:?AGENTIC_AUDIT_HMAC_KEY is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      
      # LLM Provider Configuration
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-300}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      
      # Infrastructure
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379
      - DB_PATH=${DB_PATH:-postgresql+asyncpg://codefactory:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/codefactory}
      
      # Message Bus Configuration
      - MESSAGE_BUS_SHARD_COUNT=${MESSAGE_BUS_SHARD_COUNT:-4}
      - MESSAGE_BUS_WORKERS_PER_SHARD=${MESSAGE_BUS_WORKERS_PER_SHARD:-4}
      - ENABLE_MESSAGE_BUS_GUARDIAN=${ENABLE_MESSAGE_BUS_GUARDIAN:-0}
      
      # Self-Fixing Engineer
      - CREW_CONFIG_PATH=/app/self_fixing_engineer/crew_config.yaml
      - AUDIT_LOG_PATH=/app/audit_trail.log
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_STRUCTURED_LOGGING=${ENABLE_STRUCTURED_LOGGING:-0}
      
      # Feature Flags
      # Options: "0" (disabled), "1" (enabled), "auto" (auto-detect based on library availability)
      - ENABLE_DATABASE=${ENABLE_DATABASE:-1}  # Database support enabled by default
      - ENABLE_HSM=${ENABLE_HSM:-auto}  # Hardware Security Module support with auto-detection
      - ENABLE_FEATURE_STORE=${ENABLE_FEATURE_STORE:-auto}  # Feast feature store with auto-detection
      - ENABLE_LIBVIRT=${ENABLE_LIBVIRT:-auto}  # Libvirt virtualization support with auto-detection
      
      # Performance Flags
      - PARALLEL_AGENT_LOADING=${PARALLEL_AGENT_LOADING:-1}  # Enable parallel agent loading
      - LAZY_LOAD_ML=${LAZY_LOAD_ML:-1}  # Lazy load ML libraries
      
      # Audit Crypto (development defaults - change in production)
      - AUDIT_CRYPTO_MODE=${AUDIT_CRYPTO_MODE:-disabled}
      - AUDIT_CRYPTO_ALLOW_INIT_FAILURE=1
      
      # Sentry Error Tracking (Optional - auto-enabled when SENTRY_DSN is set)
      - SENTRY_DSN=${SENTRY_DSN:-}
      
      # Metrics
      - PROMETHEUS_PORT=9090  # Prometheus metrics HTTP server port
    ports:
      - "8000:8000"  # Main API endpoint
      - "8001:8001"  # Metrics port
      - "9090:9090"  # Prometheus metrics HTTP server
    volumes:
      - .:/app
      - platform-output:/app/output
      - platform-uploads:/app/uploads  # Persist uploaded files across restarts
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits for production deployment
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    # Health check for container orchestration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Default command runs the unified platform API server
    # Use PORT environment variable if set, otherwise default to 8000
    command: ["python", "server/run.py"]

  # Prometheus for metrics (optional)
  # Note: Running on different port (9091) to avoid conflict with app's Prometheus metrics server
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: codefactory-prometheus
    ports:
      - "9091:9090"  # Map host 9091 to container 9090 to avoid conflict
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:10.3.3
    container_name: codefactory-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  platform-output:
  platform-uploads:  # Persist uploaded job files
  prometheus-data:
  grafana-data:

networks:
  default:
    name: codefactory-network
