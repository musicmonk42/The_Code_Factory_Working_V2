# Grafana Dashboard Provisioning Configuration
apiVersion: 1

providers:
  - name: 'Code Factory Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
