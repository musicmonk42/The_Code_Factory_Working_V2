# Prometheus Configuration for Code Factory Platform
# Scrape configuration aligned with docker-compose.yml service names
#
# Services in docker-compose.yml:
#   - codefactory (port 8000 API, 8001 metrics)
#   - redis (port 6379)
#   - prometheus (port 9090)
#   - grafana (port 3000)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'codefactory'
    environment: 'production'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Unified Code Factory Platform (main application)
  # Includes generator, omnicore_engine, and self_fixing_engineer modules
  - job_name: 'codefactory'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['codefactory:8001']
        labels:
          service: 'codefactory'
          component: 'unified-platform'

  # Redis cache and message bus
  # Note: Redis Exporter should be deployed separately for metrics
  # See: https://github.com/oliver006/redis_exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          component: 'cache'

  # PostgreSQL database (when enabled)
  # Note: Postgres Exporter should be deployed separately for metrics
  # See: https://github.com/prometheus-community/postgres_exporter
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         service: 'postgres'
  #         component: 'database'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts.yml'
  - 'alerts/*.yml'
