global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'codefactory'
    environment: 'production'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Note: In the unified platform architecture, both generator and omnicore modules
  # run in the same container and expose metrics on the same endpoint.
  # This configuration maintains separate job definitions for future microservices split.
  - job_name: 'codefactory-platform'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['codefactory:9090']
        labels:
          service: 'codefactory'
          component: 'unified-platform'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
          component: 'cache'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'
          component: 'database'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts.yml'
  - 'alerts/*.yml'
