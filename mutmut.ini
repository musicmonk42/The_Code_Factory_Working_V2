[mutmut]
# Mutation testing configuration for Code Factory Platform.
# See docs/MUTATION_TESTING.md for full usage instructions.

# Source paths to mutate (space-separated)
paths_to_mutate=generator/main/provenance.py generator/agents/testgen_agent/testgen_agent.py

# Test runner command
runner=python -m pytest generator/tests/ -x -q --tb=short --timeout=60

# Tests directory (used for test discovery)
tests_dir=generator/tests/

# Files/dirs to exclude from mutation (globs)
# exclude=

# Number of parallel mutation workers (default: 1; increase if CPU allows)
# n_workers=1
