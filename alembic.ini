# Alembic Configuration File
# Used for database schema migrations

[alembic]
# Path to migration scripts
script_location = omnicore_engine/migrations

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Timezone for migration revision timestamps
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# Version location specification; this defaults
# to omnicore_engine/migrations/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path
# version_locations = %(here)s/bar %(here)s/bat omnicore_engine/migrations/versions

# The output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

# Database URL will be set programmatically in env.py from environment variables
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Post-write hooks are run after a migration file is generated
# Example: Format code with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
