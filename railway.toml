# Railway.app deployment configuration for The Code Factory Platform
# This configuration deploys the unified platform with all startup/runtime fixes
# Documentation: https://docs.railway.app/deploy/railway-toml-file

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python server/run.py --host 0.0.0.0 --workers 1 --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# HTTP/2 timeout configuration for long-running operations
# Prevents ERR_HTTP2_PROTOCOL_ERROR on pipeline and codegen endpoints
# Railway will keep connections alive for up to 600 seconds (10 minutes)
# This allows pipeline and codegen operations to complete without timing out
[deploy.http]
connectionTimeout = 600  # 10 minutes for long-running requests
idleTimeout = 300  # 5 minutes idle timeout

# =============================================================================
# CRITICAL ENVIRONMENT VARIABLES - REQUIRED FOR ALL FIXES
# =============================================================================

[variables]
# === Core Application (REQUIRED) ===
APP_ENV = "production"
DEV_MODE = "0"
PRODUCTION_MODE = "1"
DEBUG = "false"
LOG_LEVEL = "INFO"

# === Startup Optimization (REQUIRED for fast startup) ===
APP_STARTUP = "1"
SKIP_IMPORT_TIME_VALIDATION = "1"
SPACY_WARNING_IGNORE = "W007"

# === Port Configuration (REQUIRED for Railway deployment) ===
PORT = "8080"

# === Audit Crypto Configuration (REQUIRED for Railway deployment) ===
# SECURITY: Use "software" mode for production (cryptographically secure)
# "disabled" mode is NOT RECOMMENDED for production but may be needed initially
# Once secrets are configured, use "software" or "hsm"
AUDIT_CRYPTO_MODE = "software"  # Changed from "disabled" to "software" for security
AUDIT_CRYPTO_ALLOW_INIT_FAILURE = "1"

# === Docker Configuration ===
# Skip Docker validation in Railway (Docker daemon not available during deployment)
SKIP_DOCKER_VALIDATION = "true"
DOCKER_REQUIRED = "false"

# =============================================================================
# SECURITY - CRITICAL: SET THESE IN RAILWAY UI AS SECRETS
# =============================================================================
# Generate with:
#   openssl rand -hex 32  (for AGENTIC_AUDIT_HMAC_KEY - 64 hex chars)
#   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"  (for ENCRYPTION_KEY)
#   python -c "import secrets; print(secrets.token_urlsafe(32))"  (for SECRET_KEY, JWT_SECRET_KEY)

# REQUIRED: Audit log HMAC signing key (64 hex characters)
# Without this, audit logging will fail and crash the application
AGENTIC_AUDIT_HMAC_KEY = "${{AGENTIC_AUDIT_HMAC_KEY}}"

# REQUIRED: Fernet encryption key for data at rest
ENCRYPTION_KEY = "${{ENCRYPTION_KEY}}"

# REQUIRED: Application secret keys
SECRET_KEY = "${{SECRET_KEY}}"
JWT_SECRET_KEY = "${{JWT_SECRET_KEY}}"

# Optional: AWS KMS key for hardware-backed encryption
# KMS_KEY_ID = "arn:aws:kms:us-east-1:123456789012:key/abc-123"

# Key ID for V0 audit crypto system
RUNNER_AUDIT_SIGNING_KEY_ID = "prod-audit-key-v1"

# === Database Configuration ===
# Railway auto-injects DATABASE_URL from PostgreSQL plugin
# Set DB_PATH to use PostgreSQL (recommended for production)
# If DATABASE_URL is set by Railway, this will be overridden
DB_PATH = "sqlite+aiosqlite:///./codefactory.db"
DB_POOL_SIZE = "50"
DB_POOL_MAX_OVERFLOW = "20"
DB_RETRY_ATTEMPTS = "3"
DB_RETRY_DELAY = "1.0"

# === Message Bus Configuration (CRITICAL for event loop fix) ===
MESSAGE_BUS_SHARD_COUNT = "8"
MESSAGE_BUS_WORKERS_PER_SHARD = "4"
ENABLE_MESSAGE_BUS_GUARDIAN = "1"
MESSAGE_BUS_GUARDIAN_INTERVAL = "30"

# === Redis Configuration ===
# Railway auto-injects REDIS_URL from Redis plugin
# REDIS_URL = "redis://default:password@redis:6379"

# === LLM Configuration ===
LLM_PROVIDER = "openai"
LLM_MODEL = "gpt-4o-mini"
LLM_TIMEOUT = "300"
LLM_MAX_RETRIES = "3"
LLM_TEMPERATURE = "0.7"

# API Keys - Set these as secrets in Railway UI:
# OPENAI_API_KEY (required)
# ANTHROPIC_API_KEY (optional - for Claude)
# GOOGLE_API_KEY (optional - for Google Gemini)
# GROK_API_KEY (optional - for xAI Grok)
DEFAULT_LLM_PROVIDER = "openai"

# === Feature Flags ===
# SECURITY: Disabled by default for powerful subsystems
# Only enable features you actually use to reduce attack surface
ENABLE_DATABASE = "1"
ENABLE_HSM = "0"  # Set to "1" only if you have an actual HSM
ENABLE_FEATURE_STORE = "0"  # Set to "1" only if you use Feast
ENABLE_LIBVIRT = "0"  # Set to "1" only if you need virtualization
ENABLE_REDIS = "1"
ENABLE_KAFKA = "0"

# === CORS Configuration ===
# CRITICAL: Set ALLOWED_ORIGINS for browser clients!
# Without this, all browser requests will fail with CORS errors
# 
# DEPLOYMENT CHECKLIST: 
# 1. Set this to your frontend domain(s) in Railway dashboard under Variables
# 2. Example: ALLOWED_ORIGINS=https://your-app.railway.app,https://yourdomain.com
# 3. Server-to-server/curl requests work without this setting
#
# Uncomment and set in Railway UI (not here, since this is a template):
# ALLOWED_ORIGINS = "https://your-frontend.railway.app,https://your-custom-domain.com"

# === Kafka Configuration (disabled by default - uses Redis Streams instead) ===
USE_KAFKA_INGESTION = "false"
USE_KAFKA_AUDIT = "false"
# If using external Kafka provider (e.g., Upstash, Confluent Cloud), set:
# KAFKA_BOOTSTRAP_SERVERS = "your-kafka-cluster:9092"
# KAFKA_SASL_USERNAME = "your-username"
# KAFKA_SASL_PASSWORD = "your-password"
# KAFKA_SECURITY_PROTOCOL = "SASL_SSL"
# KAFKA_TOPIC = "meta_learning_events"
# KAFKA_DLQ_TOPIC = "meta_learning_dlq"
# KAFKA_CLIENT_ID = "code-factory"
# EVENT_HMAC_KEY = "your-hmac-key"

# === Neo4j Configuration (optional - for knowledge graph features) ===
# NEO4J_URL = "bolt://your-neo4j-host:7687"
# NEO4J_USER = "neo4j"
# NEO4J_PASSWORD = "your-password"

# === Logging Configuration ===
ENABLE_STRUCTURED_LOGGING = "1"

# === Observability ===
# SENTRY_DSN = "https://your-sentry-dsn"  # Recommended for production error tracking
# OTEL_EXPORTER_OTLP_ENDPOINT = "https://otel-collector:4317"
PROMETHEUS_PORT = "9090"
# METRICS_PORT = "9090"

# === Performance ===
# Single worker for Railway deployment to ensure fast startup and reliable healthchecks
# Set WEB_CONCURRENCY to increase workers if needed
# WEB_CONCURRENCY = "1"
WORKER_COUNT = "1"
MAX_CONCURRENT_TASKS = "50"

# === Self-Fixing Engineer ===
CREW_CONFIG_PATH = "/app/self_fixing_engineer/crew_config.yaml"
AUDIT_LOG_PATH = "/app/logs/audit_trail.log"
# AUDIT_DLQ_PATH = "/app/logs/audit_dlq.jsonl"

# =============================================================================
# DEPLOYMENT NOTES
# =============================================================================
# 
# 1. All critical fixes are enabled:
#    - Event loop management (MESSAGE_BUS_* variables)
#    - Config validation (APP_ENV, PRODUCTION_MODE)
#    - Audit logging (AGENTIC_AUDIT_HMAC_KEY)
#    - Startup optimization (APP_STARTUP, SKIP_IMPORT_TIME_VALIDATION)
#
# 2. Required Railway Plugins:
#    - PostgreSQL (injects DATABASE_URL)
#    - Redis (injects REDIS_URL)
#
# 3. Required Secrets (set in Railway UI):
#    - AGENTIC_AUDIT_HMAC_KEY (64 hex chars)
#    - ENCRYPTION_KEY (Fernet key)
#    - SECRET_KEY (random string)
#    - JWT_SECRET_KEY (random string)
#    - OPENAI_API_KEY (from OpenAI)
#
# 4. Validation:
#    - Check /health endpoint after deployment
#    - Verify no "RuntimeError: no running event loop" in logs
#    - Confirm "PolicyEngine initialized successfully" in logs
#    - Check "ShardedMessageBus initialized" in logs
#
# 5. Monitoring:
#    - Prometheus metrics: https://your-app.railway.app/metrics
#    - Health check: https://your-app.railway.app/health
#    - Readiness: https://your-app.railway.app/ready
#
# =============================================================================
