# Railway.app deployment configuration for The Code Factory Platform
# This configuration deploys the A.S.E (Autonomous Software Engineer) web interface
# Documentation: https://docs.railway.app/deploy/railway-toml-file

[build]
builder = "DOCKERFILE"

[deploy]
# Start command for the unified FastAPI server (server.main)
startCommand = "python -m server.main"

# Health check configuration
# The /health endpoint returns JSON with system status
healthcheckPath = "/health"
healthcheckTimeout = 300

# Restart policy: only restart on failure, not on success exit
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
APP_ENV = "production"
DEBUG = "false"
LOG_LEVEL = "INFO"
LLM_PROVIDER = "openai"
LLM_MODEL = "gpt-4o-mini"
WORKER_COUNT = "4"
MAX_CONCURRENT_TASKS = "50"
