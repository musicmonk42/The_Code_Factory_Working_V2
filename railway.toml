# Railway.app deployment configuration for The Code Factory Platform
# This configuration deploys the A.S.E (Automated Software Engineering) web interface
# Documentation: https://docs.railway.app/deploy/railway-toml-file

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Start command for the FastAPI server (server.main:app)
# Railway provides the PORT environment variable dynamically
startCommand = "python -m uvicorn server.main:app --host 0.0.0.0 --port $PORT"

# Health check configuration
# The /health endpoint returns JSON with system status
healthcheckPath = "/health"
healthcheckTimeout = 300

# Restart policy: only restart on failure, not on success exit
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
